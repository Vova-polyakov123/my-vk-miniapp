<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва знаний — VK Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e17;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }

        /* Основной контейнер */
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #0f131c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 70px;
            position: relative;
        }

        /* Верхняя панель */
        .stats-bar {
            background: #131a24;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2f3a;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffc107;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #8e9aaf;
        }
        .level-info {
            text-align: center;
            background: #1e2532;
            padding: 12px 16px;
            margin: 0 16px 16px;
            border-radius: 16px;
        }
        .level-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffc107;
        }
        .progress-bar {
            background: #2a323f;
            border-radius: 20px;
            height: 8px;
            margin: 8px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #ffc107;
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }
        .next-level {
            font-size: 0.7rem;
            color: #8e9aaf;
        }

        /* Список предметов (горизонтальный скролл) */
        .subjects-row {
            overflow-x: auto;
            white-space: nowrap;
            padding: 16px;
            scrollbar-width: thin;
            display: flex;
            gap: 12px;
        }
        .subject-card {
            background: #1a212d;
            border-radius: 20px;
            padding: 12px 20px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2f3748;
        }
        .subject-card.active {
            border-color: #ffc107;
            background: #2a3548;
        }
        .subject-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .subject-level {
            font-size: 0.7rem;
            color: #ffc107;
        }

        /* Основная карточка вопроса */
        .quiz-card {
            background: #0f131c;
            margin: 16px;
            padding: 20px;
            border-radius: 28px;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #8e9aaf;
            font-size: 0.8rem;
        }
        .combo-badge {
            background: #ffc10720;
            color: #ffc107;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 28px;
            text-align: center;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .answer-btn {
            background: #1a212d;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #2f3748;
        }
        .answer-btn.selected {
            background: #ffc107;
            color: #0a0e17;
            border-color: #ffc107;
        }
        .answer-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .feedback {
            background: #1a212d;
            border-radius: 20px;
            padding: 12px;
            margin: 16px 0;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            background: #2a3548;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: #ffc107;
            color: #0a0e17;
        }
        .btn-warning {
            background: #e67e22;
        }
        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: #0f131c;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 20px;
            border-top: 1px solid #2a2f3a;
        }
        .nav-item {
            text-align: center;
            font-size: 0.7rem;
            color: #8e9aaf;
            cursor: pointer;
            transition: 0.1s;
        }
        .nav-item.active {
            color: #ffc107;
        }
        .nav-icon {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 4px;
        }

        /* Модальные окна (как в старом коде) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a212d;
            max-width: 300px;
            width: 80%;
            border-radius: 24px;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        .modal-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .modal-btn.confirm { background: #ffc107; color: #000; }
        .modal-btn.cancel { background: #2a3548; color: #fff; }
        .close-modal {
            background: #ffc107;
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }

        /* Скрытые классы */
        .hidden { display: none; }
    </style>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
<div class="app" id="app">
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="scoreValue">0</div>
            <div class="stat-label">Очки</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="comboValue">0</div>
            <div class="stat-label">Комбо</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="ratingValue">#0</div>
            <div class="stat-label">Рейтинг</div>
        </div>
    </div>
    <div class="level-info">
        <div class="level-number" id="globalLevel">1</div>
        <div class="progress-bar">
            <div class="progress-fill" id="globalProgress" style="width:0%"></div>
        </div>
        <div class="next-level" id="nextLevelHint">До след. уровня: 0 очков</div>
    </div>

    <div class="subjects-row" id="subjectsRow"></div>

    <div class="quiz-card" id="quizCard">
        <div class="quiz-header">
            <span id="subjectLevelDisplay">Уровень 1 • Математика</span>
            <span class="combo-badge" id="comboBadge">СЕРИЯ 0</span>
        </div>
        <div class="question-text" id="questionText">Загрузка...</div>
        <div class="answers-grid" id="answersGrid"></div>
        <div class="feedback" id="feedbackMsg"></div>
        <div class="action-buttons">
            <button class="btn" id="hintBtn">Подсказка</button>
            <button class="btn btn-warning" id="bonusBtn">Бонус +25 очков</button>
            <button class="btn btn-primary" id="nextBtn">Далее</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-nav="main">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </div>
        <div class="nav-item" data-nav="achievements">
            <span class="nav-icon">🏆</span>
            <span>Достижения</span>
        </div>
        <div class="nav-item" data-nav="rating">
            <span class="nav-icon">📊</span>
            <span>Рейтинг</span>
        </div>
        <div class="nav-item" data-nav="tasks">
            <span class="nav-icon">📋</span>
            <span>Задания</span>
        </div>
        <div class="nav-item" data-nav="profile">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </div>
    </div>
</div>

<script>
    // ========== БАЗЫ ДАННЫХ (расширенные, без повторов) ==========
    const countryCapital = [
        ["Россия","Москва"],["США","Вашингтон"],["Франция","Париж"],["Германия","Берлин"],["Китай","Пекин"],
        ["Япония","Токио"],["Италия","Рим"],["Великобритания","Лондон"],["Испания","Мадрид"],["Канада","Оттава"],
        ["Бразилия","Бразилиа"],["Австралия","Канберра"],["Индия","Нью-Дели"],["Египет","Каир"],["Турция","Анкара"],
        ["Швеция","Стокгольм"],["Норвегия","Осло"],["Финляндия","Хельсинки"],["Польша","Варшава"],["Украина","Киев"],
        ["Греция","Афины"],["Нидерланды","Амстердам"],["Швейцария","Берн"],["Бельгия","Брюссель"],["Аргентина","Буэнос-Айрес"],
        ["Португалия","Лиссабон"],["Чехия","Прага"],["Венгрия","Будапешт"],["Австрия","Вена"],["Дания","Копенгаген"],
        ["Ирландия","Дублин"],["Новая Зеландия","Веллингтон"],["ЮАР","Претория"],["Мексика","Мехико"],["Индонезия","Джакарта"]
    ];
    const historyQA = [
        { q: "В каком году Христофор Колумб открыл Америку?", a: "1492", type: "date" },
        { q: "Когда началась Великая Отечественная война?", a: "1941", type: "date" },
        { q: "Кто был первым императором России?", a: "Пётр I", type: "person" },
        { q: "В каком году произошла битва при Калке?", a: "1223", type: "date" },
        { q: "Когда распался СССР?", a: "1991", type: "date" },
        { q: "Кто был первым президентом США?", a: "Джордж Вашингтон", type: "person" },
        { q: "Когда началась Первая мировая война?", a: "1914", type: "date" },
        { q: "В каком году произошло Крещение Руси?", a: "988", type: "date" },
        { q: "Когда состоялась Куликовская битва?", a: "1380", type: "date" },
        { q: "Кто основал Москву?", a: "Юрий Долгорукий", type: "person" }
    ];
    const authorWorkExtended = [
        { author: "Лев Толстой", work: "Война и мир", gender: "male" },
        { author: "Александр Пушкин", work: "Евгений Онегин", gender: "male" },
        { author: "Фёдор Достоевский", work: "Преступление и наказание", gender: "male" },
        { author: "Николай Гоголь", work: "Мёртвые души", gender: "male" },
        { author: "Михаил Булгаков", work: "Собачье сердце", gender: "male" },
        { author: "Антон Чехов", work: "Три сестры", gender: "male" },
        { author: "Джоан Роулинг", work: "Гарри Поттер", gender: "female" }
    ];
    const engWords = [
        ["собака","dog"],["кошка","cat"],["красный","red"],["идти (прош.)","went"],["яблоко","apple"],
        ["ловить (прош.)","caught"],["учитель","teacher"],["книга","book"],["радостный","happy"],["большой","big"]
    ];
    const obzhFacts = [
        { q: "Номер пожарной службы?", correct: "101", wrong: ["102","103","112"] },
        { q: "Номер скорой помощи?", correct: "103", wrong: ["101","102","112"] },
        { q: "Номер полиции?", correct: "102", wrong: ["101","103","112"] },
        { q: "Что делать при пожаре?", correct: "Вызвать 101", wrong: ["Бежать","Поливать водой","Спрятаться"] }
    ];
    const societyFacts = [
        ["Высший орган власти РФ?", "Президент"], ["Что такое референдум?", "Всенародное голосование"],
        ["Нижняя палата парламента РФ?", "Государственная дума"], ["Срок президентства в РФ?", "6 лет"],
        ["Что такое инфляция?", "Обесценивание денег"], ["Конституция РФ принята в...", "1993"]
    ];
    const biologyFacts = [
        ["Фотосинтез происходит в ...", "Хлоропластах"],
        ["Самый большой орган человека?", "Кожа"],
        ["Процесс деления клетки?", "Митоз"],
        ["Единица наследственности?", "Ген"],
        ["Сколько камер в сердце человека?", "4"],
        ["Сколько костей у взрослого человека?", "206"]
    ];
    const elements = [
        ["Au","Золото"], ["Ag","Серебро"], ["Fe","Железо"], ["Pb","Свинец"], ["Hg","Ртуть"],
        ["O","Кислород"], ["H","Водород"], ["Na","Натрий"], ["Cl","Хлор"]
    ];
    const physicsFacts = [
        ["Единица измерения силы?", "Ньютон"], ["Закон всемирного тяготения открыл?", "Ньютон"],
        ["Скорость света в вакууме (км/с)?", "300000"], ["Частица с положительным зарядом?", "Протон"],
        ["Что измеряет вольтметр?", "Напряжение"], ["Радуга объясняется...", "Дисперсией"]
    ];
    const spellingWords = [
        { word: "прекрасный", wrong: ["прекрастный","прекрасныйь","прекрасны"] },
        { word: "участвовать", wrong: ["учавствовать","участвововать","учавствоать"] },
        { word: "компромисс", wrong: ["компромиc","кампромисс","компромис"] }
    ];

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
    function unique(arr) { return [...new Set(arr)]; }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function simpleHash(str) { let h=0; for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i),h|=0; return h; }
    function declineCountry(c) {
        const e = {"Россия":"России","США":"США","Франция":"Франции","Германия":"Германии","Китай":"Китая","Япония":"Японии","Италия":"Италии","Великобритания":"Великобритании","Испания":"Испании"};
        return e[c] || c+'а';
    }
    function declineElement(n) {
        const e = {"Золото":"золота","Серебро":"серебра","Железо":"железа","Свинец":"свинца","Ртуть":"ртути"};
        return e[n] || n.toLowerCase()+'а';
    }

    // Генераторы вопросов (с перемешиванием)
    function generateMathQuestion(level) {
        let a = Math.floor(Math.random()*9)+2, b = Math.floor(Math.random()*9)+2;
        let ops=['+','-','×']; if(level>=3) ops.push('÷');
        let op=randomItem(ops), correct, text, opts;
        if(op==='+'){ correct=a+b; text=`${a} + ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0);}
        else if(op==='-'){ if(a<b)[a,b]=[b,a]; correct=a-b; text=`${a} - ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>=0); if(correct===0) opts=[0,1,2,3];}
        else if(op==='×'){ correct=a*b; text=`${a} × ${b} = ?`; opts=[correct,correct+2,correct-2,correct+1].filter(v=>v>0);}
        else{ let dividend=a*b; let divisor=b; correct=a; text=`${dividend} ÷ ${divisor} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0);}
        if(opts.length<4) opts.push(Math.abs(correct)+3);
        opts=unique(opts).slice(0,4); while(opts.length<4) opts.push((correct+1).toString());
        return { text, options: shuffle(opts.map(String)), correctHash: simpleHash(correct.toString()), points: 10+Math.floor(level/2) };
    }
    function generateHistoryQuestion(){ let ev=randomItem(historyQA); let wrongs=historyQA.filter(e=>e.type===ev.type && e.a!==ev.a).map(e=>e.a).slice(0,3); if(wrongs.length<3) wrongs.push(ev.type==='person'?"Иван Грозный":"1500"); let opts=unique([ev.a,...wrongs]).slice(0,4); while(opts.length<4) opts.push(ev.type==='person'?"Александр Невский":"1600"); return { text: ev.q, options: shuffle([...opts]), correctHash: simpleHash(ev.a), points:10 }; }
    function generateGeoQuestion(){ let p=randomItem(countryCapital); let text=`Столица ${declineCountry(p[0])}?`; let correct=p[1]; let wrongs=countryCapital.filter(c=>c[0]!==p[0]).map(c=>c[1]).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Лондон"); return { text, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generateLiteratureQuestion(){ let item=randomItem(authorWorkExtended); let verb=item.gender==="male"?"написал":"написала"; let text=`${item.author} ${verb} произведение ...`; let correct=item.work; let wrongs=authorWorkExtended.filter(w=>w.work!==correct).map(w=>w.work).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Война и мир"); return { text, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generateEnglishQuestion(){ let w=randomItem(engWords); let correct=w[1]; let wrongs=engWords.filter(e=>e[1]!==correct).map(e=>e[1]).slice(0,3); if(wrongs.length<3) wrongs.push("unknown"); let opts=unique([correct,...wrongs]).slice(0,4); return { text:`Перевод слова "${w[0]}":`, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generateOBZHQuestion(){ let f=randomItem(obzhFacts); let opts=unique([f.correct,...f.wrong]); while(opts.length<4) opts.push("Неизвестно"); return { text: f.q, options: shuffle([...opts]), correctHash: simpleHash(f.correct), points:10 }; }
    function generateSocietyQuestion(){ let f=randomItem(societyFacts); let wrongs=societyFacts.filter(s=>s[1]!==f[1]).map(s=>s[1]).slice(0,3); let opts=unique([f[1],...wrongs]); while(opts.length<4) opts.push("Неизвестно"); return { text: f[0], options: shuffle([...opts]), correctHash: simpleHash(f[1]), points:10 }; }
    function generateBiologyQuestion(){ let f=randomItem(biologyFacts); let correct=f[1]; let wrongs=biologyFacts.filter(b=>b[1]!==correct).map(b=>b[1]).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Неизвестно"); return { text: f[0], options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generateChemistryQuestion(){ let e=randomItem(elements); let text=`Химический символ ${declineElement(e[1])}?`; let correct=e[0]; let wrongs=elements.filter(el=>el[0]!==correct).map(el=>el[0]).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("??"); return { text, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generatePhysicsQuestion(){ let f=randomItem(physicsFacts); let wrongs=physicsFacts.filter(p=>p[1]!==f[1]).map(p=>p[1]).slice(0,3); let opts=unique([f[1],...wrongs]); while(opts.length<4) opts.push("Энергия"); return { text: f[0], options: shuffle([...opts]), correctHash: simpleHash(f[1]), points:10 }; }
    function generateRussianQuestion(){ let base=randomItem(spellingWords); let opts=[base.word,...base.wrong]; opts=unique(opts); if(opts.length<4) opts.push(base.word.slice(0,-2)+"а"); return { text: `Выберите правильное написание слова:`, options: shuffle(opts.slice(0,4)), correctHash: simpleHash(base.word), points:10 }; }

    // ========== ИГРОВАЯ ЛОГИКА ==========
    const allSubjects = ["math","russian","geo","history","literature","english","obzh","society","biology","chemistry","physics"];
    const subjectNames = {
        math:"Математика", russian:"Русский язык", geo:"География", history:"История",
        literature:"Литература", english:"Английский", obzh:"ОБЖ", society:"Обществознание",
        biology:"Биология", chemistry:"Химия", physics:"Физика"
    };
    // Прогресс: для каждого предмета уровень, очки внутри предмета? Но у нас глобальные очки? По дизайну: есть глобальный уровень и очки, а у предметов свои уровни. Сделаем так: глобальные очки = сумма очков за все ответы, глобальный уровень вычисляется из очков (например, 100 очков = 1 уровень). У предметов свой уровень (прогресс по предмету). 
    let globalScore = 0;
    let globalLevel = 1;
    let combo = 0;
    let currentSubject = "math";
    let currentQuestion = null;
    let selectedAnswer = null;
    let waitingForNext = false;
    let gameActive = true;
    let adLastShown = 0;
    let isAdWatching = false;
    let adTimerInterval = null;
    const MAX_LIVES = 5; // жизни не используем в этом дизайне? На картинке нет жизней, но для полноты оставим, но скроем интерфейс.
    let subjectLevels = {}; // уровень каждого предмета
    let usedQuestions = {};  // использованные вопросы по каждому предмету

    // Загрузка/сохранение прогресса в localStorage и VK Storage (как раньше)
    function saveAllProgress() {
        const data = {
            globalScore, globalLevel, combo, subjectLevels,
            usedQuestions: Object.fromEntries(Object.entries(usedQuestions).map(([k,v])=>[k, Array.from(v)]))
        };
        localStorage.setItem('quizNewProgress', JSON.stringify(data));
        if(window.vkBridge) {
            vkBridge.send("VKWebAppStorageSet", { key: "quizNewProgress", value: JSON.stringify(data) }).catch(e=>console.warn);
        }
    }
    async function loadAllProgress() {
        try {
            let saved = localStorage.getItem('quizNewProgress');
            if(!saved && window.vkBridge) {
                const res = await vkBridge.send("VKWebAppStorageGet", { keys: ["quizNewProgress"] });
                if(res.keys[0]) saved = res.keys[0].value;
            }
            if(saved) {
                const data = JSON.parse(saved);
                globalScore = data.globalScore || 0;
                globalLevel = data.globalLevel || 1;
                combo = data.combo || 0;
                subjectLevels = data.subjectLevels || {};
                usedQuestions = {};
                if(data.usedQuestions) {
                    for(let s of allSubjects) {
                        if(data.usedQuestions[s]) usedQuestions[s] = new Set(data.usedQuestions[s]);
                        else usedQuestions[s] = new Set();
                    }
                } else {
                    for(let s of allSubjects) usedQuestions[s] = new Set();
                }
                for(let s of allSubjects) if(!subjectLevels[s]) subjectLevels[s] = 1;
                return true;
            }
        } catch(e) {}
        // инициализация
        globalScore = 0;
        globalLevel = 1;
        combo = 0;
        subjectLevels = {};
        for(let s of allSubjects) subjectLevels[s] = 1;
        usedQuestions = {};
        for(let s of allSubjects) usedQuestions[s] = new Set();
        saveAllProgress();
        return false;
    }

    function updateGlobalLevel() {
        let newLevel = Math.floor(globalScore / 100) + 1;
        if(newLevel > globalLevel) globalLevel = newLevel;
        updateUIStats();
    }
    function updateUIStats() {
        document.getElementById("scoreValue").innerText = globalScore;
        document.getElementById("comboValue").innerText = combo;
        let rating = "#" + Math.floor(globalScore / 10);
        document.getElementById("ratingValue").innerText = rating;
        document.getElementById("globalLevel").innerText = globalLevel;
        let nextThreshold = globalLevel * 100;
        let progress = (globalScore % 100) / 100 * 100;
        document.getElementById("globalProgress").style.width = progress + "%";
        let needed = nextThreshold - globalScore;
        document.getElementById("nextLevelHint").innerHTML = `До след. уровня: ${needed} очков`;
        document.getElementById("comboBadge").innerHTML = `СЕРИЯ ${combo}`;
    }

    function updateSubjectLevelsUI() {
        const row = document.getElementById("subjectsRow");
        row.innerHTML = "";
        for(let s of allSubjects) {
            const card = document.createElement("div");
            card.className = "subject-card";
            if(s === currentSubject) card.classList.add("active");
            card.innerHTML = `<div class="subject-name">${subjectNames[s]}</div><div class="subject-level">Ур. ${subjectLevels[s]}</div>`;
            card.addEventListener("click", () => {
                if(s === currentSubject) return;
                saveAllProgress();
                currentSubject = s;
                waitingForNext = false;
                selectedAnswer = null;
                loadNewQuestion();
                renderSubjectsUI();
            });
            row.appendChild(card);
        }
    }
    function renderSubjectsUI() {
        document.querySelectorAll(".subject-card").forEach((card, idx) => {
            const s = allSubjects[idx];
            if(s === currentSubject) card.classList.add("active");
            else card.classList.remove("active");
            card.querySelector(".subject-level").innerText = `Ур. ${subjectLevels[s]}`;
        });
    }

    function getUniqueQuestion(subject, lvl) {
        if(!usedQuestions[subject]) usedQuestions[subject] = new Set();
        let attempts=0, q;
        while(attempts<100) {
            if(subject==='math') q=generateMathQuestion(lvl);
            else if(subject==='russian') q=generateRussianQuestion();
            else if(subject==='geo') q=generateGeoQuestion();
            else if(subject==='history') q=generateHistoryQuestion();
            else if(subject==='literature') q=generateLiteratureQuestion();
            else if(subject==='english') q=generateEnglishQuestion();
            else if(subject==='obzh') q=generateOBZHQuestion();
            else if(subject==='society') q=generateSocietyQuestion();
            else if(subject==='biology') q=generateBiologyQuestion();
            else if(subject==='chemistry') q=generateChemistryQuestion();
            else if(subject==='physics') q=generatePhysicsQuestion();
            let key = q.text + q.correctHash;
            if(!usedQuestions[subject].has(key)) {
                usedQuestions[subject].add(key);
                return q;
            }
            attempts++;
        }
        return null;
    }

    function loadNewQuestion() {
        if(!gameActive) return;
        let q = getUniqueQuestion(currentSubject, subjectLevels[currentSubject]);
        if(!q) {
            // вопросы кончились – повысим уровень? Или просто завершим?
            finishGame(true);
            return;
        }
        currentQuestion = q;
        selectedAnswer = null;
        waitingForNext = false;
        renderUI();
    }

    function advance(isCorrect) {
        if(isCorrect) {
            let earned = currentQuestion.points;
            globalScore += earned;
            combo++;
            if(combo>=3) {
                let bonus = 15;
                globalScore += bonus;
                showTemporaryMessage(`+${bonus} бонус за серию!`);
            }
            updateGlobalLevel();
            updateUIStats();
            // повышаем уровень предмета каждые 3 правильных ответа подряд? По дизайну предметы имеют уровни, но логику можно сделать: за каждый правильный ответ увеличиваем счетчик, и через N правильных повышаем уровень предмета.
            // Для простоты: каждый правильный ответ дает прогресс предмета, и при достижении 3 правильных подряд повышаем уровень предмета.
            // Реализуем: хранить предметный прогресс отдельно.
            if(!window.itemProgress) window.itemProgress = {};
            if(!window.itemProgress[currentSubject]) window.itemProgress[currentSubject] = 0;
            window.itemProgress[currentSubject]++;
            if(window.itemProgress[currentSubject] >= 3) {
                subjectLevels[currentSubject]++;
                window.itemProgress[currentSubject] = 0;
                showTemporaryMessage(`Уровень ${subjectNames[currentSubject]} повышен до ${subjectLevels[currentSubject]}!`);
                renderSubjectsUI();
            }
            saveAllProgress();
        } else {
            combo = 0;
            updateUIStats();
            // при ошибке сбрасываем прогресс предмета
            if(window.itemProgress) window.itemProgress[currentSubject] = 0;
            showTemporaryMessage(`❌ Ошибка! Правильно: ${currentQuestion.options.find(opt => simpleHash(opt) === currentQuestion.correctHash)}`, 2000);
            saveAllProgress();
        }
        waitingForNext = false;
        loadNewQuestion();
    }

    function handleAnswerSubmit(selected) {
        if(waitingForNext || !gameActive || !selected) return;
        const isCorrect = (simpleHash(selected) === currentQuestion.correctHash);
        if(isCorrect) {
            advance(true);
        } else {
            advance(false);
        }
        waitingForNext = true;
        // сбросить выделение кнопок
    }

    function renderUI() {
        if(!currentQuestion) return;
        document.getElementById("subjectLevelDisplay").innerHTML = `Уровень ${subjectLevels[currentSubject]} • ${subjectNames[currentSubject]}`;
        document.getElementById("questionText").innerHTML = escapeHtml(currentQuestion.text);
        const grid = document.getElementById("answersGrid");
        grid.innerHTML = "";
        currentQuestion.options.forEach((opt, idx) => {
            const btn = document.createElement("button");
            btn.className = "answer-btn";
            btn.innerText = `${idx+1}️⃣ ${opt}`;
            btn.setAttribute("data-value", opt);
            btn.onclick = () => {
                if(waitingForNext) return;
                document.querySelectorAll(".answer-btn").forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");
                selectedAnswer = opt;
            };
            grid.appendChild(btn);
        });
        // обработка кнопки "Далее"
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.onclick = () => {
            if(selectedAnswer && !waitingForNext) handleAnswerSubmit(selectedAnswer);
            else if(!selectedAnswer) showTemporaryMessage("Выберите вариант ответа");
        };
        // подсказка (заглушка)
        document.getElementById("hintBtn").onclick = () => showTemporaryMessage("Подсказка: внимательно подумайте");
        // бонус +25 очков (можно с рекламой или просто)
        document.getElementById("bonusBtn").onclick = async () => {
            if(waitingForNext) return;
            // можно добавить рекламу за бонус
            if(window.vkBridge && Date.now() - adLastShown > 30000) {
                adLastShown = Date.now();
                try {
                    const result = await vkBridge.send("VKWebAppShowNativeAds", { ad_format: "reward" });
                    if(result && result.result === true) {
                        globalScore += 25;
                        updateGlobalLevel();
                        updateUIStats();
                        saveAllProgress();
                        showTemporaryMessage("Бонус +25 очков получен!");
                    } else showTemporaryMessage("Реклама не досмотрена");
                } catch(e) { showTemporaryMessage("Ошибка рекламы"); }
            } else {
                showTemporaryMessage("Бонус доступен раз в 30 секунд");
            }
        };
    }

    function showTemporaryMessage(msg, duration=2000) {
        const fb = document.getElementById("feedbackMsg");
        fb.style.display = "block";
        fb.innerHTML = msg;
        setTimeout(() => {
            fb.style.display = "none";
        }, duration);
    }
    function finishGame(success) {
        // не используется
    }

    async function initGame() {
        await loadAllProgress();
        updateUIStats();
        updateSubjectLevelsUI();
        loadNewQuestion();
    }

    // Инициализация VK Bridge и согласие
    function showConsentModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-content">
            <h4>📋 Добро пожаловать!</h4>
            <p>Продолжая, вы принимаете <strong><a id="termsLinkModal" style="color:#ffc107;">Пользовательское соглашение</a></strong> и <strong><a id="privacyLinkModal" style="color:#ffc107;">Политику конфиденциальности</a></strong>.</p>
            <p style="font-size:12px;">📧 Контакты: vova_polyakov_94@mail.ru</p>
            <button class="modal-btn confirm" id="acceptBtn">Принимаю и начинаю</button>
        </div>`;
        document.body.appendChild(modal);
        document.getElementById("termsLinkModal").onclick = (e) => { e.preventDefault(); alert("Пользовательское соглашение: ..."); };
        document.getElementById("privacyLinkModal").onclick = (e) => { e.preventDefault(); alert("Политика конфиденциальности: данные хранятся в VK Storage"); };
        document.getElementById("acceptBtn").onclick = () => {
            modal.remove();
            localStorage.setItem('consentGiven', 'true');
            initGame();
        };
    }

    if(window.vkBridge) {
        vkBridge.send("VKWebAppInit").then(()=>{
            if(!localStorage.getItem('consentGiven')) showConsentModal();
            else initGame();
        }).catch(()=>{ if(!localStorage.getItem('consentGiven')) showConsentModal(); else initGame(); });
    } else {
        if(!localStorage.getItem('consentGiven')) showConsentModal();
        else initGame();
    }

    // Нижняя навигация (заглушка)
    document.querySelectorAll(".nav-item").forEach(item => {
        item.addEventListener("click", () => {
            alert("Раздел в разработке");
        });
    });
</script>
