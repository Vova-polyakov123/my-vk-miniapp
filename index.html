            padding: 0;
            box-sizing: border-box;

            align-items: center;
            padding: 0;
        }

            width: 100%;
            background: #0a0f1c;
            min-height: 100vh;
            position: relative;
            color: #fff;
        }

            background: linear-gradient(135deg, #4F7CFF 0%, #6A5CFF 50%, #8A4FFF 100%);

            border-radius: 0 0 30px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
        }
        .stat-card {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 12px 16px;
            min-width: 90px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .stat-label {
            font-size: 0.7rem;
            opacity: 0.8;
        }
        .subjects-levels {
            background: #111827;
            padding: 16px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #1f2a3e;
            margin-top: -20px;
            border-radius: 30px 30px 0 0;
            position: relative;
            z-index: 1;
        }
        .subjects-levels::-webkit-scrollbar {
            height: 3px;
        }
        .subjects-levels::-webkit-scrollbar-track {
            background: #1f2a3e;
            border-radius: 3px;
        }
        .subjects-levels::-webkit-scrollbar-thumb {
            background: #4F7CFF;
            border-radius: 3px;
        }
        .subject-level-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .subject-level-item .subject-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .subject-level-item .level {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .subject-level-item.active .subject-name {
            color: #4F7CFF;
        }
        .game-area {
            padding: 20px;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            color: #9ca3af;
        }
        .series-badge {
            background: #1f2a3e;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .bonus-badge {
            background: #f59e0b;
            padding: 4px 12px;
            border-radius: 20px;
            color: #000;
            font-weight: bold;
        }
        .question-card {
            background: #1e293b;
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .answer-btn {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 60px;
            padding: 14px 18px;
            font-weight: 500;
            font-size: 1rem;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
        }
        .answer-btn.selected {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .feedback {
            text-align: center;
            padding: 12px;
            background: #0f172a;
            border-radius: 20px;
            margin-top: 16px;
            display: none;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .action-btn {
            flex: 1;
            background: #1f2a3e;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-btn.primary {
            background: #3b82f6;
        }
        .action-btn.warning {
            background: #f59e0b;
            color: #000;
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .next-btn {
            width: 100%;
            background: #3b82f6;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 16px;
            cursor: pointer;
            color: white;
        }
        .hidden {
            display: none;
        }
        .daily-reward, .achievements, .invite-friends, .top-players {
            background: #111827;
            margin: 20px;
            padding: 16px;
            border-radius: 24px;
        }
        .daily-title, .section-title {
            font-weight: bold;
            margin-bottom: 12px;
        }
        .calendar {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 12px;
        }
        .day-box {
            background: #1f2a3e;
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .day-box.active {
            background: #f59e0b;
            color: #000;
        }
        .claim-btn {
            background: #3b82f6;
            width: 100%;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .achievement-item {
            margin-bottom: 16px;
        }
        .achievement-title {
            font-size: 0.9rem;
            font-weight: 600;
        }
        .achievement-progress {
            background: #1f2a3e;
            height: 8px;
            border-radius: 4px;
            margin-top: 4px;
            overflow: hidden;
        }
        .achievement-fill {
            background: #3b82f6;
            height: 100%;
            width: 0%;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.85rem;
        }
        .invite-btn {
            background: #3b82f6;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 8px;
            width: 100%;
            cursor: pointer;
            color: white;
        }
        .bottom-nav {
            background: #111827;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px;
            border-top: 1px solid #1f2a3e;
            position: sticky;
            bottom: 0;
        }
        .nav-item {
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
            color: #6b7280;
        }
        .nav-item.active {
            color: #3b82f6;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;

        .modal-content {
            background: #1e293b;
            max-width: 300px;
            width: 80%;
            border-radius: 24px;
            padding: 20px;
            text-align: center;

            margin-top: 16px;

            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.confirm {
            background: #f59e0b;
            color: black;
        }
        .modal-btn.cancel {
            background: #334155;
            color: white;
        }
        .close-modal {
            background: #3b82f6;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 12px;
            cursor: pointer;
            width: 100%;

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 20px;
            top: -20px;
            z-index: 1000;

    <div class="subjects-levels" id="subjectsLevels"></div>
    <div id="gameTab">

                </div>
                <button class="next-btn hidden" id="nextBtn">Далее</button>
                <button class="next-btn" id="bonusLifeBtn" style="background:#f59e0b;">❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button>
            </div>
        </div>
        <div class="daily-reward" id="dailyRewardBlock">
            <div class="daily-title">Ежедневная награда</div>
            <div class="calendar" id="calendarContainer"></div>
            <button class="claim-btn" id="claimDailyBtn">Забрать награду</button>
        </div>
        <div class="achievements" id="achievementsBlock">
            <div class="section-header"><span>Достижения</span><span style="font-size:0.7rem;">Смотреть все &gt;</span></div>
            <div id="achievementsList"></div>
        </div>
        <div class="top-players" id="topPlayersBlock">
            <div class="section-title">Топ игроков</div>
            <div id="topPlayersList"></div>
        </div>
        <div class="invite-friends">
            <div>Пригласить друзей</div>
            <button class="invite-btn" id="inviteFriendsBtn">📢 Пригласить</button>
        </div>
    </div>
    <div id="achievementsFullTab" style="display:none;">
        <div class="achievements" style="margin-top:20px;">
            <div class="section-header"><span>Все достижения</span></div>
            <div id="achievementsFullList"></div>
        </div>
    </div>
    <div id="profileTab" style="display:none;">
        <div class="achievements" style="margin-top:20px;">
            <div class="section-header"><span>Мой профиль</span></div>
            <p>ID: <span id="userId"></span></p>
            <p>Всего очков: <span id="totalScoreProfile">0</span></p>
            <p>Всего вопросов: <span id="totalQuestions">0</span></p>
            <button class="invite-btn" id="deleteDataLink" style="background:#e64646;">🗑 Удалить данные</button>

            <button class="invite-btn" id="privacyLink">Политика конфиденциальности</button>
        </div>
    </div>
    <div class="bottom-nav">
        <div class="nav-item active" data-tab="game">Главная</div>
        <div class="nav-item" data-tab="achievements">Достижения</div>
        <div class="nav-item" data-tab="profile">Профиль</div>
    </div>
</div>

    function generateMathQuestion(level) {
        let complexity = Math.min(3+Math.floor(level/3),12);
        let a = Math.floor(Math.random()*(5+complexity))+2;
        let b = Math.floor(Math.random()*(5+complexity))+2;
        let ops = ['+','-','×']; if(level>=3) ops.push('÷');
        let op = randomItem(ops);
        let correct, text, opts;
        if(op==='+'){ correct=a+b; text=`${a} + ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0); }
        else if(op==='-'){ if(a<b)[a,b]=[b,a]; correct=a-b; text=`${a} - ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>=0); if(correct===0) opts=[0,1,2,3]; }
        else if(op==='×'){ correct=a*b; text=`${a} × ${b} = ?`; opts=[correct,correct+2,correct-2,correct+1].filter(v=>v>0); }
        else{ let dividend=a*b; let divisor=b; correct=a; text=`${dividend} ÷ ${divisor} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0); }
        if(opts.length<4) opts.push(Math.abs(correct)+3);
        opts = unique(opts);
        while(opts.length<4) opts.push((Number(correct)+1).toString());
        return { text, options: shuffle(opts.map(String)), correctHash: simpleHash(correct.toString()), points: 10+Math.floor(level/2) };
    }

    function generateRussianQuestion(){

    }

            let storedData = null;
            let storedTimestamp = 0;
            for (let item of res.keys) {
                if (item.key === "quizProgress") storedData = item.value;

            if (storedData) {
                const parsed = JSON.parse(storedData);
                const fixed = validateAndFixProgress(parsed);
                return { data: fixed, timestamp: storedTimestamp };
            }
            return null;
        } catch(e) { console.warn("VK Storage load error", e); return null; }

            else if(subject==='literature') q=generateLiteratureQuestion();
            else if(subject==='english') q=generateEnglishQuestion();
            else if(subject==='obzh') q=generateOBZHQuestion();
            else if(subject==='society') q=generateSocietyQuestion();
            else if(subject==='biology') q=generateBiologyQuestion();
            else if(subject==='chemistry') q=generateChemistryQuestion();
            else if(subject==='physics') q=generatePhysicsQuestion();
            attempts++;
            if(attempts>maxAttempts) { return null; }
        } while(p.usedQuestions.has(q.text+q.correctHash));
        p.usedQuestions.add(q.text+q.correctHash);
        return q;
    }

    function loadNewQuestion() {
        if(!gameActive) return;
        waitingForNext = false;
        const p = getCurrentProgress();
        if(p.lives<=0) { offerAdForRevival(); return; }
        let q = getUniqueQuestion(currentSubject, p.level);
        if(!q) {
            finishGame(true);
            return;
        }
        currentQuestion = q;
        selectedAnswer = null;
        fiftyUsed = false;
        bonusPointsUsed = false;
        currentOriginalOptions = [...q.options];
        renderUI();
    }

    function advance(isCorrect) {
        const p = getCurrentProgress();
        if(!isCorrect) p.levelPerfect = false;
        p.qInLevel++;
        if(isCorrect) {
            seriesCounter++;
            if(seriesCounter>3) seriesCounter=3;
            document.getElementById("seriesBadge").innerText = `СЕРИЯ ${seriesCounter}`;
            let bonus = seriesCounter===2?15: seriesCounter===3?25:0;
            document.getElementById("bonusBadge").innerHTML = `+${bonus} бонус`;
            p.totalScore += bonus;
        } else {
            seriesCounter = 1;
            document.getElementById("seriesBadge").innerText = `СЕРИЯ 1`;
            document.getElementById("bonusBadge").innerHTML = `+15 бонус`;
        }
        updateUISave();
        if(p.qInLevel >= Q_PER_LEVEL) {
            let levelBonus=50;
            p.totalScore += levelBonus;
            if(p.levelPerfect) { showConfettiAdaptive(); showTemporaryMessage(`🎉 ИДЕАЛЬНЫЙ УРОВЕНЬ ${p.level}! +${levelBonus} бонусов!`); }
            p.level++; p.qInLevel=0; p.levelPerfect=true;
            updateUISave();
            setTimeout(()=>loadNewQuestion(),400);
            return;
        }
        loadNewQuestion();
    }

    function handleAnswerSubmit() {
        if(waitingForNext || !gameActive || !selectedAnswer) return;
        const isCorrect = (simpleHash(selectedAnswer) === currentQuestion.correctHash);
        const p = getCurrentProgress();
        const fbDiv = document.getElementById("feedbackMsg");
        if(isCorrect) {
            let earned = currentQuestion.points;
            p.totalScore += earned;
            p.combo++;
            let comboBonus = p.combo>=3?15:0;
            if(comboBonus>0){ p.totalScore+=comboBonus; fbDiv.innerHTML=`✅ ВЕРНО! +${earned} + комбо x${p.combo} +${comboBonus}! 🔥`;}
            else fbDiv.innerHTML=`✅ ВЕРНО! +${earned} очков. Отлично!`;
            updateUISave();
        } else {
            p.lives--; p.combo=0; updateUISave();
            let correctAnswer = currentQuestion.options.find(opt => simpleHash(opt) === currentQuestion.correctHash);
            fbDiv.innerHTML = `❌ ОШИБКА! Правильно: ${correctAnswer}. Жизней: ${p.lives}`;
            if(p.lives<=0){ waitingForNext=true; offerAdForRevival(); return; }
        }
        waitingForNext=true;
        document.querySelectorAll(".answer-btn").forEach(btn=>btn.disabled=true);
        const nextBtn = document.getElementById("nextBtn");
        if(nextBtn) nextBtn.classList.add("hidden");
        saveAllProgress();
        advance(isCorrect);
    }

    function showTemporaryMessage(msg, duration=3000) {
        const fb = document.getElementById("feedbackMsg");
        if(fb){ fb.style.display="block"; fb.innerHTML=msg; setTimeout(()=>{ if(fb.innerHTML===msg){ fb.style.display="none"; fb.innerHTML=""; } }, duration); }
    }

    function updateAdButtonTimer() {
        const bonusBtn = document.getElementById("bonusLifeBtn");
        if (!bonusBtn) return;
        const now = Date.now();
        const remaining = Math.max(0, 30000 - (now - adLastShown));
        if (remaining > 0 && adLastShown > 0) {
            const seconds = Math.ceil(remaining / 1000);
            bonusBtn.disabled = true;
            bonusBtn.textContent = `❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ (${seconds} с)`;
        } else {
            bonusBtn.disabled = false;
            bonusBtn.textContent = `❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ`;
            if (adTimerInterval) clearInterval(adTimerInterval);
            adTimerInterval = null;
        }
    }

    async function showRewardedAd(adType) {
        if(!window.vkBridge) return false;
        const now=Date.now();
        if(now-adLastShown<30000){
            const sec = Math.ceil((30000 - (now - adLastShown)) / 1000);
            showTemporaryMessage(`⚠️ Рекламу можно смотреть не чаще 1 раза в 30 секунд. Подождите ${sec} с.`);
            updateAdButtonTimer();
            return false;
        }
        if(isAdWatching) return false;
        isAdWatching=true; adLastShown=now;
        updateAdButtonTimer();
        if(adTimerInterval) clearInterval(adTimerInterval);
        adTimerInterval = setInterval(() => updateAdButtonTimer(), 1000);
        try{
            const result=await vkBridge.send("VKWebAppShowNativeAds",{ ad_format:"reward" });
            if(result && result.result===true){
                const p=getCurrentProgress();
                if(adType==='revive') p.lives=Math.min(p.lives+1, MAX_LIVES);
                else if(adType==='bonus'){ if(p.lives<MAX_LIVES) p.lives++; else{ showTemporaryMessage("У вас уже максимум жизней"); isAdWatching=false; updateAdButtonTimer(); return false; } }
                updateUISave();
                if(currentQuestion) renderUI();
                showTemporaryMessage("❤️ +1 жизнь за просмотр рекламы!");
                saveAllProgress(); return true;
            } else{ showTemporaryMessage("Реклама не досмотрена"); return false; }
        } catch(e){ console.error(e); return false; } finally{ isAdWatching=false; updateAdButtonTimer(); }
    }

    function offerAdForRevival() {
        if(!gameActive) return;
        gameActive=false;
        showConfirmModal("У вас закончились жизни! Хотите посмотреть рекламу и получить +1 жизнь?", async ()=>{
            let success=await showRewardedAd('revive');
            if(success){ gameActive=true; waitingForNext=false; if(currentQuestion) renderUI(); else loadNewQuestion(); }
            else finishGame(false);
        },()=>finishGame(false));
    }

    function finishGame(success) {
        gameActive=false;
        document.getElementById("gameTab").style.display = "none";
        document.getElementById("gameTab").innerHTML = `<div class="result-area" style="padding:40px;text-align:center;"><div class="result-score">${success?"🏆 ПОБЕДА!":"💀 ПОРАЖЕНИЕ"}</div><p style="margin:12px 0">Очки: ${getCurrentProgress().totalScore} | Уровень: ${getCurrentProgress().level}</p>
        <button class="invite-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button>
        <button class="invite-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button>
        <p style="margin-top:16px;font-size:12px;">Выберите другой предмет вверху</p></div>`;
        document.getElementById("shareBtn")?.addEventListener("click",()=>{ let txt=`Я прошёл «${subjectNames[currentSubject]}» с ${getCurrentProgress().totalScore} очков, уровень ${getCurrentProgress().level}!`; if(window.vkBridge) vkBridge.send("VKWebAppShare",{link:"https://vk.com",attachment:txt}); });
        document.getElementById("resetBtn")?.addEventListener("click",()=>{ resetSubjectProgress(currentSubject); loadNewQuestion(); });
    }

    function renderUI() {
        if(!currentQuestion) return;
        const p=getCurrentProgress();
        const q=currentQuestion;
        const hearts="❤️".repeat(p.lives)+"🖤".repeat(MAX_LIVES-p.lives);
        const bonusDisabled=(p.lives>=MAX_LIVES)?"disabled":"";
        const html=`
            <div class="question-header">
                <span class="series-badge" id="seriesBadge">СЕРИЯ ${seriesCounter}</span>
                <span class="bonus-badge" id="bonusBadge">+${seriesCounter===1?15:seriesCounter===2?15:25} бонус</span>
            </div>
            <div class="question-card">
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="answers" id="answersContainer">${q.options.map(opt=>`<button class="answer-btn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}</div>
                <div class="feedback" id="feedbackMsg" style="display:none;"></div>
                <div class="action-buttons">
                    <button class="action-btn" id="fiftyFiftyBtn" ${fiftyUsed ? "disabled" : ""}>50/50 Подсказка</button>
                    <button class="action-btn warning" id="bonusPointsBtn" ${bonusPointsUsed ? "disabled" : ""}>Бонус +25 очков</button>
                </div>
                <button class="next-btn hidden" id="nextBtn">Далее</button>
                <button class="next-btn" id="bonusLifeBtn" ${bonusDisabled} style="background:#f59e0b;">❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button>
            </div>
        `;
        document.querySelector(".game-area").innerHTML = html;
        const btns=document.querySelectorAll(".answer-btn");
        const nextBtn=document.getElementById("nextBtn");
        const bonusBtn=document.getElementById("bonusLifeBtn");
        const fiftyBtn = document.getElementById("fiftyFiftyBtn");
        const bonusPointsBtn = document.getElementById("bonusPointsBtn");
        if(bonusBtn) {
            bonusBtn.addEventListener("click",async()=>{ if(p.lives>=MAX_LIVES){ showTemporaryMessage("У вас максимум жизней"); return; } await showRewardedAd('bonus'); renderUI(); });
            updateAdButtonTimer();
        }
        if(fiftyBtn) {
            fiftyBtn.addEventListener("click",()=>{
                if(fiftyUsed) return;
                fiftyUsed = true;
                fiftyBtn.disabled = true;
                const correctOpt = q.options.find(opt => simpleHash(opt) === q.correctHash);
                const wrongOpts = q.options.filter(opt => opt !== correctOpt);
                const randomWrong = wrongOpts[Math.floor(Math.random() * wrongOpts.length)];
                const newOptions = [correctOpt, randomWrong];
                const shuffled = shuffle([...newOptions]);
                const container = document.getElementById("answersContainer");
                container.innerHTML = shuffled.map(opt => `<button class="answer-btn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('');
                document.querySelectorAll(".answer-btn").forEach(btn=>{
                    btn.addEventListener("click",()=>{
                        if(waitingForNext||!gameActive) return;
                        selectedAnswer=btn.getAttribute("data-answer");
                        document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected"));
                        btn.classList.add("selected");
                        if(nextBtn && nextBtn.classList.contains("hidden")) nextBtn.classList.remove("hidden");
                    });
                });
            });
        }
        if(bonusPointsBtn) {
            bonusPointsBtn.addEventListener("click",()=>{
                if(bonusPointsUsed) return;
                bonusPointsUsed = true;
                bonusPointsBtn.disabled = true;
                const p = getCurrentProgress();
                p.totalScore += 25;
                updateUISave();
                showTemporaryMessage("🎁 +25 очков бонусом!");
            });
        }
        btns.forEach(btn=>{
            btn.addEventListener("click",()=>{
                if(waitingForNext||!gameActive) return;
                selectedAnswer=btn.getAttribute("data-answer");
                btns.forEach(b=>b.classList.remove("selected"));
                btn.classList.add("selected");
                if(nextBtn && nextBtn.classList.contains("hidden")) nextBtn.classList.remove("hidden");
            });
        });
        if(nextBtn) {
            nextBtn.onclick = () => {
                if(selectedAnswer && !waitingForNext) handleAnswerSubmit();
                else if(!selectedAnswer) showTemporaryMessage("Выберите вариант ответа");
            };
        }
    }

    function showConfettiAdaptive() {
        let count=window.innerWidth<600?30:60;
        for(let i=0;i<count;i++){
            let c=document.createElement('div'); c.classList.add('confetti-piece');
            c.style.left=Math.random()*window.innerWidth+'px';
            c.style.backgroundColor=`hsl(${Math.random()*360},70%,60%)`;
            c.style.width=Math.random()*8+4+'px'; c.style.height=Math.random()*12+6+'px';
            c.style.animationDuration=Math.random()*1.5+1+'s';
            document.body.appendChild(c); setTimeout(()=>c.remove(),2500);
        }
    }

    function showConfirmModal(message, onConfirm, onCancel) {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><p>${message}</p><div class="modal-buttons"><button class="modal-btn confirm">Да, смотреть</button><button class="modal-btn cancel">Нет, закончить</button></div></div>`;
        document.body.appendChild(modal); document.body.classList.add('modal-open');
        const confirmBtn=modal.querySelector('.confirm'), cancelBtn=modal.querySelector('.cancel');
        const closeModal=()=>{ modal.remove(); document.body.classList.remove('modal-open'); };
        confirmBtn.onclick=()=>{ closeModal(); onConfirm(); };
        cancelBtn.onclick=()=>{ closeModal(); onCancel(); };
        modal.onclick=(e)=>{ if(e.target===modal){ closeModal(); onCancel(); } };
    }

    function buildSubjectsUI() {
        const container = document.getElementById("subjectsLevels");
        container.innerHTML = '';
        allSubjects.forEach(s=>{
            const p = progressBySubject[s] || { level: 1 };
            const div = document.createElement('div');
            div.className = 'subject-level-item';
            if(s===currentSubject) div.classList.add('active');
            div.innerHTML = `<div class="subject-name">${subjectNames[s]}</div><div class="level">Уровень ${p.level}</div>`;
            div.onclick = () => {
                if(s===currentSubject && gameActive) return;
                saveAllProgress();
                document.querySelectorAll('.subject-level-item').forEach(el=>el.classList.remove('active'));
                div.classList.add('active');
                currentSubject = s;
                if(!progressBySubject[s]) initSubjectProgress(s);
                waitingForNext=false; selectedAnswer=null; gameActive=true; isAdWatching=false;
                currentQuestion = null;
                updateUIFromProgress();
                loadNewQuestion();
            };
            container.appendChild(div);
        });
    }

    function initDailyReward() {
        const lastClaim = localStorage.getItem('dailyLastClaim');
        const today = new Date().toDateString();
        let streak = parseInt(localStorage.getItem('dailyStreak') || '0');
        if(lastClaim !== today) {
            document.getElementById("claimDailyBtn").disabled = false;
        } else {
            document.getElementById("claimDailyBtn").disabled = true;
        }
        const calendar = document.getElementById("calendarContainer");
        calendar.innerHTML = '';
        for(let i=1;i<=7;i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day-box';
            dayDiv.innerText = i;
            if(i <= streak) dayDiv.classList.add('active');
            calendar.appendChild(dayDiv);
        }
        document.getElementById("claimDailyBtn").onclick = () => {
            const now = new Date().toDateString();
            if(lastClaim === now) return;
            let s = parseInt(localStorage.getItem('dailyStreak') || '0');
            if(lastClaim !== new Date(new Date().getTime() - 86400000).toDateString()) s = 0;
            s++;
            if(s>7) s=7;
            localStorage.setItem('dailyStreak', s);
            localStorage.setItem('dailyLastClaim', now);
            const reward = s * 50;
            const p = getCurrentProgress();
            p.totalScore += reward;
            updateUISave();
            showTemporaryMessage(`🎁 Ежедневная награда: +${reward} очков!`);
            document.getElementById("claimDailyBtn").disabled = true;
            initDailyReward();
        };
    }

    function updateAchievements() {
        let totalCorrect = 0;
        let maxCombo = 0;
        let perfectLevels = 0;
        for(let s of allSubjects) {
            const p = progressBySubject[s];
            if(p) {
                totalCorrect += p.usedQuestions.size;
                if(p.combo > maxCombo) maxCombo = p.combo;
                if(p.levelPerfect) perfectLevels++;
            }
        }
        const achievements = [
            {name:"Учёный", target:100, current:totalCorrect, desc:"Ответь на 100 вопросов"},
            {name:"Неудержимый", target:10, current:maxCombo, desc:"10 ответов подряд"},
            {name:"Гений", target:10, current:perfectLevels, desc:"Пройти уровень без ошибок"}
        ];
        const list = document.getElementById("achievementsList");
        list.innerHTML = achievements.map(a => `
            <div class="achievement-item">
                <div class="achievement-title">${a.name}</div>
                <div class="achievement-progress"><div class="achievement-fill" style="width:${Math.min(100, (a.current/a.target)*100)}%"></div></div>
                <div style="font-size:0.7rem; opacity:0.7;">${a.desc} ${a.current}/${a.target}</div>
            </div>
        `).join('');
        const fullList = document.getElementById("achievementsFullList");
        if(fullList) fullList.innerHTML = list.innerHTML;
    }

    function showTermsModal() {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h4>📄 Пользовательское соглашение</h4><p>Использование Приложения означает принятие условий. Контакты: vova_polyakov_94@mail.ru</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.classList.add('modal-open');
        modal.querySelector('.close-modal').onclick=()=>{ modal.remove(); document.body.classList.remove('modal-open'); };
        modal.onclick=(e)=>{ if(e.target===modal){ modal.remove(); document.body.classList.remove('modal-open'); } };
    }
    function showPrivacyModal() {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h4>🔒 Политика конфиденциальности</h4><p>Данные хранятся локально и в VK Storage. Не передаются третьим лицам. Контакты: vova_polyakov_94@mail.ru</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.classList.add('modal-open');
        modal.querySelector('.close-modal').onclick=()=>{ modal.remove(); document.body.classList.remove('modal-open'); };
        modal.onclick=(e)=>{ if(e.target===modal){ modal.remove(); document.body.classList.remove('modal-open'); } };
    }
    function customConfirmDelete() {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h4>🗑 Подтверждение удаления</h4><p>Вы действительно хотите удалить весь прогресс? Это действие необратимо.</p><div class="modal-buttons"><button class="modal-btn danger" id="confirmDeleteBtn">🗑 Удалить</button><button class="modal-btn cancel" id="cancelDeleteBtn">Отмена</button></div></div>`;
        document.body.appendChild(modal); document.body.classList.add('modal-open');
        const confirmBtn = modal.querySelector('#confirmDeleteBtn');
        const cancelBtn = modal.querySelector('#cancelDeleteBtn');
        const closeModal = () => { modal.remove(); document.body.classList.remove('modal-open'); };
        confirmBtn.onclick = async () => {
            closeModal();
            localStorage.removeItem('quizProgressV2');
            localStorage.removeItem('quizProgressTimestamp');
            if (window.vkBridge) {
                try {
                    await vkBridge.send("VKWebAppStorageSet", { key: "quizProgress", value: "" });
                    await vkBridge.send("VKWebAppStorageSet", { key: "quizProgressTimestamp", value: "" });
                } catch(e) {}
            }
            progressBySubject={};
            for(let s of allSubjects) initSubjectProgress(s);
            currentSubject="math";
            waitingForNext=false; selectedAnswer=null; gameActive=true; isAdWatching=false;
            updateUIFromProgress();
            loadNewQuestion();
            saveAllProgress();
            showTemporaryMessage("Все данные удалены. Игра начата заново.");
        };
        cancelBtn.onclick = closeModal;
        modal.onclick = (e) => { if(e.target === modal) closeModal(); };
    }
    function showConsentModal() {
        const modalDiv=document.createElement('div'); modalDiv.className='modal';
        modalDiv.innerHTML=`<div class="modal-content" style="max-width:340px;"><h4>📋 Добро пожаловать!</h4><p>Продолжая, вы принимаете <strong><a id="termsLinkModal" style="cursor:pointer;color:#4F7CFF">Пользовательское соглашение</a></strong> и <strong><a id="privacyLinkModal" style="cursor:pointer;color:#4F7CFF">Политику конфиденциальности</a></strong>.</p><p style="font-size:12px;">📧 Контакты: vova_polyakov_94@mail.ru</p><p style="font-size:12px; margin-top:8px;">💡 Ваш прогресс автоматически синхронизируется между всеми устройствами через облако VK.</p><button class="modal-btn confirm" id="acceptBtn" style="width:100%; margin-top:12px;">Принимаю и начинаю</button></div>`;
        document.body.appendChild(modalDiv); document.body.classList.add('modal-open');
        document.getElementById("termsLinkModal").onclick=(e)=>{ e.preventDefault(); showTermsModal(); };
        document.getElementById("privacyLinkModal").onclick=(e)=>{ e.preventDefault(); showPrivacyModal(); };
        document.getElementById("acceptBtn").onclick=()=>{ modalDiv.remove(); document.body.classList.remove('modal-open'); localStorage.setItem('consentGiven','true'); startGameAfterConsent(); };
    }

    async function startGameAfterConsent() {
        buildSubjectsUI();
        const localExists = loadAllProgress();
        if (window.vkBridge) {
            const cloud = await loadFromVKStorage();
            if (cloud && cloud.data) {
                const localTimestamp = parseInt(localStorage.getItem('quizProgressTimestamp') || '0');
                if (cloud.timestamp > localTimestamp) {
                    progressBySubject = cloud.data;
                    localStorage.setItem('quizProgressV2', JSON.stringify(cloud.data));
                    localStorage.setItem('quizProgressTimestamp', cloud.timestamp.toString());
                    showTemporaryMessage("Прогресс синхронизирован с облака", 2000);
                } else if (!localExists && cloud.timestamp > 0) {
                    progressBySubject = cloud.data;
                    localStorage.setItem('quizProgressV2', JSON.stringify(cloud.data));
                    localStorage.setItem('quizProgressTimestamp', cloud.timestamp.toString());
                }
            } else if (!localExists) {
                for(let s of allSubjects) initSubjectProgress(s);
                saveAllProgress();
            }
        } else if (!localExists) {
            for(let s of allSubjects) initSubjectProgress(s);
            saveAllProgress();
        }
        updateUIFromProgress();
        initDailyReward();
        updateAchievements();
        loadNewQuestion();
    }

    function setupTabs() {
        const tabs = document.querySelectorAll('.nav-item');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('gameTab').style.display = 'none';
                document.getElementById('achievementsFullTab').style.display = 'none';
                document.getElementById('profileTab').style.display = 'none';
                if(target === 'game') document.getElementById('gameTab').style.display = 'block';
                else if(target === 'achievements') {
                    document.getElementById('achievementsFullTab').style.display = 'block';
                    updateAchievements();
                }
                else if(target === 'profile') {
                    document.getElementById('profileTab').style.display = 'block';
                    const userId = localStorage.getItem('vk_user_id') || 'Неизвестно';
                    document.getElementById('userId').innerText = userId;
                    let totalQ = 0;
                    for(let s of allSubjects) if(progressBySubject[s]) totalQ += progressBySubject[s].usedQuestions.size;
                    document.getElementById('totalQuestions').innerText = totalQ;
                }
            });
        });
    }

    function init() {
        document.getElementById("termsLink").onclick=showTermsModal;
        document.getElementById("privacyLink").onclick=showPrivacyModal;
        document.getElementById("deleteDataLink").onclick=customConfirmDelete;
        document.getElementById("inviteFriendsBtn").onclick=()=>{
            if(window.vkBridge) vkBridge.send("VKWebAppShare",{link:"https://vk.com",attachment:"Присоединяйся к Битве знаний!"});
        };
        setupTabs();
        if(window.vkBridge){
            vkBridge.send("VKWebAppInit").then(()=>{
                if(!localStorage.getItem('consentGiven')) showConsentModal();
                else startGameAfterConsent();
            }).catch(()=>{ if(!localStorage.getItem('consentGiven')) showConsentModal(); else startGameAfterConsent(); });
        } else { if(!localStorage.getItem('consentGiven')) showConsentModal(); else startGameAfterConsent(); }
    }
    init();
</script>
