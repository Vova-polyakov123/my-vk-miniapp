<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Битва знаний — полная версия</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }
        .app {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(18, 25, 45, 0.9);
            border-radius: 48px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header {
            background: linear-gradient(135deg, #6e2cf5, #a742f5);
            padding: 20px;
            text-align: center;
            color: white;
        }
        h1 {
            margin: 0;
            font-size: 1.8rem;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 10px 20px;
            margin-top: 16px;
            font-weight: bold;
        }
        .subjects {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            justify-content: center;
        }
        .subject-btn {
            background: #2a3a60;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .subject-btn.active {
            background: #f56b2c;
            box-shadow: 0 0 10px rgba(245,107,44,0.5);
        }
        .game {
            padding: 20px;
            min-height: 450px;
        }
        .lives {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-bottom: 12px;
        }
        .heart {
            font-size: 28px;
            color: #ff3366;
            filter: drop-shadow(0 0 4px gold);
        }
        .heart-lost {
            opacity: 0.3;
            filter: grayscale(0.8);
        }
        .question {
            background: rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.4rem;
            text-align: center;
            color: white;
            margin-bottom: 24px;
            word-break: break-word;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .answer {
            background: linear-gradient(95deg, #1e2a44, #0f172a);
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .answer.selected {
            background: linear-gradient(95deg, #6e2cf5, #9b4dff);
            box-shadow: 0 0 12px #9b4dff;
        }
        .feedback {
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            padding: 12px;
            margin: 16px 0;
            text-align: center;
            color: #ffd966;
            display: none;
        }
        button.next {
            background: linear-gradient(90deg, #6e2cf5, #a742f5);
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
        }
        .bonus {
            background: linear-gradient(90deg, #ff9800, #ffbc3c);
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 60px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .hint {
            background: rgba(255,255,255,0.2);
            width: 100%;
            border: 1px solid #ffd966;
            padding: 12px;
            border-radius: 60px;
            margin-top: 10px;
            color: #ffd966;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            text-align: center;
            padding: 30px;
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
        }
        .result button {
            margin: 8px;
            padding: 12px 24px;
            border-radius: 60px;
            border: none;
            font-weight: bold;
        }
        footer {
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        footer a {
            color: #ffaa66;
            margin: 0 12px;
            text-decoration: none;
        }
        @media (max-width: 500px) {
            .question-text { font-size: 1.2rem; }
            .answer { padding: 12px 16px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>⚡ БИТВА ЗНАНИЙ <span style="font-size: 0.8rem;">2026</span></h1>
        <div class="stats">
            <div>🏆 ОЧКИ: <span id="score">0</span></div>
            <div>📊 УРОВЕНЬ: <span id="level">1</span></div>
            <div>🔥 КОМБО: <span id="combo">0</span></div>
        </div>
    </div>
    <div class="subjects" id="subjects"></div>
    <div class="game" id="game"></div>
    <footer>
        <a id="terms">📜 Соглашение</a>
        <a id="privacy">🔒 Политика</a>
        <a id="delete">🗑 Удалить данные</a>
        <div style="margin-top: 8px;">📧 vova_polyakov_94@mail.ru</div>
    </footer>
</div>

<script>
    // ************ БОЛЬШАЯ БАЗА ВОПРОСОВ ПО ВСЕМ ПРЕДМЕТАМ ************
    const QUESTIONS_DB = {
        math: [
            { text: "5 + 7 = ?", options: ["10", "11", "12", "13"], correct: "12", points: 10 },
            { text: "9 - 4 = ?", options: ["4", "5", "6", "7"], correct: "5", points: 10 },
            { text: "3 × 6 = ?", options: ["15", "16", "17", "18"], correct: "18", points: 10 },
            { text: "20 ÷ 4 = ?", options: ["4", "5", "6", "7"], correct: "5", points: 10 },
            { text: "Корень из 64", options: ["6", "7", "8", "9"], correct: "8", points: 10 },
            { text: "Сколько градусов в прямом угле?", options: ["45°", "60°", "90°", "120°"], correct: "90°", points: 10 }
        ],
        russian: [
            { text: "Как правильно писать?", options: ["прекрасный", "прекрастный", "прикрасный", "прекрасны"], correct: "прекрасный", points: 10 },
            { text: "Укажите слово с ошибкой", options: ["компромисс", "компромиc", "компромис", "кампромисс"], correct: "компромисс", points: 10 },
            { text: "В каком слове ударение падает на второй слог?", options: ["звонит", "каталог", "красивее", "торты"], correct: "каталог", points: 10 },
            { text: "Найди фразеологизм", options: ["бить баклуши", "идти в школу", "петь песню", "любить маму"], correct: "бить баклуши", points: 10 },
            { text: "Какое слово лишнее?", options: ["бежать", "мчаться", "нестись", "ползти"], correct: "ползти", points: 10 }
        ],
        geo: [
            { text: "Столица Франции?", options: ["Берлин", "Лондон", "Париж", "Мадрид"], correct: "Париж", points: 10 },
            { text: "Самая длинная река в мире?", options: ["Нил", "Амазонка", "Волга", "Янцзы"], correct: "Нил", points: 10 },
            { text: "Самая высокая гора?", options: ["Эверест", "Килиманджаро", "Эльбрус", "Монблан"], correct: "Эверест", points: 10 },
            { text: "Какая страна называется 'Поднебесной'?", options: ["Япония", "Китай", "Корея", "Вьетнам"], correct: "Китай", points: 10 },
            { text: "Сколько материков на Земле?", options: ["5", "6", "7", "4"], correct: "6", points: 10 }
        ],
        history: [
            { text: "Кто был первым императором России?", options: ["Иван Грозный", "Пётр I", "Николай II", "Александр I"], correct: "Пётр I", points: 10 },
            { text: "В каком году началась Великая Отечественная война?", options: ["1939", "1940", "1941", "1942"], correct: "1941", points: 10 },
            { text: "Кто открыл Америку?", options: ["Магеллан", "Колумб", "Васко да Гама", "Кук"], correct: "Колумб", points: 10 },
            { text: "Кто написал 'Капитал'?", options: ["Ленин", "Маркс", "Энгельс", "Сталин"], correct: "Маркс", points: 10 },
            { text: "Кто был первым космонавтом?", options: ["Титов", "Гагарин", "Леонов", "Армстронг"], correct: "Гагарин", points: 10 }
        ],
        literature: [
            { text: "Кто написал 'Война и мир'?", options: ["Достоевский", "Толстой", "Чехов", "Пушкин"], correct: "Толстой", points: 10 },
            { text: "Главный герой 'Евгения Онегина'", options: ["Ленский", "Онегин", "Печорин", "Базаров"], correct: "Онегин", points: 10 },
            { text: "Автор 'Мастер и Маргарита'", options: ["Булгаков", "Набоков", "Солженицын", "Пастернак"], correct: "Булгаков", points: 10 },
            { text: "Кто написал 'Преступление и наказание'?", options: ["Тургенев", "Достоевский", "Гончаров", "Лесков"], correct: "Достоевский", points: 10 },
            { text: "Как звали собаку из 'Каштанки'?", options: ["Белка", "Каштанка", "Стрелка", "Жучка"], correct: "Каштанка", points: 10 }
        ],
        english: [
            { text: "Как будет 'собака'?", options: ["dog", "cat", "bird", "fish"], correct: "dog", points: 10 },
            { text: "Перевод 'красный'", options: ["green", "blue", "red", "yellow"], correct: "red", points: 10 },
            { text: "Английское 'apple' – это...", options: ["груша", "апельсин", "яблоко", "слива"], correct: "яблоко", points: 10 },
            { text: "Как сказать 'привет'?", options: ["bye", "hello", "good", "morning"], correct: "hello", points: 10 },
            { text: "Прошедшее время go", options: ["goed", "went", "gone", "going"], correct: "went", points: 10 }
        ],
        obzh: [
            { text: "Номер пожарной службы?", options: ["101", "102", "103", "112"], correct: "101", points: 10 },
            { text: "Как тушить горящий бензин?", options: ["Водой", "Песком", "Огнетушителем", "Накрыть тканью"], correct: "Огнетушителем", points: 10 },
            { text: "Что делать при землетрясении?", options: ["Выбежать на улицу", "Встать в дверной проем", "Спрятаться под кровать", "Включить газ"], correct: "Встать в дверной проем", points: 10 }
        ],
        society: [
            { text: "Высший орган власти в РФ?", options: ["Правительство", "Президент", "Госдума", "Совет Федерации"], correct: "Президент", points: 10 },
            { text: "Нижняя палата парламента РФ?", options: ["Совет Федерации", "Госдума", "Правительство", "Конституционный суд"], correct: "Госдума", points: 10 },
            { text: "Срок президентства в РФ?", options: ["4 года", "5 лет", "6 лет", "7 лет"], correct: "6 лет", points: 10 }
        ],
        biology: [
            { text: "Самый большой орган человека?", options: ["Печень", "Кожа", "Сердце", "Легкие"], correct: "Кожа", points: 10 },
            { text: "Сколько костей у взрослого человека?", options: ["200", "206", "210", "215"], correct: "206", points: 10 },
            { text: "Фотосинтез происходит в ...", options: ["Ядре", "Хлоропластах", "Вакуолях", "Цитоплазме"], correct: "Хлоропластах", points: 10 }
        ],
        chemistry: [
            { text: "Химический символ кислорода", options: ["O", "O2", "K", "C"], correct: "O", points: 10 },
            { text: "Формула воды", options: ["H2O", "CO2", "O2", "H2"], correct: "H2O", points: 10 },
            { text: "Самый лёгкий газ", options: ["Кислород", "Водород", "Азот", "Гелий"], correct: "Водород", points: 10 }
        ],
        physics: [
            { text: "Единица измерения силы?", options: ["Ватт", "Ньютон", "Джоуль", "Паскаль"], correct: "Ньютон", points: 10 },
            { text: "Скорость света в вакууме (км/с)?", options: ["300 000", "150 000", "400 000", "250 000"], correct: "300 000", points: 10 },
            { text: "Закон всемирного тяготения открыл?", options: ["Эйнштейн", "Ньютон", "Галилей", "Коперник"], correct: "Ньютон", points: 10 }
        ]
    };

    // Предметы и настройки
    const subjectsList = ["math","russian","geo","history","literature","english","obzh","society","biology","chemistry","physics"];
    const subjectNames = {
        math:"Математика", russian:"Русский язык", geo:"География", history:"История",
        literature:"Литература", english:"Английский", obzh:"ОБЖ", society:"Обществознание",
        biology:"Биология", chemistry:"Химия", physics:"Физика"
    };
    let currentSubject = "math";
    let currentQuestionIndex = 0;
    let questions = []; // будет заполнено
    let score = 0, level = 1, combo = 0, lives = 3;
    let selectedAnswer = null;
    let waitingNext = false;
    let hintUsed = false;

    // DOM элементы
    const subjectsDiv = document.getElementById("subjects");
    const gameDiv = document.getElementById("game");
    const scoreSpan = document.getElementById("score");
    const levelSpan = document.getElementById("level");
    const comboSpan = document.getElementById("combo");

    // Загрузить вопросы для текущего предмета (перемешиваем, но сохраняем порядок)
    function loadQuestionsForSubject(subject) {
        const db = QUESTIONS_DB[subject];
        if (!db || db.length === 0) return [];
        // делаем копию и перемешиваем для разнообразия
        let copy = [...db];
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    function updateUIStats() {
        scoreSpan.innerText = score;
        levelSpan.innerText = level;
        comboSpan.innerText = combo;
    }

    function renderGame() {
        if (lives <= 0) {
            gameDiv.innerHTML = `
                <div class="result">
                    <h2 style="color:#ffcc00;">💀 ПОРАЖЕНИЕ</h2>
                    <p>Очки: ${score} | Уровень: ${level}</p>
                    <button id="restartBtn">🔄 НАЧАТЬ ЗАНОВО</button>
                    <button id="shareBtn">📢 ПОДЕЛИТЬСЯ</button>
                </div>
            `;
            document.getElementById("restartBtn")?.addEventListener("click", () => resetGame());
            document.getElementById("shareBtn")?.addEventListener("click", () => {
                alert("Поделиться: я набрал "+score+" очков в Битве знаний!");
            });
            return;
        }
        if (!questions.length || currentQuestionIndex >= questions.length) {
            // победа! новый уровень
            if (questions.length && currentQuestionIndex >= questions.length) {
                // переход на след уровень
                levelUp();
                return;
            } else {
                // загружаем вопросы сначала
                questions = loadQuestionsForSubject(currentSubject);
                currentQuestionIndex = 0;
            }
        }
        const q = questions[currentQuestionIndex];
        if (!q) return;

        const hearts = [];
        for (let i=0; i<3; i++) {
            hearts.push(`<span class="heart ${i >= lives ? 'heart-lost' : ''}">❤️</span>`);
        }

        let answersHtml = "";
        q.options.forEach(opt => {
            const selectedClass = (selectedAnswer === opt) ? "selected" : "";
            answersHtml += `<button class="answer ${selectedClass}" data-answer="${opt.replace(/"/g, '&quot;')}">${opt}</button>`;
        });

        const html = `
            <div class="lives">${hearts.join("")}</div>
            <div class="question">
                <div class="question-text">${q.text}</div>
                <div class="answers" id="answersContainer">${answersHtml}</div>
                <div class="feedback" id="feedbackMsg"></div>
                <button class="next" id="nextBtn">➡️ ДАЛЕЕ</button>
                <button class="bonus" id="bonusBtn">❤️ +1 ЖИЗНЬ (реклама)</button>
                <button class="hint" id="hintBtn">📋 Подсказка</button>
            </div>
        `;
        gameDiv.innerHTML = html;

        // Обработчики
        document.querySelectorAll(".answer").forEach(btn => {
            btn.addEventListener("click", (e) => {
                if (waitingNext) return;
                selectedAnswer = btn.getAttribute("data-answer");
                document.querySelectorAll(".answer").forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");
            });
        });
        document.getElementById("nextBtn")?.addEventListener("click", () => {
            if (waitingNext) return;
            if (!selectedAnswer) {
                showFeedback("⚠️ Выберите ответ!", "orange");
                return;
            }
            checkAnswer();
        });
        document.getElementById("bonusBtn")?.addEventListener("click", () => {
            if (lives >= 3) {
                showFeedback("У вас максимум жизней!", "gold");
                return;
            }
            // имитация рекламы + жизнь
            if (confirm("Посмотреть рекламу и получить +1 жизнь?")) {
                lives = Math.min(3, lives+1);
                updateUIStats();
                renderGame();
                showFeedback("❤️ +1 жизнь получена!", "lightgreen");
            }
        });
        document.getElementById("hintBtn")?.addEventListener("click", () => {
            if (hintUsed) { showFeedback("Подсказка уже использована", "gray"); return; }
            // убираем два неверных ответа
            const correct = q.correct;
            const wrongOptions = q.options.filter(opt => opt !== correct);
            if (wrongOptions.length >= 2) {
                const toRemove = wrongOptions.slice(0,2);
                toRemove.forEach(wrong => {
                    const btns = document.querySelectorAll(".answer");
                    btns.forEach(btn => {
                        if (btn.getAttribute("data-answer") === wrong) {
                            btn.style.display = "none";
                        }
                    });
                });
                hintUsed = true;
                showFeedback("🔍 Два неверных ответа убраны!", "lightblue");
            } else {
                showFeedback("Недостаточно вариантов для подсказки", "gray");
            }
        });
    }

    function showFeedback(msg, color="white") {
        const fb = document.getElementById("feedbackMsg");
        if (fb) {
            fb.style.display = "block";
            fb.style.color = color;
            fb.innerText = msg;
            setTimeout(() => {
                if (fb) fb.style.display = "none";
            }, 1800);
        }
    }

    function checkAnswer() {
        const q = questions[currentQuestionIndex];
        if (!q) return;
        const isCorrect = (selectedAnswer === q.correct);
        waitingNext = true;
        if (isCorrect) {
            let addScore = q.points + (combo >= 2 ? 5 : 0);
            score += addScore;
            combo++;
            showFeedback(`✅ Верно! +${addScore} очков (комбо x${combo})`, "#aaffaa");
            updateUIStats();
            // переходим к следующему вопросу
            setTimeout(() => {
                currentQuestionIndex++;
                selectedAnswer = null;
                waitingNext = false;
                hintUsed = false;
                renderGame();
            }, 800);
        } else {
            lives--;
            combo = 0;
            updateUIStats();
            showFeedback(`❌ Ошибка! Правильно: ${q.correct}. Осталось жизней: ${lives}`, "#ffaaaa");
            if (lives <= 0) {
                setTimeout(() => {
                    renderGame();
                }, 1500);
            } else {
                setTimeout(() => {
                    waitingNext = false;
                    selectedAnswer = null;
                    hintUsed = false;
                    renderGame();
                }, 1200);
            }
        }
    }

    function levelUp() {
        // новый уровень: сбрасываем вопросы, увеличиваем уровень
        level++;
        score += 50; // бонус за уровень
        combo = 0;
        updateUIStats();
        questions = loadQuestionsForSubject(currentSubject);
        currentQuestionIndex = 0;
        waitingNext = false;
        selectedAnswer = null;
        hintUsed = false;
        showFeedback(`🎉 УРОВЕНЬ ${level}! +50 бонусов!`, "gold");
        setTimeout(() => renderGame(), 500);
    }

    function resetGame() {
        score = 0;
        level = 1;
        combo = 0;
        lives = 3;
        currentQuestionIndex = 0;
        waitingNext = false;
        selectedAnswer = null;
        hintUsed = false;
        questions = loadQuestionsForSubject(currentSubject);
        updateUIStats();
        renderGame();
    }

    function switchSubject(subject) {
        currentSubject = subject;
        score = 0;
        level = 1;
        combo = 0;
        lives = 3;
        currentQuestionIndex = 0;
        waitingNext = false;
        selectedAnswer = null;
        hintUsed = false;
        questions = loadQuestionsForSubject(currentSubject);
        updateUIStats();
        renderGame();
        // обновить активную кнопку
        document.querySelectorAll(".subject-btn").forEach(btn => {
            if (btn.dataset.subj === subject) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }

    function buildSubjectsUI() {
        subjectsDiv.innerHTML = "";
        subjectsList.forEach(subj => {
            const btn = document.createElement("button");
            btn.innerText = subjectNames[subj];
            btn.classList.add("subject-btn");
            if (subj === currentSubject) btn.classList.add("active");
            btn.dataset.subj = subj;
            btn.addEventListener("click", () => {
                if (currentSubject === subj) return;
                switchSubject(subj);
            });
            subjectsDiv.appendChild(btn);
        });
    }

    // Обработка юридических кнопок
    document.getElementById("terms").addEventListener("click", () => {
        alert("Пользовательское соглашение\nИспользуя приложение, вы соглашаетесь, что ваши данные (ID, имя, аватар) используются для рейтинга. Хранение в VK Storage. Ссылка на политику VK: https://vk.com/terms");
    });
    document.getElementById("privacy").addEventListener("click", () => {
        alert("Политика конфиденциальности\nМы собираем только ваше VK ID, имя и аватар для отображения в Топ-10. Данные хранятся на серверах VK в РФ. Вы можете удалить прогресс кнопкой 'Удалить данные'.");
    });
    document.getElementById("delete").addEventListener("click", () => {
        if (confirm("Удалить весь прогресс безвозвратно?")) {
            localStorage.clear();
            alert("Данные удалены. Перезагрузите страницу.");
            location.reload();
        }
    });

    // Инициализация
    questions = loadQuestionsForSubject("math");
    buildSubjectsUI();
    renderGame();
    updateUIStats();

    // Сохраняем прогресс в localStorage при изменении (просто для удобства)
    function autoSave() {
        const save = { score, level, combo, lives, currentSubject, currentQuestionIndex };
        localStorage.setItem("quiz_save", JSON.stringify(save));
    }
    setInterval(autoSave, 5000);
    window.addEventListener("beforeunload", autoSave);
    const saved = localStorage.getItem("quiz_save");
    if (saved) {
        try {
            const data = JSON.parse(saved);
            score = data.score || 0;
            level = data.level || 1;
            combo = data.combo || 0;
            lives = data.lives || 3;
            currentSubject = data.currentSubject || "math";
            currentQuestionIndex = data.currentQuestionIndex || 0;
            questions = loadQuestionsForSubject(currentSubject);
            updateUIStats();
            renderGame();
            buildSubjectsUI();
        } catch(e) {}
    }
</script>
</body>
</html>
