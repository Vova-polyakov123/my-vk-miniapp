<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Битва знаний — VK Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 600px;
            width: 100%;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header {
            background: linear-gradient(135deg, #6e2cf5, #a742f5, #f56b2c);
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
            padding: 24px 20px;
            text-align: center;
            color: white;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header h1 span {
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 40px;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.35);
            border-radius: 60px;
            padding: 10px 20px;
            margin-top: 16px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .score-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .level-progress {
            margin: 16px 20px 0;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 6px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ffd966;
            border-radius: 20px;
            transition: width 0.3s;
        }
        .subjects-wrapper {
            padding: 16px 12px;
            background: rgba(0,0,0,0.2);
            overflow-x: auto;
            white-space: nowrap;
        }
        .subjects-grid {
            display: inline-flex;
            gap: 12px;
        }
        .subject-btn {
            background: linear-gradient(135deg, #2a3a60, #1a2a4a);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .subject-btn.active {
            background: linear-gradient(135deg, #f56b2c, #ff9040);
            box-shadow: 0 4px 12px rgba(245,107,44,0.4);
        }
        .game-area {
            padding: 24px 20px;
            min-height: 460px;
        }
        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .level-badge {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            color: #ffd966;
        }
        .lives {
            display: flex;
            gap: 8px;
        }
        .heart {
            font-size: 28px;
            color: #ff3366;
            filter: drop-shadow(0 0 4px gold);
            transition: 0.2s;
        }
        .heart-lost {
            opacity: 0.3;
            filter: grayscale(0.8);
        }
        .question-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            color: white;
            margin-bottom: 28px;
            word-break: break-word;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .answer-btn {
            background: linear-gradient(95deg, #2a3a60, #1a2a4a);
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f0f0;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .answer-btn.selected {
            background: linear-gradient(95deg, #6e2cf5, #9b4dff);
            box-shadow: 0 4px 12px rgba(110,44,245,0.4);
        }
        .answer-btn.disabled-hint {
            opacity: 0.35;
            filter: blur(1px);
            pointer-events: none;
            text-decoration: line-through;
        }
        .feedback {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            margin-top: 20px;
            font-weight: bold;
            color: #ffecb3;
            display: none;
            border-left: 4px solid #f56b2c;
        }
        .next-btn, .bonus-btn, .hint-btn {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .next-btn {
            background: linear-gradient(90deg, #6e2cf5, #a742f5);
            color: white;
        }
        .bonus-btn {
            background: linear-gradient(90deg, #ff9800, #ffbc3c);
            color: #1a1a2e;
        }
        .bonus-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .hint-btn {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            color: #ffd966;
            border: 1px solid #ffd966;
        }
        .hidden {
            display: none;
        }
        .leaderboard-btn {
            background: linear-gradient(135deg, #f5b042, #ff8c2c);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #12192c;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            padding: 24px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            max-height: 85vh;
            overflow-y: auto;
        }
        .leaderboard-list {
            list-style: none;
            margin: 20px 0;
        }
        .leaderboard-list li {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .leaderboard-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a3a5a;
        }
        .close-modal {
            background: #6e2cf5;
            border: none;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            padding: 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #ccc;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .footer-links a {
            color: #ffaa66;
            text-decoration: none;
            cursor: pointer;
        }
        .result-area {
            text-align: center;
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            padding: 30px 20px;
        }
        .result-score {
            font-size: 2rem;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 16px;
        }
        .share-btn, .reset-btn {
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            margin: 6px;
            cursor: pointer;
        }
        .share-btn {
            background: linear-gradient(95deg, #2688eb, #40a0ff);
            color: white;
        }
        .reset-btn {
            background: linear-gradient(95deg, #f56b2c, #ff9040);
            color: white;
        }
        @media (max-width: 480px) {
            .question-text { font-size: 1.1rem; }
            .answer-btn { padding: 12px 16px; font-size: 0.8rem; }
            .subject-btn { padding: 8px 14px; font-size: 0.75rem; }
        }
    </style>

</head>

<script>
    // ------------------------------------------------------------------
    // 1. ИНИЦИАЛИЗАЦИЯ VK BRIDGE
    // ------------------------------------------------------------------
    let vkBridge = null;
    let currentUser = { id: 'guest', name: 'Гость', photo: '' };
    let appShareUrl = 'https://vk.com/app';

    async function initVK() {
        if (typeof vkBridge === 'undefined') {
            console.warn('VK Bridge не загружен');
            return;
        }
        try {
            await vkBridge.send('VKWebAppInit');
            const user = await vkBridge.send('VKWebAppGetUserInfo');
            if (user && user.id) {
                currentUser = {
                    id: user.id.toString(),
                    name: user.first_name || 'Игрок',
                    photo: user.photo_100 || ''
                };
            }
            const launchParams = await vkBridge.send('VKWebAppGetLaunchParams').catch(() => null);
            if (launchParams && launchParams.vk_app_id) {
                appShareUrl = `https://vk.com/app${launchParams.vk_app_id}`;
                localStorage.setItem('vk_app_share_url', appShareUrl);
            } else {
                const saved = localStorage.getItem('vk_app_share_url');
                if (saved) appShareUrl = saved;
            }
        } catch (e) {
            console.error('VK init error', e);
        }
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function loadQuestionsForSubject(subject) {
        let qs = questionDB[subject] || [];
        return shuffleArray([...qs]);
    }

    function updateUIStats() {
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('levelValue').innerText = level;
        document.getElementById('comboValue').innerText = combo;
        const progressPercent = (currentIndex / currentQuestions.length) * 100;
        document.getElementById('levelProgressFill').style.width = progressPercent + '%';
    }

    function showFeedback(msg, isError = false) {
        const fb = document.getElementById('feedbackMsg');
        if (!fb) return;
        fb.style.display = 'block';
        fb.innerHTML = msg;
        fb.style.color = isError ? '#ffaaaa' : '#aaffaa';
        setTimeout(() => {
            fb.style.display = 'none';
            fb.innerHTML = '';
        }, 2000);
    }

    function showTemporaryMessage(msg, duration = 2000) {
        const fb = document.getElementById('feedbackMsg');
        if (fb) {
            fb.style.display = 'block';
            fb.innerHTML = msg;
            fb.style.color = '#ffd966';
            setTimeout(() => {
                fb.style.display = 'none';
                fb.innerHTML = '';
            }, duration);
        }
    }

    function saveProgressLocally() {
        const save = {
            currentSubject, currentIndex, score, level, combo, lives,
            currentQuestionsIds: currentQuestions.map(q => q.text)
        };
        localStorage.setItem('quiz_progress', JSON.stringify(save));
    }

    function loadProgressFromLocal() {
        const saved = localStorage.getItem('quiz_progress');
        if (!saved) return false;
        try {
            const data = JSON.parse(saved);
            currentSubject = data.currentSubject;
            currentIndex = data.currentIndex;
            score = data.score;
            level = data.level;
            combo = data.combo;
            lives = data.lives;
            // вопросы перезагрузим заново
            currentQuestions = loadQuestionsForSubject(currentSubject);
            return true;
        } catch(e) { return false; }
    }

    async function saveToVKStorage() {
        if (!vkBridge) return;
        try {
            await vkBridge.send('VKWebAppStorageSet', {
                key: 'quizProgress',
                value: JSON.stringify({ score, level, combo, lives, currentSubject, currentIndex })
            });
            await vkBridge.send('VKWebAppStorageSet', {
                key: 'leaderboard',
                value: JSON.stringify(leaderboard)
            });
        } catch(e) {}
    }

    async function loadFromVKStorage() {
        if (!vkBridge) return;
        try {
            const res = await vkBridge.send('VKWebAppStorageGet', { keys: ['quizProgress', 'leaderboard'] });
            if (res && res.keys) {
                const prog = res.keys.find(k => k.key === 'quizProgress');
                if (prog && prog.value) {
                    const data = JSON.parse(prog.value);
                    score = data.score || 0;
                    level = data.level || 1;
                    combo = data.combo || 0;
                    lives = data.lives || 3;
                    currentSubject = data.currentSubject || 'math';
                    currentIndex = data.currentIndex || 0;
                }
                const lb = res.keys.find(k => k.key === 'leaderboard');
                if (lb && lb.value) leaderboard = JSON.parse(lb.value);
            }
        } catch(e) {}
        currentQuestions = loadQuestionsForSubject(currentSubject);
    }

    // ------------------------------------------------------------------
    // 5. ОТРИСОВКА ИГРЫ
    // ------------------------------------------------------------------
    function renderGame() {
        if (lives <= 0) {
            // Поражение
            document.getElementById('gameArea').innerHTML = `
                <div class="result-area">
                    <div class="result-score">💀 ПОРАЖЕНИЕ</div>
                    <p>Очки: ${score} | Уровень: ${level}</p>
                    <button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button>
                    <button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button>
                    <button class="reset-btn" id="selectSubjectBtn" style="background:#6e2cf5;">📚 ВЫБРАТЬ ДРУГОЙ ПРЕДМЕТ</button>
                </div>
            `;
            document.getElementById('shareBtn')?.addEventListener('click', shareGame);
            document.getElementById('resetBtn')?.addEventListener('click', () => resetGame());
            document.getElementById('selectSubjectBtn')?.addEventListener('click', () => {
                document.querySelector('.subjects-wrapper').scrollIntoView({ behavior: 'smooth' });
            });
            return;
        }

        if (!currentQuestions.length) {
            currentQuestions = loadQuestionsForSubject(currentSubject);
            currentIndex = 0;
        }
        if (currentIndex >= currentQuestions.length) {
            // Переход на новый уровень
            levelUp();
            return;
        }

        const q = currentQuestions[currentIndex];
        const heartsHtml = [];
        for (let i = 0; i < 3; i++) {
            heartsHtml.push(`<span class="heart ${i >= lives ? 'heart-lost' : ''}">❤️</span>`);
        }

        let answersHtml = '';
        q.options.forEach(opt => {
            const selectedClass = (selectedAnswer === opt) ? 'selected' : '';
            answersHtml += `<button class="answer-btn ${selectedClass}" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`;
        });

        const html = `
            <div class="quest-header">
                <div class="level-badge">⚡ Уровень ${level} · ${subjectNames[currentSubject]}</div>
                <div class="lives">${heartsHtml.join('')}</div>
            </div>
            <div class="question-card">
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="answers" id="answersContainer">${answersHtml}</div>
                <div class="feedback" id="feedbackMsg" style="display:none;"></div>
                <button class="next-btn hidden" id="nextBtn">➡️ ДАЛЕЕ</button>
                <button class="bonus-btn" id="bonusLifeBtn">❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button>
                <button class="hint-btn" id="hintBtn"><i class="fas fa-robot"></i> Подсказка</button>
            </div>
        `;
        document.getElementById('gameArea').innerHTML = html;

        // Обработчики
        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (waitingNext) return;
                selectedAnswer = btn.getAttribute('data-answer');
                document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('nextBtn')?.classList.remove('hidden');
            });
        });

        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (waitingNext) return;
            if (!selectedAnswer) {
                showFeedback('⚠️ Выберите ответ!', true);
                return;
            }
            checkAnswer();
        });

        document.getElementById('bonusLifeBtn')?.addEventListener('click', async () => {
            if (lives >= 3) {
                showTemporaryMessage('У вас уже максимум жизней!');
                return;
            }
            // Имитация рекламы (в реальном проекте вставьте VKWebAppShowNativeAds)
            if (confirm('Посмотреть рекламу и получить +1 жизнь?')) {
                lives = Math.min(3, lives + 1);
                updateUIStats();
                renderGame();
                showFeedback('❤️ +1 жизнь получена!');
                saveProgress();
            }
        });

        document.getElementById('hintBtn')?.addEventListener('click', () => {
            if (hintUsed) {
                showTemporaryMessage('Подсказка уже использована в этом вопросе');
                return;
            }
            const correct = q.correct;
            const wrongBtns = Array.from(document.querySelectorAll('.answer-btn')).filter(btn => btn.getAttribute('data-answer') !== correct);
            if (wrongBtns.length >= 2) {
                const toRemove = wrongBtns.slice(0, 2);
                toRemove.forEach(btn => {
                    btn.classList.add('disabled-hint');
                    btn.disabled = true;
                });
                hintUsed = true;
                showFeedback('🔍 Два неверных ответа убраны!');
                document.getElementById('hintBtn').disabled = true;
            } else {
                showTemporaryMessage('Недостаточно вариантов для подсказки');
            }
        });
    }

    function checkAnswer() {
        const q = currentQuestions[currentIndex];
        if (!q) return;
        const isCorrect = (selectedAnswer === q.correct);
        waitingNext = true;
        if (isCorrect) {
            let add = 10 + (combo >= 2 ? 5 : 0);
            score += add;
            combo++;
            showFeedback(`✅ Верно! +${add} очков (комбо x${combo})`);
            updateUIStats();
            setTimeout(() => {
                currentIndex++;
                selectedAnswer = null;
                waitingNext = false;
                hintUsed = false;
                saveProgress();
                renderGame();
            }, 700);
        } else {
            lives--;
            combo = 0;
            updateUIStats();
            showFeedback(`❌ Ошибка! Правильно: ${q.correct}. Осталось жизней: ${lives}`, true);
            if (lives <= 0) {
                setTimeout(() => {
                    renderGame();
                }, 1500);
            } else {
                setTimeout(() => {
                    waitingNext = false;
                    selectedAnswer = null;
                    hintUsed = false;
                    saveProgress();
                    renderGame();
                }, 1200);
            }
        }
    }

    function levelUp() {
        level++;
        score += 50; // бонус за уровень
        combo = 0;
        updateUIStats();
        showFeedback(`🎉 Поздравляю! Уровень ${level} достигнут! +50 бонусов`);
        // сброс вопросов для текущего предмета
        currentQuestions = loadQuestionsForSubject(currentSubject);
        currentIndex = 0;
        waitingNext = false;
        selectedAnswer = null;
        hintUsed = false;
        saveProgress();
        setTimeout(() => renderGame(), 500);
    }

    function resetGame() {
        score = 0;
        level = 1;
        combo = 0;
        lives = 3;
        currentIndex = 0;
        selectedAnswer = null;
        waitingNext = false;
        hintUsed = false;
        currentQuestions = loadQuestionsForSubject(currentSubject);
        saveProgress();
        renderGame();
    }

    function switchSubject(subject) {
        if (subject === currentSubject) return;
        currentSubject = subject;
        score = 0;
        level = 1;
        combo = 0;
        lives = 3;
        currentIndex = 0;
        selectedAnswer = null;
        waitingNext = false;
        hintUsed = false;
        currentQuestions = loadQuestionsForSubject(currentSubject);
        saveProgress();
        updateUIStats();
        renderGame();
        // Обновить активную кнопку
        document.querySelectorAll('.subject-btn').forEach(btn => {
            if (btn.dataset.subj === subject) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function saveProgress() {
        saveProgressLocally();
        if (vkBridge) saveToVKStorage();
        updateLeaderboard();
    }

    function updateLeaderboard() {
        if (!leaderboard[currentSubject]) leaderboard[currentSubject] = [];
        const existing = leaderboard[currentSubject].findIndex(e => e.id === currentUser.id);
        const entry = { id: currentUser.id, name: currentUser.name, photo: currentUser.photo, score: score, level: level, timestamp: Date.now() };
        if (existing !== -1) {
            if (score > leaderboard[currentSubject][existing].score) leaderboard[currentSubject][existing] = entry;
        } else {
            leaderboard[currentSubject].push(entry);
        }
        leaderboard[currentSubject].sort((a,b) => b.score - a.score);
        leaderboard[currentSubject] = leaderboard[currentSubject].slice(0,10);
        if (vkBridge) saveToVKStorage();
    }

    function shareGame() {
        const text = `🔥 Я набрал ${score} очков в предмете «${subjectNames[currentSubject]}» на уровне ${level} в игре «Битва знаний»! Сможешь побить мой рекорд? Присоединяйся! 🧠⚡`;
        if (vkBridge) {
            vkBridge.send('VKWebAppShare', { link: appShareUrl, attachment: text }).catch(() => {
                alert('Не удалось открыть диалог. Скопируйте ссылку: ' + appShareUrl);
            });
        } else {
            alert('Поделиться можно только внутри VK Mini App\nСсылка: ' + appShareUrl);
        }
    }

    function showLeaderboard() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3><i class="fas fa-trophy"></i> Топ-10 игроков</h3>
                <div id="leaderboardContent"></div>
                <button class="close-modal">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.body.style.overflow = 'hidden';
        const content = modal.querySelector('#leaderboardContent');
        const lb = leaderboard[currentSubject] || [];
        if (lb.length === 0) {
            content.innerHTML = '<p style="text-align:center;">Пока нет рекордов. Стань первым!</p>';
        } else {
            const ul = document.createElement('ul'); ul.className = 'leaderboard-list';
            ul.innerHTML = lb.map((u, idx) => `
                <li>
                    ${u.photo ? `<img class="leaderboard-avatar" src="${u.photo}">` : '<div class="leaderboard-avatar" style="background:#6e2cf5; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user"></i></div>'}
                    <div><strong>${idx+1}. ${escapeHtml(u.name)}</strong><br>🎯 ${u.score} очков | Уровень ${u.level}</div>
                </li>
            `).join('');
            content.appendChild(ul);
        }
        modal.querySelector('.close-modal').onclick = () => { modal.remove(); document.body.style.overflow = ''; };
        modal.onclick = (e) => { if (e.target === modal) { modal.remove(); document.body.style.overflow = ''; } };
    }

    function buildSubjectsUI() {
        const grid = document.getElementById('subjectsGrid');
        grid.innerHTML = '';
        subjects.forEach(subj => {
            const btn = document.createElement('button');
            btn.className = 'subject-btn' + (subj === currentSubject ? ' active' : '');
            btn.innerHTML = `<i class="fas ${subjectIcons[subj]}"></i> ${subjectNames[subj]}`;
            btn.dataset.subj = subj;
            btn.addEventListener('click', () => switchSubject(subj));
            grid.appendChild(btn);
        });
    }

    function showInfoModal(title, text) {
        const m = document.createElement('div'); m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><h3>${title}</h3><p>${text}</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(m);
        document.body.style.overflow = 'hidden';
        m.querySelector('.close-modal').onclick = () => { m.remove(); document.body.style.overflow = ''; };
        m.onclick = (e) => { if (e.target === m) { m.remove(); document.body.style.overflow = ''; } };
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    // ------------------------------------------------------------------
    // 6. ЗАПУСК
    // ------------------------------------------------------------------
    window.addEventListener('load', async () => {
        if (typeof vkBridge !== 'undefined') {
            vkBridge = window.vkBridge;
            await initVK();
            await loadFromVKStorage();
        } else {
            loadProgressFromLocal();
        }
        currentQuestions = loadQuestionsForSubject(currentSubject);
        buildSubjectsUI();
        renderGame();
        updateUIStats();

        document.getElementById('leaderboardBtn').onclick = showLeaderboard;
        document.getElementById('termsLink').onclick = () => showInfoModal('Пользовательское соглашение', 'Используя приложение, вы соглашаетесь с условиями VK Mini Apps. Ваши данные (ID, имя, аватар) используются для рейтинга и хранятся в VK Storage. Подробнее: https://vk.com/terms');
        document.getElementById('privacyLink').onclick = () => showInfoModal('Политика конфиденциальности', 'Мы обрабатываем только открытые данные VK ID, имя, фото для игровой статистики. Данные не передаются третьим лицам. Вы можете удалить прогресс кнопкой ниже.');
        document.getElementById('deleteDataLink').onclick = () => {
            if (confirm('Удалить весь прогресс безвозвратно?')) {
                localStorage.clear();
                if (vkBridge) {
                    vkBridge.send('VKWebAppStorageSet', { key: 'quizProgress', value: '' });
                    vkBridge.send('VKWebAppStorageSet', { key: 'leaderboard', value: '' });
                }
                alert('Данные удалены. Перезагрузите страницу.');
                location.reload();
            }
        };
    });
</script>
