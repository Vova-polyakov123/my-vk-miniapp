<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Битва знаний — с настоящим мальчиком</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #1a2a4a 0%, #0e1a2f 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .app {
            max-width: 650px;
            width: 100%;
            background: rgba(25, 35, 55, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.15);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .header {
            background: linear-gradient(135deg, #6e2cf5, #a742f5, #f56b2c);
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
            padding: 28px 24px;
            text-align: center;
            color: white;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header h1 span {
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 12px 24px;
            margin-top: 20px;
            font-weight: 700;
            font-size: 1rem;
            color: #ffecb3;
        }
        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .level-progress {
            margin: 20px 24px 0;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            height: 8px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd966, #ffb347);
            border-radius: 20px;
            transition: width 0.3s;
            box-shadow: 0 0 6px #ffb347;
        }
        .subjects-wrapper {
            padding: 20px 16px;
            background: rgba(0,0,0,0.3);
            overflow-x: auto;
            white-space: nowrap;
        }
        .subjects-grid {
            display: inline-flex;
            gap: 14px;
        }
        .subject-btn {
            background: linear-gradient(135deg, #2a3a60, #1a2a4a);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.25s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .subject-btn i {
            font-size: 1.2rem;
        }
        .subject-btn.active {
            background: linear-gradient(135deg, #f56b2c, #ff9040);
            box-shadow: 0 8px 20px rgba(245,107,44,0.5);
            transform: scale(1.02);
        }
        .game-area {
            padding: 28px 24px;
            min-height: 540px;
        }
        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .level-badge {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 700;
            color: #ffd966;
            font-size: 0.9rem;
        }
        .lives {
            display: flex;
            gap: 8px;
        }
        .heart {
            font-size: 32px;
            transition: 0.2s;
        }
        .heart-full {
            color: #ff3366;
            filter: drop-shadow(0 0 6px #ff6699);
        }
        .heart-lost {
            color: #888;
            opacity: 0.4;
            filter: grayscale(0.6);
        }
        .question-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 24px;
            margin-bottom: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .question-text {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            color: white;
            margin-bottom: 32px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            word-break: break-word;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .answer-btn {
            background: linear-gradient(95deg, #2a3a60, #1a2a4a);
            border: none;
            border-radius: 100px;
            padding: 16px 24px;
            font-weight: 600;
            font-size: 1rem;
            color: #f0f0f0;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .answer-btn:before {
            content: "🔘";
            font-size: 1.4rem;
            opacity: 0.9;
        }
        .answer-btn.selected {
            background: linear-gradient(95deg, #6e2cf5, #9b4dff);
            box-shadow: 0 8px 20px rgba(110,44,245,0.5);
        }
        .answer-btn.selected:before {
            content: "✅";
        }
        .answer-btn.disabled-hint {
            opacity: 0.35;
            filter: blur(1px);
            pointer-events: none;
            text-decoration: line-through;
        }
        .feedback {
            text-align: center;
            padding: 14px;
            background: rgba(0,0,0,0.8);
            border-radius: 60px;
            margin-top: 24px;
            font-weight: 600;
            color: #ffecb3;
            display: none;
            border-left: 5px solid #f56b2c;
            font-size: 0.95rem;
        }
        .next-btn, .bonus-btn, .hint-btn {
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 80px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 14px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .next-btn {
            background: linear-gradient(90deg, #6e2cf5, #a742f5);
            color: white;
            box-shadow: 0 6px 14px rgba(110,44,245,0.4);
        }
        .bonus-btn {
            background: linear-gradient(90deg, #ff9800, #ffbc3c);
            color: #1a1a2e;
        }
        .hint-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            color: #ffd966;
            border: 1px solid #ffd966;
        }
        .hidden {
            display: none;
        }
        .leaderboard-btn {
            background: linear-gradient(135deg, #f5b042, #ff8c2c);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        /* Стили для помощника с реальной картинкой */
        .assistant {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .assistant.centered {
            bottom: 50%;
            right: 50%;
            transform: translate(50%, 50%);
            pointer-events: auto;
        }
        .assistant-bubble {
            background: white;
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 12px 18px;
            max-width: 260px;
            margin-bottom: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,215,0,0.8);
            font-size: 0.9rem;
            line-height: 1.4;
            color: #1a1a2e;
            font-weight: 500;
            pointer-events: none;
        }
        .assistant-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            border: 3px solid #ffd966;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.2s;
            overflow: hidden;
        }
        .assistant-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .assistant-avatar:hover {
            transform: scale(1.05);
        }
        /* Модалки и остальное */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #12192c;
            border-radius: 48px;
            max-width: 500px;
            width: 90%;
            padding: 28px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            max-height: 85vh;
            overflow-y: auto;
        }
        .leaderboard-list {
            list-style: none;
            margin: 20px 0;
        }
        .leaderboard-list li {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .leaderboard-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .close-modal {
            background: #6e2cf5;
            border: none;
            padding: 14px;
            border-radius: 60px;
            width: 100%;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        footer {
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #ccc;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .footer-links a {
            color: #ffaa66;
            text-decoration: none;
            cursor: pointer;
        }
        .result-area {
            text-align: center;
            background: rgba(0,0,0,0.8);
            border-radius: 48px;
            padding: 36px 24px;
            border: 1px solid rgba(255,215,0,0.5);
        }
        .result-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffcc00;
            margin-bottom: 20px;
        }
        .share-btn, .reset-btn {
            border: none;
            padding: 14px 28px;
            border-radius: 80px;
            font-weight: 800;
            margin: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .share-btn {
            background: linear-gradient(95deg, #2688eb, #40a0ff);
            color: white;
        }
        .reset-btn {
            background: linear-gradient(95deg, #f56b2c, #ff9040);
            color: white;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
        }
        .tab-btn.active-tab {
            background: #f56b2c;
        }
        @media (max-width: 500px) {
            .question-text { font-size: 1.3rem; }
            .answer-btn { padding: 12px 18px; font-size: 0.9rem; }
            .subject-btn { padding: 8px 18px; font-size: 0.85rem; }
            .heart { font-size: 26px; }
            .assistant-avatar { width: 55px; height: 55px; }
            .assistant-bubble { max-width: 200px; font-size: 0.8rem; }
        }
    </style>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
            <h1>⚡БИТВА ЗНАНИЙ <span>2026</span></h1>
            <button class="leaderboard-btn" id="leaderboardBtn"><i class="fas fa-trophy"></i> Топ-10</button>
        </div>
        <div class="score-board">
            <div class="score-item"><i class="fas fa-coins"></i> <span id="scoreValue">0</span></div>
            <div class="score-item"><i class="fas fa-chart-line"></i> УР. <span id="levelValue">1</span></div>
            <div class="score-item"><i class="fas fa-fire"></i> КОМБО <span id="comboValue">0</span></div>
        </div>
        <div class="level-progress"><div class="progress-fill" id="levelProgressFill"></div></div>
    </div>
    <div class="subjects-wrapper"><div class="subjects-grid" id="subjectsGrid"></div></div>
    <div class="game-area" id="gameArea"></div>
    <footer>
        <div class="footer-links">
            <a id="termsLink">📜 Соглашение</a>
            <a id="privacyLink">🔒 Политика</a>
            <a id="deleteDataLink" style="color:#ff6b6b">🗑 Удалить данные</a>
        </div>
        <div style="margin-top: 8px;">📧 vova_polyakov_94@mail.ru</div>
    </footer>
</div>

<!-- Помощник с реальным изображением мальчика -->
<div class="assistant" id="assistant">
    <div class="assistant-bubble" id="assistantBubble">✨ Привет! Я твой умный помощник</div>
    <div class="assistant-avatar" id="assistantAvatar">
        <img src="https://cdn-icons-png.flaticon.com/512/2922/2922561.png" alt="Мальчик-помощник">
    </div>
</div>

<script>
    // ------------------------------------------------------------------
    // 1. ОКРУЖЕНИЕ VK / Браузер
    // ------------------------------------------------------------------
    let isVK = false;
    let vkBridge = null;
    if (typeof window.vkBridge !== 'undefined') {
        vkBridge = window.vkBridge;
        isVK = true;
    }
    let currentUser = { id: 'guest', name: 'Игрок', photo: '' };
    let appShareUrl = 'https://vk.com/app';

    async function initVK() {
        if (!isVK || !vkBridge) return;
        try {
            await vkBridge.send('VKWebAppInit');
            const user = await vkBridge.send('VKWebAppGetUserInfo');
            if (user && user.id) {
                currentUser = { id: user.id.toString(), name: user.first_name || 'Игрок', photo: user.photo_100 || '' };
            }
            const lp = await vkBridge.send('VKWebAppGetLaunchParams').catch(() => null);
            if (lp && lp.vk_app_id) appShareUrl = `https://vk.com/app${lp.vk_app_id}`;
            else appShareUrl = localStorage.getItem('vk_app_share_url') || appShareUrl;
        } catch(e) { console.warn(e); isVK = false; }
    }

    // ------------------------------------------------------------------
    // 2. ПОМОЩНИК: обучение и перемещение
    // ------------------------------------------------------------------
    let assistantTimeout = null;
    let tutorialStep = 0;
    let tutorialSubjects = ['math', 'russian', 'geo'];
    let currentTutorialIndex = 0;
    let tutorialOverlay = null;

    function assistantSay(message, duration = 4000) {
        const bubble = document.getElementById('assistantBubble');
        if (!bubble) return;
        bubble.innerText = message;
        bubble.style.opacity = '1';
        if (assistantTimeout) clearTimeout(assistantTimeout);
        assistantTimeout = setTimeout(() => {
            bubble.style.opacity = '0';
            setTimeout(() => {
                if (bubble.innerText === message) bubble.innerText = '✨ Нажми на меня для совета';
            }, 300);
        }, duration);
    }

    function moveAssistantToCorner() {
        const assistant = document.getElementById('assistant');
        assistant.classList.remove('centered');
        assistant.style.bottom = '20px';
        assistant.style.right = '20px';
        assistant.style.transform = '';
    }

    function moveAssistantToCenter() {
        const assistant = document.getElementById('assistant');
        assistant.classList.add('centered');
        assistant.style.bottom = '50%';
        assistant.style.right = '50%';
        assistant.style.transform = 'translate(50%, 50%)';
    }

    function startTutorial() {
        if (localStorage.getItem('tutorialCompleted') === 'true') {
            moveAssistantToCorner();
            assistantSay(`✨ С возвращением, ${currentUser.name !== 'Гость' ? currentUser.name : 'друг'}! Я всегда рядом.`);
            return;
        }
        tutorialOverlay = document.createElement('div');
        tutorialOverlay.style.position = 'fixed';
        tutorialOverlay.style.top = '0';
        tutorialOverlay.style.left = '0';
        tutorialOverlay.style.width = '100%';
        tutorialOverlay.style.height = '100%';
        tutorialOverlay.style.background = 'rgba(0,0,0,0.7)';
        tutorialOverlay.style.backdropFilter = 'blur(4px)';
        tutorialOverlay.style.zIndex = '1500';
        document.body.appendChild(tutorialOverlay);
        moveAssistantToCenter();
        assistantSay('👋 Привет! Я твой репетитор. Давай я покажу, как пользоваться приложением.', 5000);
        setTimeout(() => nextTutorialStep(), 5000);
    }

    function nextTutorialStep() {
        if (currentTutorialIndex >= tutorialSubjects.length) {
            if (tutorialOverlay) tutorialOverlay.remove();
            moveAssistantToCorner();
            assistantSay('🎉 Отлично! Ты всё усвоил. Теперь я буду в уголке, помогать советами. Удачи в битве знаний!', 5000);
            localStorage.setItem('tutorialCompleted', 'true');
            return;
        }
        const subjKey = tutorialSubjects[currentTutorialIndex];
        const subjName = subjectNames[subjKey];
        const btn = document.querySelector(`.subject-btn[data-subj="${subjKey}"]`);
        if (btn) {
            btn.style.boxShadow = '0 0 0 4px #ffd966, 0 0 0 8px rgba(255,217,102,0.5)';
            setTimeout(() => btn.style.boxShadow = '', 2000);
            assistantSay(`👉 Нажми на предмет «${subjName}», чтобы выбрать его.`, 4000);
            const handler = (e) => {
                if (e.currentTarget.dataset.subj === subjKey) {
                    btn.removeEventListener('click', handler);
                    currentTutorialIndex++;
                    nextTutorialStep();
                }
            };
            btn.addEventListener('click', handler);
        } else {
            currentTutorialIndex++;
            nextTutorialStep();
        }
    }

    // ------------------------------------------------------------------
    // 3. БАЗА ВОПРОСОВ (та же расширенная)
    // ------------------------------------------------------------------
    const questionDB = {
        math: [
            { text: "5 + 7 = ?", options: ["10","11","12","13"], correct: "12" },
            { text: "12 - 4 = ?", options: ["6","7","8","9"], correct: "8" },
            { text: "3 × 6 = ?", options: ["15","16","17","18"], correct: "18" },
            { text: "20 ÷ 4 = ?", options: ["4","5","6","7"], correct: "5" },
            { text: "Корень из 64", options: ["6","7","8","9"], correct: "8" }
        ],
        russian: [
            { text: "Как правильно пишется?", options: ["прекрасный","прекрастный","прикрасный","прекрасны"], correct: "прекрасный" },
            { text: "Укажите слово без ошибки", options: ["компромисс","компромиc","компромис","кампромисс"], correct: "компромисс" }
        ],
        geo: [
            { text: "Столица Франции?", options: ["Берлин","Лондон","Париж","Мадрид"], correct: "Париж" },
            { text: "Самая длинная река в мире?", options: ["Нил","Амазонка","Волга","Янцзы"], correct: "Нил" }
        ],
        history: [
            { text: "Кто был первым императором России?", options: ["Иван Грозный","Пётр I","Николай II","Александр I"], correct: "Пётр I" },
            { text: "В каком году началась ВОВ?", options: ["1939","1940","1941","1942"], correct: "1941" }
        ],
        literature: [
            { text: "Кто написал 'Война и мир'?", options: ["Достоевский","Толстой","Чехов","Пушкин"], correct: "Толстой" }
        ],
        english: [
            { text: "Как будет 'собака'?", options: ["dog","cat","bird","fish"], correct: "dog" }
        ],
        obzh: [
            { text: "Номер пожарной службы?", options: ["101","102","103","112"], correct: "101" }
        ],
        society: [
            { text: "Высший орган власти в РФ?", options: ["Правительство","Президент","Госдума","Совет Федерации"], correct: "Президент" }
        ],
        biology: [
            { text: "Самый большой орган человека?", options: ["Печень","Кожа","Сердце","Легкие"], correct: "Кожа" }
        ],
        chemistry: [
            { text: "Химический символ кислорода", options: ["O","O2","K","C"], correct: "O" }
        ],
        physics: [
            { text: "Единица измерения силы?", options: ["Ватт","Ньютон","Джоуль","Паскаль"], correct: "Ньютон" }
        ]
    };
    const subjects = Object.keys(questionDB);
    const subjectNames = {
        math:"Математика", russian:"Русский язык", geo:"География", history:"История",
        literature:"Литература", english:"Английский", obzh:"ОБЖ", society:"Обществознание",
        biology:"Биология", chemistry:"Химия", physics:"Физика"
    };
    const subjectIcons = {
        math:"fa-calculator", russian:"fa-book", geo:"fa-globe", history:"fa-landmark",
        literature:"fa-feather-alt", english:"fa-language", obzh:"fa-shield-alt", society:"fa-gavel",
        biology:"fa-dna", chemistry:"fa-flask", physics:"fa-atom"
    };

    // ------------------------------------------------------------------
    // 4. СОСТОЯНИЕ ИГРЫ
    // ------------------------------------------------------------------
    let currentSubject = 'math';
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0, level = 1, combo = 0, lives = 3;
    let selectedAnswer = null, waitingNext = false, hintUsed = false;
    let leaderboard = {};
    subjects.forEach(s => leaderboard[s] = []);

    function shuffleArray(arr) { for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
    function loadQuestionsForSubject(subject) { return shuffleArray([...(questionDB[subject]||[])]); }
    function updateUIStats() {
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('levelValue').innerText = level;
        document.getElementById('comboValue').innerText = combo;
        if(currentQuestions.length) document.getElementById('levelProgressFill').style.width = (currentIndex/currentQuestions.length)*100+'%';
        else document.getElementById('levelProgressFill').style.width = '0%';
    }
    function showFeedback(msg, isError=false) { let fb=document.getElementById('feedbackMsg'); if(fb){ fb.style.display='block'; fb.innerHTML=msg; fb.style.color=isError?'#ffaaaa':'#aaffaa'; setTimeout(()=>{ if(fb) fb.style.display='none'; },2000); } }
    function saveProgressLocally() { localStorage.setItem('quiz_progress_premium', JSON.stringify({ currentSubject, currentIndex, score, level, combo, lives, leaderboard })); }
    function loadProgressFromLocal() { let data=localStorage.getItem('quiz_progress_premium'); if(data){ let d=JSON.parse(data); currentSubject=d.currentSubject||'math'; currentIndex=d.currentIndex||0; score=d.score||0; level=d.level||1; combo=d.combo||0; lives=d.lives||3; if(d.leaderboard) leaderboard=d.leaderboard; currentQuestions=loadQuestionsForSubject(currentSubject); } }
    async function saveToVKStorage() { if(isVK&&vkBridge) await vkBridge.send('VKWebAppStorageSet',{key:'quizProgressPremium',value:JSON.stringify({score,level,combo,lives,currentSubject,currentIndex,leaderboard})}).catch(e=>{}); }
    async function loadFromVKStorage() { if(isVK&&vkBridge){ let res=await vkBridge.send('VKWebAppStorageGet',{keys:['quizProgressPremium']}); if(res.keys[0]?.value){ let d=JSON.parse(res.keys[0].value); score=d.score||0; level=d.level||1; combo=d.combo||0; lives=d.lives||3; currentSubject=d.currentSubject||'math'; currentIndex=d.currentIndex||0; if(d.leaderboard) leaderboard=d.leaderboard; } currentQuestions=loadQuestionsForSubject(currentSubject); } }
    function updateLeaderboard() { let lb=leaderboard[currentSubject]||[]; let idx=lb.findIndex(e=>e.id===currentUser.id); let entry={id:currentUser.id,name:currentUser.name,photo:currentUser.photo,score,level,timestamp:Date.now()}; if(idx!==-1){ if(score>lb[idx].score) lb[idx]=entry; } else lb.push(entry); lb.sort((a,b)=>b.score-a.score); leaderboard[currentSubject]=lb.slice(0,10); saveProgressLocally(); if(isVK&&vkBridge) saveToVKStorage(); }
    function showAdOffer(callback) { let modal=document.createElement('div'); modal.className='modal'; modal.innerHTML=`<div class="modal-content"><h3>❤️ Жизни кончились!</h3><p>Посмотреть рекламу и получить +1 жизнь?</p><div style="display:flex; gap:16px; margin-top:20px;"><button id="adYesBtn" style="background:#f56b2c; flex:1; padding:12px; border-radius:60px;">Да, смотреть</button><button id="adNoBtn" style="background:#555; flex:1; padding:12px; border-radius:60px;">Нет, закончить</button></div></div>`; document.body.appendChild(modal); document.body.style.overflow='hidden'; let close=()=>{ modal.remove(); document.body.style.overflow=''; }; modal.querySelector('#adYesBtn').onclick=()=>{ close(); callback(true); }; modal.querySelector('#adNoBtn').onclick=()=>{ close(); callback(false); }; modal.onclick=e=>{ if(e.target===modal){ close(); callback(false); } }; }
    function checkAnswer(){
        let q=currentQuestions[currentIndex]; if(!q) return;
        let correct=(selectedAnswer===q.correct); waitingNext=true;
        if(correct){
            let add=10+(combo>=2?5:0); score+=add; combo++;
            showFeedback(`✅ Верно! +${add} очков (комбо x${combo})`);
            assistantSay(`🎉 Отлично! +${add} очков. Комбо x${combo}!`,2500);
            updateUIStats();
            setTimeout(()=>{ currentIndex++; selectedAnswer=null; waitingNext=false; hintUsed=false; saveProgress(); renderGame(); },700);
        } else {
            lives--; combo=0; updateUIStats();
            showFeedback(`❌ Ошибка! Правильно: ${q.correct}. Осталось жизней: ${lives}`,true);
            assistantSay(`❌ Неправильно. Правильный ответ: ${q.correct}. Осталось жизней: ${lives}`,3000);
            if(lives<=0) setTimeout(()=>renderGame(),1500);
            else setTimeout(()=>{ waitingNext=false; selectedAnswer=null; hintUsed=false; saveProgress(); renderGame(); },1200);
        }
    }
    function levelUp(){ level++; score+=50; combo=0; updateUIStats(); showFeedback(`🎉 УРОВЕНЬ ${level}! +50 бонусов!`); assistantSay(`🎉 Поздравляю! Ты достиг ${level} уровня! +50 бонусов.`,4000); currentQuestions=loadQuestionsForSubject(currentSubject); currentIndex=0; waitingNext=false; selectedAnswer=null; hintUsed=false; saveProgress(); setTimeout(()=>renderGame(),600); }
    function resetGame(){ score=0; level=1; combo=0; lives=3; currentIndex=0; selectedAnswer=null; waitingNext=false; hintUsed=false; currentQuestions=loadQuestionsForSubject(currentSubject); saveProgress(); renderGame(); assistantSay('🔄 Прогресс сброшен. Начинай сначала!',3000); }
    function switchSubject(subject){
        if(subject===currentSubject) return;
        currentSubject=subject; score=0; level=1; combo=0; lives=3; currentIndex=0; selectedAnswer=null; waitingNext=false; hintUsed=false;
        currentQuestions=loadQuestionsForSubject(currentSubject); saveProgress(); updateUIStats(); renderGame();
        document.querySelectorAll('.subject-btn').forEach(btn=>{ if(btn.dataset.subj===subject) btn.classList.add('active'); else btn.classList.remove('active'); });
        assistantSay(`📚 Теперь ты изучаешь "${subjectNames[subject]}". Удачи!`,3000);
    }
    function saveProgress(){ saveProgressLocally(); if(isVK&&vkBridge) saveToVKStorage(); updateLeaderboard(); }
    function shareGame(){ let text=`🔥 Я набрал ${score} очков в «${subjectNames[currentSubject]}» на уровне ${level} в игре «Битва знаний»! Сможешь побить рекорд? 🧠⚡`; if(isVK&&vkBridge) vkBridge.send('VKWebAppShare',{link:appShareUrl,attachment:text}).catch(()=>alert('Не удалось открыть диалог.\n'+appShareUrl)); else alert(text+'\n\n'+appShareUrl); }
    function showLeaderboard(){
        let modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h3><i class="fas fa-trophy"></i> Топ-10 игроков</h3><div class="tabs" id="leaderTabs"></div><div id="leaderboardContent"></div><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.style.overflow='hidden';
        let tabs=modal.querySelector('#leaderTabs'), content=modal.querySelector('#leaderboardContent');
        function render(subj){ let lb=leaderboard[subj]||[]; if(lb.length===0) content.innerHTML='<p style="text-align:center;">Пока нет рекордов. Стань первым!</p>'; else content.innerHTML='<ul class="leaderboard-list">'+lb.map((u,i)=>`<li>${u.photo?`<img class="leaderboard-avatar" src="${u.photo}">`:'<div style="width:48px;height:48px;background:#6e2cf5;border-radius:50%;display:flex;align-items:center;justify-content:center;"><i class="fas fa-user"></i></div>'}<div><strong>${i+1}. ${escapeHtml(u.name)}</strong><br>🎯 ${u.score} очков | Уровень ${u.level}</div></li>`).join('')+'</ul>'; }
        subjects.forEach(s=>{ let btn=document.createElement('button'); btn.className='tab-btn'+(s===currentSubject?' active-tab':''); btn.innerText=subjectNames[s]; btn.onclick=()=>{ document.querySelectorAll('#leaderTabs .tab-btn').forEach(b=>b.classList.remove('active-tab')); btn.classList.add('active-tab'); render(s); }; tabs.appendChild(btn); });
        render(currentSubject);
        modal.querySelector('.close-modal').onclick=()=>{ modal.remove(); document.body.style.overflow=''; };
        modal.onclick=e=>{ if(e.target===modal){ modal.remove(); document.body.style.overflow=''; } };
    }
    function buildSubjectsUI(){ let grid=document.getElementById('subjectsGrid'); grid.innerHTML=''; subjects.forEach(s=>{ let btn=document.createElement('button'); btn.className='subject-btn'+(s===currentSubject?' active':''); btn.innerHTML=`<i class="fas ${subjectIcons[s]}"></i> ${subjectNames[s]}`; btn.dataset.subj=s; btn.addEventListener('click',()=>switchSubject(s)); grid.appendChild(btn); }); }
    function escapeHtml(str){ return String(str).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function showModalMessage(title,text){ let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>${title}</h3><p>${text}</p><button class="close-modal">Закрыть</button></div>`; document.body.appendChild(m); document.body.style.overflow='hidden'; m.querySelector('.close-modal').onclick=()=>{ m.remove(); document.body.style.overflow=''; }; m.onclick=e=>{ if(e.target===m){ m.remove(); document.body.style.overflow=''; } }; }
    function renderGame(){
        if(lives<=0){
            document.getElementById('gameArea').innerHTML=`<div class="result-area"><div class="result-score">💀 ПОРАЖЕНИЕ</div><p>Очки: ${score} | Уровень: ${level}</p><button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button><button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button><button class="reset-btn" id="selectSubjectBtn" style="background:#6e2cf5;">📚 ВЫБРАТЬ ДРУГОЙ ПРЕДМЕТ</button></div>`;
            document.getElementById('shareBtn')?.addEventListener('click',shareGame);
            document.getElementById('resetBtn')?.addEventListener('click',()=>resetGame());
            document.getElementById('selectSubjectBtn')?.addEventListener('click',()=>document.querySelector('.subjects-wrapper').scrollIntoView({behavior:'smooth'}));
            return;
        }
        if(!currentQuestions.length){ currentQuestions=loadQuestionsForSubject(currentSubject); currentIndex=0; }
        if(currentIndex>=currentQuestions.length){ levelUp(); return; }
        let q=currentQuestions[currentIndex];
        let hearts=''; for(let i=0;i<3;i++) hearts+=`<span class="heart ${i<lives?'heart-full':'heart-lost'}">❤️</span>`;
        let answersHtml=''; q.options.forEach(opt=>{ answersHtml+=`<button class="answer-btn ${selectedAnswer===opt?'selected':''}" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`; });
        let html=`<div class="quest-header"><div class="level-badge">⚡ Уровень ${level} · ${subjectNames[currentSubject]}</div><div class="lives">${hearts}</div></div><div class="question-card"><div class="question-text">${escapeHtml(q.text)}</div><div class="answers" id="answersContainer">${answersHtml}</div><div class="feedback" id="feedbackMsg"></div><button class="next-btn hidden" id="nextBtn">➡️ ДАЛЕЕ</button><button class="bonus-btn" id="bonusLifeBtn">❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button><button class="hint-btn" id="hintBtn"><i class="fas fa-robot"></i> Подсказка</button></div>`;
        document.getElementById('gameArea').innerHTML=html;
        document.querySelectorAll('.answer-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ if(waitingNext) return; selectedAnswer=btn.dataset.answer; document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); document.getElementById('nextBtn')?.classList.remove('hidden'); }); });
        document.getElementById('nextBtn')?.addEventListener('click',()=>{ if(waitingNext) return; if(!selectedAnswer){ showFeedback('⚠️ Выберите ответ!',true); assistantSay('👆 Сначала выбери вариант ответа!',2000); return; } checkAnswer(); });
        document.getElementById('bonusLifeBtn')?.addEventListener('click',()=>{ if(lives>=3){ showFeedback('У вас максимум жизней!',false); assistantSay('❤️ У тебя уже полные жизни!',2500); return; } showAdOffer((accepted)=>{ if(accepted){ lives=Math.min(3,lives+1); updateUIStats(); renderGame(); showFeedback('❤️ +1 жизнь получена!'); assistantSay('❤️ Ура! +1 жизнь. Продолжай!',2500); saveProgress(); } else { assistantSay('❌ Жаль. Но ты можешь начать заново.',3000); } }); });
        document.getElementById('hintBtn')?.addEventListener('click',()=>{ if(hintUsed){ showFeedback('Подсказка уже использована',true); assistantSay('🔍 Ты уже использовал подсказку!',2500); return; } let correct=q.correct; let wrongBtns=Array.from(document.querySelectorAll('.answer-btn')).filter(btn=>btn.dataset.answer!==correct); if(wrongBtns.length>=2){ wrongBtns.slice(0,2).forEach(btn=>{ btn.classList.add('disabled-hint'); btn.disabled=true; }); hintUsed=true; showFeedback('🔍 Два неверных ответа убраны!'); assistantSay('🔍 Подсказка активирована! Два неверных ответа убраны.',3000); document.getElementById('hintBtn').disabled=true; } else { showFeedback('Недостаточно вариантов для подсказки',true); assistantSay('⚠️ Не хватает вариантов для подсказки.',2500); } });
    }

    // ------------------------------------------------------------------
    // 5. ЗАПУСК
    // ------------------------------------------------------------------
    window.addEventListener('load', async ()=>{
        if(isVK&&vkBridge){ await initVK(); await loadFromVKStorage(); } else loadProgressFromLocal();
        if(!currentQuestions.length) currentQuestions=loadQuestionsForSubject(currentSubject);
        buildSubjectsUI(); renderGame(); updateUIStats();
        document.getElementById('assistantAvatar')?.addEventListener('click',()=>{ let tips=['💡 Совет: используй подсказку!','🏆 Комбо даёт бонус!','❤️ Реклама даёт +1 жизнь','📚 Учи новые вопросы','👑 Топ-10 покажет твой рекорд']; assistantSay(tips[Math.floor(Math.random()*tips.length)],3500); });
        startTutorial();
        document.getElementById('leaderboardBtn').onclick=showLeaderboard;
        document.getElementById('termsLink').onclick=()=>showModalMessage('📜 Пользовательское соглашение','Используя приложение, вы соглашаетесь с условиями VK Mini Apps. Ваши данные (ID, имя, аватар) используются для рейтинга и хранятся в VK Storage или локально. Контакты: vova_polyakov_94@mail.ru.<br><br><a href="https://vk.com/terms" target="_blank" style="color:#ffaa66;">https://vk.com/terms</a>');
        document.getElementById('privacyLink').onclick=()=>showModalMessage('🔒 Политика конфиденциальности','Мы обрабатываем только открытые данные VK ID, имя, фото для игровой статистики. Данные не передаются третьим лицам. Вы можете удалить прогресс кнопкой ниже.<br><br>Контакты: vova_polyakov_94@mail.ru.');
        document.getElementById('deleteDataLink').onclick=()=>{ if(confirm('🗑️ Удалить весь прогресс безвозвратно?')){ localStorage.clear(); if(isVK&&vkBridge) vkBridge.send('VKWebAppStorageSet',{key:'quizProgressPremium',value:''}); alert('Данные удалены. Перезагрузите страницу.'); location.reload(); } };
    });
</script>
</body>
</html>
