        function playMusic() { if (musicEnabled && !started) audio.play().then(() => started = true).catch(e=>{}); }
        const startOnInteraction = () => { playMusic(); document.removeEventListener('click', startOnInteraction); document.removeEventListener('touchstart', startOnInteraction); };
        document.addEventListener('click', startOnInteraction);
        document.addEventListener('touchstart', startOnInteraction);
        const musicBtn = document.getElementById('musicToggleBtn');
        if (musicBtn) musicBtn.onclick = (e) => { e.stopPropagation(); musicEnabled = !musicEnabled; if (musicEnabled) { playMusic(); musicBtn.innerHTML = '<i class="fas fa-music"></i> Вкл/Выкл'; } else { audio.pause(); musicBtn.innerHTML = '<i class="fas fa-volume-mute"></i> Вкл/Выкл'; } };

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

    function generateMathQuestion() { let a=Math.floor(Math.random()*10)+2,b=Math.floor(Math.random()*10)+2,correct=a+b; return { text: `${a} + ${b} = ?`, options: shuffle([correct.toString(), (correct+1).toString(), (correct-1).toString(), (correct+2).toString()]), correctHash: simpleHash(correct.toString()), points: 10 }; }
    function generateHistoryQuestion() { let ev=randomItem(historyQA); let personList=["Иван Грозный","Пётр I","Екатерина II","Николай II","Александр I","Владимир Ленин"]; let dateList=["988","1380","1613","1700","1861","1914","1917","1941","1991"]; let wrongs = ev.type==="person" ? personList.filter(w=>w!==ev.a).slice(0,3) : dateList.filter(w=>w!==ev.a).slice(0,3); let opts=unique([ev.a, ...wrongs]); while(opts.length<4) opts.push("Неизвестно"); return { text: ev.q, options: shuffle(opts.slice(0,4)), correctHash: simpleHash(ev.a), points:10 }; }
    function generateGeoQuestion() { let p=randomItem(countryCapital); let text=`Столица ${declineCountry(p[0])}?`; let correct=p[1]; let wrongs=countryCapital.filter(c=>c[0]!==p[0]).map(c=>c[1]).slice(0,3); let opts=unique([correct, ...wrongs]); while(opts.length<4) opts.push("Лондон"); return { text, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateLiteratureQuestion() { let item=randomItem(authorWork); let text=`Кто написал "${item.work}"?`; let correct=item.author; let wrongs=authorWork.filter(w=>w.author!==correct).map(w=>w.author).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Неизвестный автор"); return { text, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateEnglishQuestion() { let w=randomItem(engWords); let correct=w[1]; let wrongs=engWords.filter(e=>e[1]!==correct).map(e=>e[1]).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("unknown"); return { text: `Перевод слова "${w[0]}":`, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateOBZHQuestion() { let f=randomItem(obzhFacts); let opts=unique([f.correct,...f.wrong]); while(opts.length<4) opts.push("Неизвестно"); return { text: f.q, options: shuffle(opts), correctHash: simpleHash(f.correct), points:10 }; }
    function generateSocietyQuestion() { let f=randomItem(societyFacts); let wrongs=societyFacts.filter(s=>s[1]!==f[1]).map(s=>s[1]).slice(0,3); let opts=unique([f[1],...wrongs]); while(opts.length<4) opts.push("Неизвестно"); return { text: f[0], options: shuffle(opts), correctHash: simpleHash(f[1]), points:10 }; }
    function generateBiologyQuestion() { let f=randomItem(biologyFacts); let correct=f[1]; let wrongs=biologyFacts.filter(b=>b[1]!==correct).map(b=>b[1]).filter(w => !(correct==="Кожа" && w==="Хлоропластах")).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Неизвестно"); return { text: f[0], options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateChemistryQuestion() { let e=randomItem(elements); let text=`Химический символ ${declineElement(e[1])}?`; let correct=e[0]; let wrongs=elements.filter(el=>el[0]!==correct).map(el=>el[0]).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("??"); return { text, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generatePhysicsQuestion() { let f=randomItem(physicsFacts); let correct=f[1]; let wrongs=physicsFacts.filter(p=>p[1]!==correct).map(p=>p[1]); if(correct!=="300000") wrongs=wrongs.filter(w=>w!=="300000"); wrongs=wrongs.slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Энергия"); return { text: f[0], options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateRussianQuestion() { let base=randomItem(spellingWords); let opts=unique([base.word,...base.wrong]); if(opts.length<4) opts.push("неизвестно"); return { text: "Выберите правильное написание:", options: shuffle(opts.slice(0,4)), correctHash: simpleHash(base.word), points:10 }; }

    // ======================= ОСНОВНАЯ ЛОГИКА =======================
    const allSubjects = ["math","russian","geo","history","literature","english","obzh","society","biology","chemistry","physics"];
    const subjectNames = { math:"Математика", russian:"Русский язык", geo:"География", history:"История", literature:"Литература", english:"Английский", obzh:"ОБЖ", society:"Обществознание", biology:"Биология", chemistry:"Химия", physics:"Физика" };
    const subjectIcons = { math:"fa-calculator", russian:"fa-book", geo:"fa-globe", history:"fa-landmark", literature:"fa-feather-alt", english:"fa-language", obzh:"fa-shield-alt", society:"fa-gavel", biology:"fa-dna", chemistry:"fa-flask", physics:"fa-atom" };

    let progressBySubject = {};
    let currentSubject = "math";
    let currentQuestion = null;
    let selectedAnswer = null;
    let waitingForNext = false;
    let gameActive = true;
    let adLastShown = 0;
    let isAdWatching = false;
    let adTimerInterval = null;
    let hintUsed = false;
    const MAX_LIVES = 5;
    const Q_PER_LEVEL = 3;
    let currentUser = { id: 'guest', name: 'Гость', photo: '' };
    let leaderboardBySubject = {};
    let appShareUrl = "https://vk.com/app"; // будет заменён на реальный URL приложения

    for (let s of allSubjects) { progressBySubject[s] = { totalScore:0, level:1, lives:3, combo:0, qInLevel:0, levelPerfect:true, usedQuestions:new Set() }; leaderboardBySubject[s] = []; }

    async function initVK() {
        if (window.vkBridge) {
            try {
                await vkBridge.send("VKWebAppInit");
                const user = await vkBridge.send("VKWebAppGetUserInfo");
                if (user && user.id) currentUser = { id: user.id.toString(), name: user.first_name || 'Игрок', photo: user.photo_100 || '' };
                // Получаем параметры запуска, чтобы узнать app_id
                const launchParams = await vkBridge.send("VKWebAppGetLaunchParams");
                if (launchParams && launchParams.vk_app_id) {
                    appShareUrl = `https://vk.com/app${launchParams.vk_app_id}`;
                } else {
                    // фолбэк: пробуем получить через getAppInfo
                    try {
                        const appInfo = await vkBridge.send("VKWebAppGetAppInfo");
                        if (appInfo && appInfo.id) appShareUrl = `https://vk.com/app${appInfo.id}`;
                    } catch(e) {}
                }
                const storageRes = await vkBridge.send("VKWebAppStorageGet", { keys: ["quizProgressV9", "leaderboardBySubjectV2"] });
                if (storageRes && storageRes.keys) {
                    if (storageRes.keys[0] && storageRes.keys[0].value) {
                        let cloud = JSON.parse(storageRes.keys[0].value);
                        for (let s of allSubjects) if (cloud[s]) progressBySubject[s] = { ...progressBySubject[s], ...cloud[s], usedQuestions: new Set(cloud[s].usedQuestions || []) };
                    }
                    if (storageRes.keys[1] && storageRes.keys[1].value) leaderboardBySubject = JSON.parse(storageRes.keys[1].value);
                }
            } catch(e) { console.warn(e); }
        }
        const local = localStorage.getItem('quizProgressV9');
        if (local) { try { let data = JSON.parse(local); for (let s of allSubjects) if (data[s]) progressBySubject[s] = { ...progressBySubject[s], ...data[s], usedQuestions: new Set(data[s].usedQuestions || []) }; } catch(e){} }
        const localLeader = localStorage.getItem('leaderboardBySubjectV2');
        if (localLeader) try { leaderboardBySubject = JSON.parse(localLeader); } catch(e){}
        updateUI(); loadNewQuestion(); buildSubjectsUI(); startTutorial();
    }

    function saveAllProgress() {
        let toSave = {}; for (let s of allSubjects) toSave[s] = { totalScore: progressBySubject[s].totalScore, level: progressBySubject[s].level, lives: progressBySubject[s].lives, combo: progressBySubject[s].combo, qInLevel: progressBySubject[s].qInLevel, levelPerfect: progressBySubject[s].levelPerfect, usedQuestions: Array.from(progressBySubject[s].usedQuestions) };
        localStorage.setItem('quizProgressV9', JSON.stringify(toSave));
        localStorage.setItem('leaderboardBySubjectV2', JSON.stringify(leaderboardBySubject));
        if (window.vkBridge) { vkBridge.send("VKWebAppStorageSet", { key: "quizProgressV9", value: JSON.stringify(toSave) }).catch(e=>console.warn); vkBridge.send("VKWebAppStorageSet", { key: "leaderboardBySubjectV2", value: JSON.stringify(leaderboardBySubject) }).catch(e=>console.warn); }
        updateLeaderboardForCurrentSubject();
    }

    function updateLeaderboardForCurrentSubject() {
        let lb = leaderboardBySubject[currentSubject] || [];
        const totalScore = progressBySubject[currentSubject].totalScore;
        const existing = lb.findIndex(e => e.id === currentUser.id);
        const entry = { id: currentUser.id, name: currentUser.name, photo: currentUser.photo, score: totalScore, level: progressBySubject[currentSubject].level, timestamp: Date.now() };
        if (existing !== -1) { if (totalScore > lb[existing].score) lb[existing] = entry; else if (totalScore === lb[existing].score && progressBySubject[currentSubject].level > lb[existing].level) lb[existing] = entry; } else lb.push(entry);
        lb.sort((a,b) => b.score - a.score); lb = lb.slice(0, 10);
        leaderboardBySubject[currentSubject] = lb;
        localStorage.setItem('leaderboardBySubjectV2', JSON.stringify(leaderboardBySubject));
        if (window.vkBridge) vkBridge.send("VKWebAppStorageSet", { key: "leaderboardBySubjectV2", value: JSON.stringify(leaderboardBySubject) }).catch(e=>console.warn);
    }

    function showLeaderboard() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-trophy"></i> Топ-10 игроков</h3><div class="tabs" id="leaderTabs"></div><div id="leaderboardContent"></div><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.style.overflow = 'hidden';
        const tabsDiv = modal.querySelector('#leaderTabs');
        const contentDiv = modal.querySelector('#leaderboardContent');
        allSubjects.forEach(subj => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            if (subj === currentSubject) btn.classList.add('active-tab');
            btn.innerText = subjectNames[subj];
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
                btn.classList.add('active-tab');
                renderLeaderboardForSubject(subj, contentDiv);
            };
            tabsDiv.appendChild(btn);
        });
        renderLeaderboardForSubject(currentSubject, contentDiv);
        modal.querySelector('.close-modal').onclick = () => { modal.remove(); document.body.style.overflow = ''; };
        modal.onclick = (e) => { if(e.target === modal) { modal.remove(); document.body.style.overflow = ''; } };
    }
    function renderLeaderboardForSubject(subject, container) {
        let lb = leaderboardBySubject[subject] || [];
        if (lb.length === 0) { container.innerHTML = '<p style="text-align:center; margin:20px;">Пока нет рекордов. Стань первым!</p>'; return; }
        const list = document.createElement('ul'); list.className = 'leaderboard-list';
        list.innerHTML = lb.map((u, idx) => {
            const avatarHtml = u.photo ? `<img class="leaderboard-avatar" src="${u.photo}" alt="avatar">` : `<div class="leaderboard-avatar" style="background:#6e2cf5; display:inline-flex; align-items:center; justify-content:center;"><i class="fas fa-user"></i></div>`;
            return `<li>${avatarHtml}<div><strong>${idx+1}. ${escapeHtml(u.name)}</strong><br>🎯 ${u.score} очков | Уровень ${u.level}</div></li>`;
        }).join('');
        container.innerHTML = ''; container.appendChild(list);
    }
    document.getElementById("leaderboardBtn").onclick = showLeaderboard;

    function getCurrentProgress() { return progressBySubject[currentSubject]; }
    function updateUI() { let p=getCurrentProgress(); document.getElementById("scoreValue").innerText = p.totalScore; document.getElementById("levelValue").innerText = p.level; document.getElementById("comboValue").innerText = p.combo; document.getElementById("levelProgressFill").style.width = (p.qInLevel / Q_PER_LEVEL) * 100 + "%"; }

    function getUniqueQuestion(subject) {
        let p = progressBySubject[subject], q = null, attempts=0;
        do {
            if(subject==='math') q=generateMathQuestion(); else if(subject==='russian') q=generateRussianQuestion();
            else if(subject==='geo') q=generateGeoQuestion(); else if(subject==='history') q=generateHistoryQuestion();
            else if(subject==='literature') q=generateLiteratureQuestion(); else if(subject==='english') q=generateEnglishQuestion();
            else if(subject==='obzh') q=generateOBZHQuestion(); else if(subject==='society') q=generateSocietyQuestion();
            else if(subject==='biology') q=generateBiologyQuestion(); else if(subject==='chemistry') q=generateChemistryQuestion();
            else if(subject==='physics') q=generatePhysicsQuestion();
            attempts++; if(attempts>200) return null;
        } while(p.usedQuestions.has(q.text+q.correctHash));
        p.usedQuestions.add(q.text+q.correctHash); return q;
    }

    function loadNewQuestion() { if(!gameActive) return; waitingForNext=false; hintUsed=false; let p=getCurrentProgress(); if(p.lives<=0) { offerAdForRevival(); return; } let q=getUniqueQuestion(currentSubject); if(!q) { finishGame(true); return; } currentQuestion=q; selectedAnswer=null; renderUI(); }

    function advance(isCorrect) { let p=getCurrentProgress(); if(!isCorrect) p.levelPerfect=false; p.qInLevel++; saveAllProgress(); updateUI(); if(p.qInLevel>=Q_PER_LEVEL) { let bonus=50; p.totalScore+=bonus; if(p.levelPerfect) { showConfetti(); showTemporaryMessage(`🎉 ИДЕАЛЬНЫЙ УРОВЕНЬ ${p.level}! +${bonus} бонусов!`); } p.level++; p.qInLevel=0; p.levelPerfect=true; saveAllProgress(); updateUI(); setTimeout(()=>loadNewQuestion(), 400); return; } loadNewQuestion(); }

    function handleAnswerSubmit() { if(waitingForNext || !gameActive || !selectedAnswer) return; let isCorrect=(simpleHash(selectedAnswer)===currentQuestion.correctHash); let p=getCurrentProgress(); let fbDiv=document.getElementById("feedbackMsg"); if(isCorrect){ let earned=currentQuestion.points; p.totalScore+=earned; p.combo++; let comboBonus=p.combo>=3?15:0; if(comboBonus>0){ p.totalScore+=comboBonus; fbDiv.innerHTML=`✅ ВЕРНО! +${earned} + комбо x${p.combo} +${comboBonus}! 🔥`; } else fbDiv.innerHTML=`✅ ВЕРНО! +${earned} очков. Отлично!`; saveAllProgress(); updateUI(); } else { p.lives--; p.combo=0; saveAllProgress(); updateUI(); let correctAnswer=currentQuestion.options.find(opt=>simpleHash(opt)===currentQuestion.correctHash); fbDiv.innerHTML=`❌ ОШИБКА! Правильно: ${correctAnswer}. Жизней: ${p.lives}`; if(p.lives<=0){ waitingForNext=true; offerAdForRevival(); return; } } waitingForNext=true; advance(isCorrect); }

    function showTemporaryMessage(msg, duration=3000) { let fb=document.getElementById("feedbackMsg"); if(fb){ fb.style.display="block"; fb.innerHTML=msg; setTimeout(()=>{ if(fb.innerHTML===msg){ fb.style.display="none"; fb.innerHTML=""; } }, duration); } }

    async function showRewardedAd() { if(!window.vkBridge) { showTemporaryMessage("Реклама недоступна"); return false; } let now=Date.now(); if(now-adLastShown<30000){ showTemporaryMessage(`⚠️ Реклама раз в 30 секунд. Подождите ${Math.ceil((30000-(now-adLastShown))/1000)}с`); return false; } if(isAdWatching) return false; isAdWatching=true; adLastShown=now; if(adTimerInterval) clearInterval(adTimerInterval); adTimerInterval=setInterval(()=>updateAdButtonTimer(),1000); try{ let result=await vkBridge.send("VKWebAppShowNativeAds",{ ad_format:"reward" }); if(result && result.result===true){ let p=getCurrentProgress(); if(p.lives<MAX_LIVES) p.lives++; else { showTemporaryMessage("Максимум жизней"); isAdWatching=false; updateAdButtonTimer(); return false; } saveAllProgress(); updateUI(); if(currentQuestion) renderUI(); showTemporaryMessage("❤️ +1 жизнь!"); return true; } else { showTemporaryMessage("Реклама не досмотрена"); return false; } } catch(e){ return false; } finally{ isAdWatching=false; updateAdButtonTimer(); } }

    function offerAdForRevival() { if(!gameActive) return; gameActive=false; showConfirmModal("Жизни кончились! Смотреть рекламу?", async ()=>{ let success=await showRewardedAd(); if(success){ gameActive=true; waitingForNext=false; if(currentQuestion) renderUI(); else loadNewQuestion(); } else finishGame(false); },()=>finishGame(false)); }

    function finishGame(success) { gameActive=false; let p=getCurrentProgress(); let resultText = success ? "🏆 ПОБЕДА!" : "💀 ПОРАЖЕНИЕ"; document.getElementById("gameArea").innerHTML=`<div class="result-area"><div class="result-score">${resultText}</div><p style="margin:12px 0; color:white; font-size:1.2rem;">Очки: ${p.totalScore} | Уровень: ${p.level}</p><button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button><button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button><button class="reset-btn" id="selectSubjectHint" style="margin-top:8px; background:#6e2cf5;">📚 ВЫБРАТЬ ДРУГОЙ ПРЕДМЕТ</button></div>`; 
        const shareBtn = document.getElementById("shareBtn");
        if (shareBtn) {
            shareBtn.addEventListener("click", () => {
                const shareText = `Я прошёл(а) «${subjectNames[currentSubject]}» в игре «Битва знаний» с результатом ${p.totalScore} очков и уровнем ${p.level}! Заходи, сыграем?`;
                if (window.vkBridge) {
                    vkBridge.send("VKWebAppShare", { link: appShareUrl, attachment: shareText }).catch(e => console.warn);
                } else {
                    alert("Поделиться можно только внутри VK Mini App");
                }
            });
        }
        document.getElementById("resetBtn")?.addEventListener("click",()=>{ resetSubjectProgress(currentSubject); });
        document.getElementById("selectSubjectHint")?.addEventListener("click",()=>{ document.querySelector('.subjects-wrapper').scrollIntoView({behavior:"smooth"}); setTimeout(()=>{ if(!gameActive){ gameActive=true; waitingForNext=false; currentQuestion=null; loadNewQuestion(); } },100); }); }

    function resetSubjectProgress(subject) { progressBySubject[subject] = { totalScore:0, level:1, lives:3, combo:0, qInLevel:0, levelPerfect:true, usedQuestions:new Set() }; if(subject===currentSubject) { waitingForNext=false; selectedAnswer=null; gameActive=true; currentQuestion=null; saveAllProgress(); updateUI(); loadNewQuestion(); } else { saveAllProgress(); } }

    function applyHint() {
        if (hintUsed) { showTemporaryMessage("Подсказка уже использована для этого вопроса!", 2000); return; }
        if (!currentQuestion) return;
        const allAnswers = document.querySelectorAll(".answer-btn");
        if (allAnswers.length === 0) return;
        const correctAnswer = currentQuestion.options.find(opt => simpleHash(opt) === currentQuestion.correctHash);
        let wrongButtons = Array.from(allAnswers).filter(btn => btn.getAttribute("data-answer") !== correctAnswer);
        if (wrongButtons.length < 2) { showTemporaryMessage("Недостаточно вариантов для подсказки", 1500); return; }
        wrongButtons = shuffle(wrongButtons);
        const toRemove = wrongButtons.slice(0, 2);
        toRemove.forEach(btn => {
            btn.classList.add("disabled-hint");
            btn.disabled = true;
        });
        hintUsed = true;
        showTemporaryMessage("🔍 Подсказка: два неверных ответа убраны!", 2500);
        const hintBtn = document.getElementById("hintBtn");
        if (hintBtn) hintBtn.disabled = true;
    }

    function renderUI() { if(!currentQuestion) return; let p=getCurrentProgress(); let livesHtml=''; for(let i=0;i<MAX_LIVES;i++) livesHtml+= i<p.lives ? '<i class="fas fa-heart"></i>' : '<i class="fas fa-heart-broken"></i>'; let html=`<div class="quest-header"><div class="level-badge">⚡ Уровень ${p.level} · ${subjectNames[currentSubject]}</div><div class="lives">${livesHtml}</div></div><div class="question-card"><div class="question-text">${escapeHtml(currentQuestion.text)}</div><div class="answers" id="answersContainer">${currentQuestion.options.map(opt=>`<button class="answer-btn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}</div><div class="feedback" id="feedbackMsg" style="display:none;"></div><button class="next-btn hidden" id="nextBtn">➡️ ДАЛЕЕ</button><button class="bonus-btn" id="bonusLifeBtn">❤️ +1 ЖИЗНЬ</button><button class="hint-btn" id="hintBtn"><i class="fas fa-robot"></i> Подсказка</button></div>`; document.getElementById("gameArea").innerHTML=html; hintUsed = false;
        document.querySelectorAll(".answer-btn").forEach(btn=>{ btn.addEventListener("click",()=>{ if(waitingForNext||!gameActive) return; selectedAnswer=btn.getAttribute("data-answer"); document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected")); btn.classList.add("selected"); document.getElementById("nextBtn")?.classList.remove("hidden"); }); });
        document.getElementById("nextBtn")?.addEventListener("click",()=>{ if(selectedAnswer && !waitingForNext) handleAnswerSubmit(); else if(!selectedAnswer) showTemporaryMessage("Выберите ответ"); });
        document.getElementById("bonusLifeBtn")?.addEventListener("click",async()=>{ if(p.lives>=MAX_LIVES) showTemporaryMessage("Максимум жизней"); else await showRewardedAd(); });
        const hintBtn = document.getElementById("hintBtn");
        if (hintBtn) hintBtn.addEventListener("click", applyHint);
        updateAdButtonTimer();
    }

    function updateAdButtonTimer() { let btn=document.getElementById("bonusLifeBtn"); if(!btn) return; let rem=Math.max(0, 30000-(Date.now()-adLastShown)); if(rem>0 && adLastShown>0){ btn.disabled=true; btn.innerHTML=`⏳ +1 ЖИЗНЬ (${Math.ceil(rem/1000)}с)`; } else { btn.disabled=false; btn.innerHTML=`❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ`; if(adTimerInterval) clearInterval(adTimerInterval); adTimerInterval=null; } }

    function showConfirmModal(msg, onYes, onNo) { let modal=document.createElement('div'); modal.className='modal'; modal.innerHTML=`<div class="modal-content"><p>${msg}</p><div style="display:flex; gap:12px; margin-top:20px;"><button class="modal-btn confirm" style="background:#f56b2c; padding:12px 24px; border-radius:60px;">Да, смотреть</button><button class="modal-btn cancel" style="background:#555; padding:12px 24px; border-radius:60px;">Нет, закончить</button></div></div>`; document.body.appendChild(modal); document.body.style.overflow='hidden'; let close=()=>{ modal.remove(); document.body.style.overflow=''; }; modal.querySelector('.confirm').onclick = () => { close(); onYes(); }; modal.querySelector('.cancel').onclick = () => { close(); onNo(); }; modal.onclick = (e) => { if(e.target===modal) { close(); onNo(); } }; }

    function showConfetti() { for(let i=0;i<60;i++){ let c=document.createElement('div'); c.classList.add('confetti-piece'); c.style.left=Math.random()*window.innerWidth+'px'; c.style.backgroundColor=`hsl(${Math.random()*360},80%,60%)`; document.body.appendChild(c); setTimeout(()=>c.remove(),2500); } }

    function buildSubjectsUI() { let grid=document.getElementById("subjectsGrid"); if(!grid) return; grid.innerHTML=''; allSubjects.forEach(s=>{ let btn=document.createElement('button'); btn.className='subject-btn'; if(s===currentSubject) btn.classList.add('active'); btn.innerHTML=`<i class="fas ${subjectIcons[s]}"></i> ${subjectNames[s]}`; btn.onclick=()=>{ if(s===currentSubject && gameActive) return; saveAllProgress(); document.querySelectorAll('.subject-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentSubject=s; waitingForNext=false; selectedAnswer=null; gameActive=true; currentQuestion=null; updateUI(); loadNewQuestion(); }; grid.appendChild(btn); }); }

    function showInfoModal(title, text) { let m=document.createElement('div'); m.className='modal'; m.innerHTML=`<div class="modal-content"><h3>${title}</h3><p>${text}</p><button class="close-modal">Закрыть</button></div>`; document.body.appendChild(m); document.body.style.overflow='hidden'; m.querySelector('.close-modal').onclick = () => { m.remove(); document.body.style.overflow=''; }; m.onclick=(e)=>{ if(e.target===m){ m.remove(); document.body.style.overflow=''; } }; }

    function startTutorial() { if(localStorage.getItem('tutorialShown')) return; showInfoModal("🎓 Добро пожаловать!", "• Выбирайте предмет вверху<br>• Отвечайте на вопросы<br>• За ошибку теряете жизнь<br>• Реклама даёт +1 жизнь (раз в 30 сек)<br>• Комбо увеличивает очки<br>• Топ-10 по каждому предмету — вкладки<br>• Подсказка убирает два неверных ответа"); localStorage.setItem('tutorialShown','true'); }

    document.getElementById("termsLink").onclick = () => showInfoModal("Пользовательское соглашение", "1. Соглашение регулирует отношения...<br>2. Использование приложения означает полное согласие.<br>3. Контакт: vova_polyakov_94@mail.ru");
    document.getElementById("privacyLink").onclick = () => showInfoModal("Политика конфиденциальности", "Собираем только ID, имя и аватар для рейтинга. Данные хранятся в VK Storage. Можно удалить кнопкой 'Удалить данные'.");
    document.getElementById("deleteDataLink").onclick = () => showConfirmModal("🗑️ Удалить весь прогресс безвозвратно?", () => { localStorage.clear(); if(window.vkBridge) vkBridge.send("VKWebAppStorageSet", { key: "quizProgressV9", value: "" }); location.reload(); }, () => {});

    initVK();
</script>
