    // ======================= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =======================
    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function unique(arr) { return [...new Set(arr)]; }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function simpleHash(str) { let h=0; for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i),h|=0; return h; }
    function declineCountry(c) {
        const e = {"Россия":"России","США":"США","Франция":"Франции","Германия":"Германии","Китай":"Китая","Япония":"Японии","Италия":"Италии","Великобритания":"Великобритании","Испания":"Испании","Канада":"Канады","Бразилия":"Бразилии","Австралия":"Австралии","Индия":"Индии","Египет":"Египта","Турция":"Турции"};
        return e[c] || (c.endsWith('я')?c.slice(0,-1)+'и':c.endsWith('а')?c.slice(0,-1)+'ы':c+'а');
    }
    function declineElement(n) {
        const e = {"Золото":"золота","Серебро":"серебра","Железо":"железа","Свинец":"свинца","Ртуть":"ртути","Кислород":"кислорода","Водород":"водорода","Натрий":"натрия","Хлор":"хлора","Углерод":"углерода","Азот":"азота"};
        return e[n] || n.toLowerCase()+'а';
    }

    function generateMathQuestion(level) {
        let complexity = Math.min(3+Math.floor(level/3),12);
        let a = Math.floor(Math.random()*(5+complexity))+2;
        let b = Math.floor(Math.random()*(5+complexity))+2;
        let ops = ['+','-','×']; if(level>=3) ops.push('÷');
        let op = randomItem(ops);
        let correct, text, opts;
        if(op==='+'){ correct=a+b; text=`${a} + ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0); }
        else if(op==='-'){ if(a<b)[a,b]=[b,a]; correct=a-b; text=`${a} - ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>=0); if(correct===0) opts=[0,1,2,3]; }
        else if(op==='×'){ correct=a*b; text=`${a} × ${b} = ?`; opts=[correct,correct+2,correct-2,correct+1].filter(v=>v>0); }
        else{ let dividend=a*b; let divisor=b; correct=a; text=`${dividend} ÷ ${divisor} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0); }
        if(opts.length<4) opts.push(Math.abs(correct)+3);
        opts = unique(opts);
        while(opts.length<4) opts.push((Number(correct)+1).toString());
        return { text, options: shuffle(opts.map(String)), correctHash: simpleHash(correct.toString()), points: 10+Math.floor(level/2) };
    }
    function generateHistoryQuestion(){ 
        let ev=randomItem(historyQA); 
        let wrongs=historyQA.filter(e=>e.type===ev.type && e.a!==ev.a).map(e=>e.a).slice(0,3); 
        if(wrongs.length<3) wrongs.push(ev.type==='person'?"Иван Грозный":"1500"); 
        let opts=unique([ev.a,...wrongs]).slice(0,4); 
        while(opts.length<4) opts.push(ev.type==='person'?"Александр Невский":"1600"); 
        return { text: ev.q, options: shuffle([...opts]), correctHash: simpleHash(ev.a), points:10 }; 
    }

    function generateRussianQuestion(){ 
        let base = randomItem(spellingWords);
        let opts = [base.word, ...base.wrong];

        if (opts.length < 4) {

            while (opts.length < 4 && !opts.includes(filler)) opts.push(filler);
        }
        return { text: `Выберите правильное написание слова:`, options: shuffle(opts.slice(0,4)), correctHash: simpleHash(base.word), points:10 };
    }

    function getUniqueQuestion(subject, lvl) {
        const p = progressBySubject[subject];
        if (!p) return null;
        let attempts=0, q;
        const maxAttempts=200;
        do {
            if(subject==='math') q=generateMathQuestion(lvl);
            else if(subject==='russian') q=generateRussianQuestion();
            else if(subject==='geo') q=generateGeoQuestion();
            else if(subject==='history') q=generateHistoryQuestion();
            else if(subject==='literature') q=generateLiteratureQuestion();
            else if(subject==='english') q=generateEnglishQuestion();
            else if(subject==='obzh') q=generateOBZHQuestion();
            else if(subject==='society') q=generateSocietyQuestion();
            else if(subject==='biology') q=generateBiologyQuestion();
            else if(subject==='chemistry') q=generateChemistryQuestion();
            else if(subject==='physics') q=generatePhysicsQuestion();
            attempts++;
            if(attempts>maxAttempts) return null;
        } while(p.usedQuestions.has(q.text+q.correctHash));
        p.usedQuestions.add(q.text+q.correctHash);
        return q;
    }
    function loadNewQuestion() {
        if(!gameActive) return;
        waitingForNext = false;
        const p = getCurrentProgress();
        if(p.lives <= 0) { offerAdForRevival(); return; }
        let q = getUniqueQuestion(currentSubject, p.level);
        if(!q) { finishGame(true); return; }
        currentQuestion = q;
        selectedAnswer = null;
        renderUI();

    function advance(isCorrect) {
        const p = getCurrentProgress();
        if(!isCorrect) p.levelPerfect = false;
        p.qInLevel++;
        saveAllProgress();
        updateUIFromProgress();
        if(p.qInLevel >= Q_PER_LEVEL) {
            let bonus=50;
            p.totalScore += bonus;
            if(p.levelPerfect) { showConfettiAdaptive(); showTemporaryMessage(`🎉 ИДЕАЛЬНЫЙ УРОВЕНЬ ${p.level}! +${bonus} бонусов!`); }
            p.level++; p.qInLevel=0; p.levelPerfect=true;
            saveAllProgress(); updateUIFromProgress();
            setTimeout(()=>loadNewQuestion(),400);
            return;
        }
        loadNewQuestion();
    }

            p.combo++;
            let comboBonus = p.combo>=3?15:0;
            if(comboBonus>0){ p.totalScore+=comboBonus; fbDiv.innerHTML=`✅ ВЕРНО! +${earned} + комбо x${p.combo} +${comboBonus}! 🔥`; }
            else fbDiv.innerHTML=`✅ ВЕРНО! +${earned} очков. Отлично!`;
            saveAllProgress(); updateUIFromProgress();
        } else {
            p.lives--; p.combo=0; saveAllProgress(); updateUIFromProgress();
            let correctAnswer = currentQuestion.options.find(opt => simpleHash(opt) === currentQuestion.correctHash);
            fbDiv.innerHTML = `❌ ОШИБКА! Правильно: ${correctAnswer}. Жизней: ${p.lives}`;
            if(p.lives<=0){ waitingForNext=true; offerAdForRevival(); return; }
        }
        waitingForNext=true;
        document.querySelectorAll(".answer-btn").forEach(btn=>btn.disabled=true);
        advance(isCorrect);
    }
    function showTemporaryMessage(msg, duration=3000) {
        const fb = document.getElementById("feedbackMsg");
        if(fb){ fb.style.display="block"; fb.innerHTML=msg; setTimeout(()=>{ if(fb.innerHTML===msg){ fb.style.display="none"; fb.innerHTML=""; } }, duration); }
    }
    async function showRewardedAd(adType) {
        if(!window.vkBridge) return false;
        const now=Date.now();
        if(now-adLastShown<30000){ showTemporaryMessage(`⚠️ Реклама доступна раз в 30 секунд. Подождите ${Math.ceil((30000-(now-adLastShown))/1000)} с.`); return false; }
        if(isAdWatching) return false;
        isAdWatching=true; adLastShown=now;
        if(adTimerInterval) clearInterval(adTimerInterval);
        adTimerInterval = setInterval(() => updateAdButtonTimer(), 1000);
        try{
            const result=await vkBridge.send("VKWebAppShowNativeAds",{ ad_format:"reward" });
            if(result && result.result===true){
                const p=getCurrentProgress();
                if(adType==='revive') p.lives=Math.min(p.lives+1, MAX_LIVES);
                else if(adType==='bonus'){ if(p.lives<MAX_LIVES) p.lives++; else{ showTemporaryMessage("У вас уже максимум жизней"); isAdWatching=false; updateAdButtonTimer(); return false; } }
                saveAllProgress(); updateUIFromProgress();
                if(currentQuestion) renderUI();
                showTemporaryMessage("❤️ +1 жизнь за просмотр рекламы!");
                return true;
            } else{ showTemporaryMessage("Реклама не досмотрена"); return false; }
        } catch(e){ console.error(e); return false; } finally{ isAdWatching=false; updateAdButtonTimer(); }
    }
    function offerAdForRevival() {
        if(!gameActive) return;
        gameActive=false;
        showConfirmModal("У вас закончились жизни! Хотите посмотреть рекламу и получить +1 жизнь?", async ()=>{
            let success=await showRewardedAd('revive');
            if(success){ gameActive=true; waitingForNext=false; if(currentQuestion) renderUI(); else loadNewQuestion(); }
            else finishGame(false);
        },()=>finishGame(false));
    }
    function finishGame(success) {
        gameActive=false;
        const p=getCurrentProgress();
        document.getElementById("gameArea").innerHTML=`<div class="result-area"><div class="result-score">${success?"🏆 ПОБЕДА!":"💀 ПОРАЖЕНИЕ"}</div><p style="margin:12px 0">Очки: ${p.totalScore} | Уровень: ${p.level}</p>
        <button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button>
        <button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button>
        <button class="reset-btn" id="selectSubjectHint" style="margin-top:8px; background:#6e2cf5;">📚 ВЫБРАТЬ ДРУГОЙ ПРЕДМЕТ</button>
        </div>`;
        document.getElementById("shareBtn")?.addEventListener("click",()=>{ if(window.vkBridge) vkBridge.send("VKWebAppShare",{link:"https://vk.com",attachment:`Я прошёл ${subjectNames[currentSubject]} с ${p.totalScore} очков!`}); });
        document.getElementById("resetBtn")?.addEventListener("click",()=>{ resetSubjectProgress(currentSubject); loadNewQuestion(); });
        document.getElementById("selectSubjectHint")?.addEventListener("click",()=>{ document.querySelector('.subjects-wrapper').scrollIntoView({behavior:"smooth"}); });
    }
    function resetSubjectProgress(subject) {
        progressBySubject[subject] = { totalScore:0, level:1, lives:3, combo:0, qInLevel:0, levelPerfect:true, usedQuestions:new Set() };
        if(subject === currentSubject) { waitingForNext=false; selectedAnswer=null; gameActive=true; currentQuestion=null; loadNewQuestion(); }
        saveAllProgress(); updateUIFromProgress();
    }
    function renderUI() {
        if(!currentQuestion) return;
        const p=getCurrentProgress();
        const hearts="❤️".repeat(p.lives)+"🖤".repeat(MAX_LIVES-p.lives);
        const html=`<div class="quest-header"><div class="level-badge">⚡ Уровень ${p.level} · ${subjectNames[currentSubject]}</div><div class="lives">${hearts}</div></div>
        <div class="question-card"><div class="question-text">${escapeHtml(currentQuestion.text)}</div><div class="answers" id="answersContainer">${currentQuestion.options.map(opt=>`<button class="answer-btn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}</div>
        <div class="feedback" id="feedbackMsg" style="display:none;"></div>
        <button class="next-btn hidden" id="nextBtn">➡️ ДАЛЕЕ</button>
        <button class="bonus-btn" id="bonusLifeBtn">❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button>
        <button class="hint-btn" id="hintBtn"><i class="fas fa-robot"></i> 🤖 Подсказка ИИ</button></div>`;
        document.getElementById("gameArea").innerHTML=html;
        document.querySelectorAll(".answer-btn").forEach(btn=>{
            btn.addEventListener("click",()=>{
                if(waitingForNext||!gameActive) return;
                selectedAnswer=btn.getAttribute("data-answer");
                document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected"));
                btn.classList.add("selected");
                document.getElementById("nextBtn")?.classList.remove("hidden");
            });
        });
        document.getElementById("nextBtn")?.addEventListener("click",()=>{ if(selectedAnswer && !waitingForNext) handleAnswerSubmit(); else if(!selectedAnswer) showTemporaryMessage("Выберите вариант ответа"); });
        document.getElementById("bonusLifeBtn")?.addEventListener("click",async()=>{ if(p.lives>=MAX_LIVES) showTemporaryMessage("У вас максимум жизней"); else await showRewardedAd('bonus'); });
        document.getElementById("hintBtn")?.addEventListener("click",()=>{
            let hintText = "🤖 ИИ-подсказка: ";
            if(currentSubject === "math") hintText += "Попробуй выполнить действие в уме, проверь знаки.";
            else if(currentSubject === "russian") hintText += "Вспомни правила орфографии, отбрось явно неверные варианты.";
            else if(currentSubject === "geo") hintText += "Вспомни столицу из школьного атласа.";
            else hintText += "Отбрось заведомо неверные варианты, обычно остаётся 2 вероятных.";
            showTemporaryMessage(hintText, 4000);
        });
        updateAdButtonTimer();
    }
    function updateAdButtonTimer() {
        const btn = document.getElementById("bonusLifeBtn");
        if(!btn) return;
        const now=Date.now();
        const rem = Math.max(0, 30000 - (now - adLastShown));
        if(rem>0 && adLastShown>0){ btn.disabled=true; btn.innerHTML=`⏳ +1 ЖИЗНЬ (${Math.ceil(rem/1000)}с)`; }
        else { btn.disabled=false; btn.innerHTML=`❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ`; if(adTimerInterval){ clearInterval(adTimerInterval); adTimerInterval=null; } }
    }
    function showConfirmModal(message, onConfirm, onCancel) {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><p>${message}</p><div class="modal-buttons" style="display:flex; gap:12px; margin-top:16px;"><button class="modal-btn confirm" style="background:#f56b2c;">Да, смотреть</button><button class="modal-btn cancel" style="background:#555;">Нет, закончить</button></div></div>`;
        document.body.appendChild(modal); document.body.style.overflow='hidden';
        const closeModal=()=>{ modal.remove(); document.body.style.overflow=''; };
        modal.querySelector('.confirm').onclick=()=>{ closeModal(); onConfirm(); };
        modal.querySelector('.cancel').onclick=()=>{ closeModal(); onCancel(); };
        modal.onclick=(e)=>{ if(e.target===modal) { closeModal(); onCancel(); } };
    }
    function showConfettiAdaptive() {
        let count=window.innerWidth<600?40:70;
        for(let i=0;i<count;i++){
            let c=document.createElement('div'); c.classList.add('confetti-piece');
            c.style.left=Math.random()*window.innerWidth+'px';
            c.style.backgroundColor=`hsl(${Math.random()*360},80%,60%)`;
            c.style.width=Math.random()*8+4+'px'; c.style.height=Math.random()*12+6+'px';
            c.style.animationDuration=Math.random()*1.5+1+'s';
            document.body.appendChild(c); setTimeout(()=>c.remove(),2500);
        }
    }
    function buildSubjectsUI() {
        const grid=document.getElementById("subjectsGrid");
        grid.innerHTML='';
        allSubjects.forEach(s=>{
            const btn=document.createElement('button'); btn.className='subject-btn';
            if(s===currentSubject) btn.classList.add('active');
            btn.innerHTML=`<i class="fas ${subjectIcons[s]}"></i> ${subjectNames[s]}`;
            btn.onclick=()=>{
                if(s===currentSubject && gameActive) return;
                saveAllProgress();
                document.querySelectorAll('.subject-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentSubject=s;
                initSubjectProgress(s);
                waitingForNext=false; selectedAnswer=null; gameActive=true; isAdWatching=false;
                currentQuestion = null;
                updateUIFromProgress();
                loadNewQuestion();
            };
            grid.appendChild(btn);
        });
    }
    function showInfoModal(title, text){
        const m=document.createElement('div'); m.className='modal';
        m.innerHTML=`<div class="modal-content"><h3>${title}</h3><p>${text}</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(m); m.querySelector('.close-modal').onclick=()=>m.remove();
        m.onclick=(e)=>{ if(e.target===m) m.remove(); };
    }
    function startTutorial() {
        if(localStorage.getItem('tutorialShown')) return;
        const overlay = document.createElement('div'); overlay.className = 'tutorial-overlay';
        overlay.innerHTML = `<div class="tutorial-card"><i class="fas fa-graduation-cap" style="font-size:3rem"></i><h3>Добро пожаловать!</h3>
        <p>📌 Выбирай предмет → отвечай на вопросы → набирай комбо.<br>
        ❤️ За ошибку теряешь жизнь. Реклама даёт +1 жизнь.<br>
        🎁 Идеальное прохождение уровня = бонус 50 очков!<br>
        🏆 Твой рейтинг попадёт в ТОП-10.</p>
        <button id="closeTutorial" style="background:#f56b2c; border:none; padding:10px 20px; border-radius:40px; color:white; margin-top:12px;">Понятно, начать!</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById('closeTutorial').onclick = () => { overlay.remove(); localStorage.setItem('tutorialShown','true'); };
    }
    // Правовые ссылки
    document.getElementById("termsLink").onclick=()=>showInfoModal("Пользовательское соглашение","Используя приложение, вы соглашаетесь с правилами игры. Данные не передаются третьим лицам.");
    document.getElementById("privacyLink").onclick=()=>showInfoModal("Политика конфиденциальности","Ваш прогресс сохраняется локально и в VK Storage. Мы не собираем лишних данных.");
    document.getElementById("deleteDataLink").onclick=()=>showConfirmModal("Удалить весь прогресс безвозвратно?",()=>{ localStorage.clear(); location.reload(); },()=>{});
    // Старт
    buildSubjectsUI();
    updateUIFromProgress();
    loadNewQuestion();
    startTutorial();
</script>
</body>
</html>
