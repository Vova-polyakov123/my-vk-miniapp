<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва знаний — VK Mini App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            max-width: 650px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .header {
            background: linear-gradient(135deg, #6e2cf5, #a742f5, #f56b2c);
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
            padding: 24px 20px 20px;
            text-align: center;
            color: white;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .header h1 span { font-size: 1.2rem; opacity: 0.9; vertical-align: super; }
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 10px 20px;
            margin-top: 16px;
            font-weight: 700;
        }
        .level-progress {
            margin: 16px 20px 0;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 8px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ffd966;
            border-radius: 20px;
            transition: width 0.3s;
        }
        .subjects-wrapper {
            padding: 16px 12px;
            background: rgba(0,0,0,0.3);
            overflow-x: auto;
            white-space: nowrap;
            scroll-behavior: smooth;
        }
        .subjects-grid { display: inline-flex; gap: 12px; }
        .subject-btn {
            background: rgba(20,28,45,0.9);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }
        .subject-btn.active {
            background: #f56b2c;
            border-color: #ffaa66;
            box-shadow: 0 0 12px rgba(245,107,44,0.5);
        }
        .game-area {
            padding: 24px 20px;
            min-height: 520px;
        }
        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .level-badge {
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            color: #ffd966;
        }
        .lives { display: flex; gap: 6px; }
        .lives i { font-size: 1.8rem; }
        .fa-heart { color: #ff3366; text-shadow: 0 0 3px #ff6699; }
        .fa-heart-broken { color: #555; opacity: 0.6; }
        .question-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 28px 20px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: white;
            margin-bottom: 28px;
            line-height: 1.3;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .answer-btn {
            background: rgba(10,15,28,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 80px;
            padding: 16px 24px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.1s ease;
        }
        .answer-btn:before { content: "🔘"; opacity: 0.7; font-size: 1.3rem; }
        .answer-btn.selected { background: #6e2cf5; border-color: #b77eff; }
        .answer-btn.selected:before { content: "✅"; }
        .answer-btn.disabled-hint {
            opacity: 0.4;
            filter: blur(2px);
            pointer-events: none;
            text-decoration: line-through;
        }
        .feedback {
            text-align: center;
            padding: 14px;
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            margin-top: 20px;
            font-weight: 500;
            color: white;
            display: none;
            border-left: 4px solid #f56b2c;
        }
        .next-btn, .bonus-btn, .hint-btn {
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 80px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 14px;
        }
        .next-btn { background: linear-gradient(90deg, #6e2cf5, #a742f5); color: white; }
        .bonus-btn { background: #ff9800; color: #1a1a2e; }
        .bonus-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hint-btn { background: rgba(255,255,255,0.1); color: #ffd966; border: 1px solid #ffd966;
