<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва знаний — VK Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        body.modal-open { overflow: hidden; }
        .app-container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #2688eb;
            padding: 20px 20px 16px;
            text-align: center;
            color: white;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
        .header h1 span { background: rgba(255,255,255,0.2); font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; margin-left: 8px; }
        .score-board { display: flex; justify-content: space-between; background: rgba(0,0,0,0.15); border-radius: 24px; padding: 8px 16px; margin-top: 8px; }
        .score-item { font-weight: 600; font-size: 0.9rem; color: white; }
        .level-progress { margin: 12px 20px 0; background: rgba(255,255,255,0.3); border-radius: 12px; height: 6px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #ffd966; transition: width 0.2s; }
        .subjects-wrapper { padding: 12px 16px; background: white; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
        .subjects-grid { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .subject-btn {
            background: #f0f2f5; border: 1px solid #ccc; padding: 8px 16px; border-radius: 24px;
            font-weight: 500; font-size: 0.8rem; color: #000; cursor: pointer; white-space: nowrap;
            transition: all 0.1s; word-break: break-word; overflow-wrap: break-word;
        }
        .subject-btn.active { background: #2688eb; border-color: #2688eb; color: white; }
        .game-area { padding: 20px; min-height: 400px; background: white; }
        .quest-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .level-badge { background: #f0f2f5; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: #000; word-break: break-word; max-width: 70%; }
        .lives { font-size: 1.4rem; letter-spacing: 2px; color: #e64646; }
        .question-card { background: #f9f9f9; border-radius: 24px; padding: 24px 20px; margin-bottom: 20px; }
        .question-text { font-size: 1.4rem; font-weight: 600; text-align: center; color: #000; margin-bottom: 28px; }
        .answers { display: flex; flex-direction: column; gap: 12px; }
        .answer-btn {
            background: white; border: 1px solid #ccc; border-radius: 60px; padding: 14px 18px;
            font-weight: 500; font-size: 1rem; color: #000; text-align: left; cursor: pointer;
            transition: 0.1s;
        }
        .answer-btn.selected { background: #2688eb; border-color: #2688eb; color: white; }
        .feedback {
            text-align: center; padding: 12px; background: #e9ecef; border-radius: 20px; margin-top: 16px;
            font-weight: 500; border: 1px solid #ccc; display: none;
        }
        .next-btn, .bonus-btn {
            width: 100%; border: none; padding: 14px; border-radius: 40px; font-weight: 600; font-size: 1rem; cursor: pointer;
            margin-top: 16px;
        }
        .next-btn { background: #2688eb; color: white; }
        .bonus-btn { background: #ff9800; color: white; }
        .bonus-btn:disabled { background: #bbb; cursor: not-allowed; opacity: 0.6; }
        .hidden { display: none; }
        .result-area { text-align: center; background: white; border-radius: 24px; padding: 30px 20px; }
        .result-score { font-size: 2rem; font-weight: 800; color: #2688eb; margin-bottom: 12px; }
        .share-btn, .reset-btn { background: #f0f2f5; border: 1px solid #ccc; padding: 12px 20px; border-radius: 40px; font-weight: 600; margin: 8px; cursor: pointer; }
        .share-btn { background: #2688eb; border-color: #2688eb; color: white; }
        footer { padding: 16px; text-align: center; font-size: 0.75rem; color: #666; border-top: 1px solid #e0e0e0; display: flex; flex-direction: column; gap: 8px; background: white; }
        .footer-links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
        .footer-links a, .footer-contact { color: #2688eb; text-decoration: none; cursor: pointer; }
        .footer-contact { font-size: 0.7rem; opacity: 0.7; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { background: white; max-width: 340px; width: 90%; border-radius: 20px; padding: 20px; color: #000; text-align: left; max-height: 80vh; overflow-y: auto; }
        .modal-content h4 { margin-bottom: 12px; text-align: center; }
        .modal-buttons { display: flex; justify-content: space-around; margin-top: 16px; }
        .modal-btn { padding: 8px 20px; border-radius: 40px; font-weight: 600; border: none; cursor: pointer; }
        .modal-btn.confirm { background: #ff9800; color: white; }
        .modal-btn.cancel { background: #ccc; color: #000; }
        .close-modal { background: #2688eb; border: none; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; margin-top: 12px; width: 100%; }
        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece { position: fixed; width: 10px; height: 20px; top: -20px; z-index: 1000; pointer-events: none; animation: confetti 2s ease-out forwards; will-change: transform; background: gold; }
    </style>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="header">
        <h1>БИТВА ЗНАНИЙ <span>2026</span></h1>
        <div class="score-board">
            <div class="score-item">ОЧКИ: <strong id="scoreValue">0</strong></div>
            <div class="score-item">УРОВЕНЬ: <strong id="levelValue">1</strong></div>
            <div class="score-item">КОМБО: <strong id="comboValue">0</strong></div>
        </div>
        <div class="level-progress"><div class="progress-fill" id="levelProgressFill"></div></div>
    </div>
    <div class="subjects-wrapper"><div class="subjects-grid" id="subjectsGrid"></div></div>
    <div class="game-area" id="gameArea"></div>
    <footer>
        <div class="footer-links">
            <a id="termsLink">Пользовательское соглашение</a>
            <a id="privacyLink">Политика конфиденциальности</a>
            <a id="deleteDataLink" style="color:#e64646">Удалить данные</a>
        </div>
        <div class="footer-contact">📧 Контакты: vova_polyakov_94@mail.ru</div>
    </footer>
</div>

<script>
    // ========== ЗАЩИТА ОТ ПРОСМОТРА КОДА ==========
    (function() {
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        let devToolsDetectCount = 0;
        setInterval(() => {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100) {
                devToolsDetectCount++;
                if (devToolsDetectCount >= 2) {
                    localStorage.removeItem('quizProgressV2');
                    localStorage.removeItem('consentGiven');
                    alert('Обнаружены инструменты разработчика. Прогресс сброшен.');
                    location.reload();
                }
            } else {
                devToolsDetectCount = 0;
            }
        }, 5000);
    })();

    // ========== БАЗЫ ДАННЫХ ==========
    const countryCapital = [
        ["Россия","Москва"],["США","Вашингтон"],["Франция","Париж"],["Германия","Берлин"],["Китай","Пекин"],
        ["Япония","Токио"],["Италия","Рим"],["Великобритания","Лондон"],["Испания","Мадрид"],["Канада","Оттава"],
        ["Бразилия","Бразилиа"],["Австралия","Канберра"],["Индия","Нью-Дели"],["Египет","Каир"],["Турция","Анкара"]
    ];
    const historyQA = [
        { q: "В каком году Христофор Колумб открыл Америку?", a: "1492", type: "date" },
        { q: "Когда началась Великая Отечественная война?", a: "1941", type: "date" },
        { q: "Кто был первым императором России?", a: "Пётр I", type: "person" },
        { q: "В каком году произошла битва при Калке?", a: "1223", type: "date" },
        { q: "Когда распался СССР?", a: "1991", type: "date" },
        { q: "Кто был первым президентом США?", a: "Джордж Вашингтон", type: "person" },
        { q: "Когда началась Первая мировая война?", a: "1914", type: "date" },
        { q: "Кто основал Москву?", a: "Юрий Долгорукий", type: "person" },
        { q: "Когда в России отменили крепостное право?", a: "1861", type: "date" }
    ];
    const authorWorkExtended = [
        { author: "Лев Толстой", work: "Война и мир", gender: "male" },
        { author: "Александр Пушкин", work: "Евгений Онегин", gender: "male" },
        { author: "Фёдор Достоевский", work: "Преступление и наказание", gender: "male" },
        { author: "Михаил Булгаков", work: "Собачье сердце", gender: "male" },
        { author: "Джоан Роулинг", work: "Гарри Поттер", gender: "female" }
    ];
    const engWords = [
        ["собака","dog"],["кошка","cat"],["красный","red"],["идти (прош.)","went"],["яблоко","apple"],
        ["ловить (прош.)","caught"],["учитель","teacher"],["книга","book"],["радостный","happy"]
    ];
    const obzhFacts = [
        { q: "Номер пожарной службы?", correct: "101", wrong: ["102","103","112"] },
        { q: "Номер скорой помощи?", correct: "103", wrong: ["101","102","112"] },
        { q: "Номер полиции?", correct: "102", wrong: ["101","103","112"] },
        { q: "Что означает зелёный знак с белым человечком?", correct: "Выход", wrong: ["Туалет","Запасный выход","Путь эвакуации"] }
    ];
    const societyFacts = [
        ["Высший орган власти РФ?","Президент"],["Что такое референдум?","Всенародное голосование"],
        ["Нижняя палата парламента РФ?","Государственная дума"],["Срок президентства в РФ?","6 лет"],
        ["Что такое инфляция?","Обесценивание денег"],["Конституция РФ принята в...","1993"]
    ];
    const biologyFacts = [
        ["Фотосинтез происходит в ...","Хлоропластах"],["Самый большой орган человека?","Кожа"],
        ["Процесс деления клетки?","Митоз"],["Единица наследственности?","Ген"],
        ["Сколько камер в сердце человека?","4"],["Скелет взрослого человека костей?","206"]
    ];
    const elements = [
        ["Au","Золото"],["Ag","Серебро"],["Fe","Железо"],["Pb","Свинец"],["Hg","Ртуть"],
        ["O","Кислород"],["H","Водород"],["Na","Натрий"],["Cl","Хлор"]
    ];
    const physicsFacts = [
        ["Единица измерения силы?","Ньютон"],["Закон всемирного тяготения открыл?","Ньютон"],
        ["Скорость света в вакууме (км/с)?","300000"],["Частица с положительным зарядом?","Протон"],
        ["Что измеряет вольтметр?","Напряжение"],["Радуга объясняется...","Дисперсией"],
        ["Единица мощности?","Ватт"],["Какая сила удерживает планеты на орбите?","Гравитация"]
    ];
    const spellingWords = [
        { word: "прекрасный", wrong: ["прекрастный","прекрасныйь","прекрасны"] },
        { word: "участвовать", wrong: ["учавствовать","участвововать","учавствоать"] },
        { word: "компромисс", wrong: ["компромиc","кампромисс","компромис"] },
        { word: "блестящий", wrong: ["блистящий","блестющий","блистющий"] }
    ];

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
    function unique(arr) { return [...new Set(arr)]; }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function simpleHash(str) { let h=0; for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i),h|=0; return h; }
    function declineCountry(c) {
        const e = {"Россия":"России","США":"США","Франция":"Франции","Германия":"Германии","Китай":"Китая","Япония":"Японии","Италия":"Италии","Великобритания":"Великобритании","Испания":"Испании","Канада":"Канады","Бразилия":"Бразилии","Австралия":"Австралии","Индия":"Индии","Египет":"Египта","Турция":"Турции"};
        return e[c] || (c.endsWith('я')?c.slice(0,-1)+'и':c.endsWith('а')?c.slice(0,-1)+'ы':c+'а');
    }
    function declineElement(n) {
        const e = {"Золото":"золота","Серебро":"серебра","Железо":"железа","Свинец":"свинца","Ртуть":"ртути","Кислород":"кислорода","Водород":"водорода","Натрий":"натрия","Хлор":"хлора"};
        return e[n] || n.toLowerCase()+'а';
    }

    // ========== ГЕНЕРАТОРЫ ВОПРОСОВ ==========
    function generateMathQuestion(level) {
        let a = Math.floor(Math.random()*9)+2, b = Math.floor(Math.random()*9)+2;
        let ops=['+','-','×']; if(level>=3) ops.push('÷');
        let op=randomItem(ops), correct, text, opts;
        if(op==='+'){ correct=a+b; text=`${a} + ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0);}
        else if(op==='-'){ if(a<b)[a,b]=[b,a]; correct=a-b; text=`${a} - ${b} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>=0); if(correct===0) opts=[0,1,2,3];}
        else if(op==='×'){ correct=a*b; text=`${a} × ${b} = ?`; opts=[correct,correct+2,correct-2,correct+1].filter(v=>v>0);}
        else{ let dividend=a*b; let divisor=b; correct=a; text=`${dividend} ÷ ${divisor} = ?`; opts=[correct,correct+1,correct-1,correct+2].filter(v=>v>0);}
        if(opts.length<4) opts.push(Math.abs(correct)+3);
        opts=unique(opts).slice(0,4); while(opts.length<4) opts.push((correct+1).toString());
        return { text, options: shuffle(opts.map(String)), correctHash: simpleHash(correct.toString()), points: 10+Math.floor(level/2) };
    }
    function generateHistoryQuestion(){ let ev=randomItem(historyQA); let wrongs=historyQA.filter(e=>e.type===ev.type && e.a!==ev.a).map(e=>e.a).slice(0,3); if(wrongs.length<3) wrongs.push(ev.type==='person'?"Иван Грозный":"1500"); let opts=unique([ev.a,...wrongs]).slice(0,4); while(opts.length<4) opts.push(ev.type==='person'?"Александр Невский":"1600"); return { text: ev.q, options: shuffle([...opts]), correctHash: simpleHash(ev.a), points:10 }; }
    function generateGeoQuestion(){ let p=randomItem(countryCapital); let text=`Столица ${declineCountry(p[0])}?`; let correct=p[1]; let wrongs=countryCapital.filter(c=>c[0]!==p[0]).map(c=>c[1]).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Лондон"); return { text, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generateLiteratureQuestion(){ let item=randomItem(authorWorkExtended); let verb=item.gender==="male"?"написал":"написала"; let text=`${item.author} ${verb} произведение ...`; let correct=item.work; let wrongs=authorWorkExtended.filter(w=>w.work!==correct).map(w=>w.work).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("Война и мир"); return { text, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generateEnglishQuestion(){ let w=randomItem(engWords); let correct=w[1]; let wrongs=engWords.filter(e=>e[1]!==correct).map(e=>e[1]).slice(0,3); if(wrongs.length<3) wrongs.push("unknown"); let opts=unique([correct,...wrongs]).slice(0,4); return { text:`Перевод слова "${w[0]}":`, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generateOBZHQuestion(){ let f=randomItem(obzhFacts); let opts=unique([f.correct,...f.wrong]); while(opts.length<4) opts.push("Неизвестно"); return { text: f.q, options: shuffle([...opts]), correctHash: simpleHash(f.correct), points:10 }; }
    function generateSocietyQuestion(){ let f=randomItem(societyFacts); let wrongs=societyFacts.filter(s=>s[1]!==f[1]).map(s=>s[1]).slice(0,3); let opts=unique([f[1],...wrongs]); while(opts.length<4) opts.push("Неизвестно"); return { text: f[0], options: shuffle([...opts]), correctHash: simpleHash(f[1]), points:10 }; }
    function generateBiologyQuestion(){ let f=randomItem(biologyFacts); let wrongs=biologyFacts.filter(b=>b[1]!==f[1]).map(b=>b[1]).slice(0,3); let opts=unique([f[1],...wrongs]); while(opts.length<4) opts.push("Клетка"); return { text: f[0], options: shuffle([...opts]), correctHash: simpleHash(f[1]), points:10 }; }
    function generateChemistryQuestion(){ let e=randomItem(elements); let text=`Химический символ ${declineElement(e[1])}?`; let correct=e[0]; let wrongs=elements.filter(el=>el[0]!==correct).map(el=>el[0]).slice(0,3); let opts=unique([correct,...wrongs]); while(opts.length<4) opts.push("??"); return { text, options: shuffle([...opts]), correctHash: simpleHash(correct), points:10 }; }
    function generatePhysicsQuestion(){ let f=randomItem(physicsFacts); let wrongs=physicsFacts.filter(p=>p[1]!==f[1]).map(p=>p[1]).slice(0,3); let opts=unique([f[1],...wrongs]); while(opts.length<4) opts.push("Энергия"); return { text: f[0], options: shuffle([...opts]), correctHash: simpleHash(f[1]), points:10 }; }
    function generateRussianQuestion(){ 
        let base = randomItem(spellingWords);
        let opts = [base.word, ...base.wrong];
        opts = unique(opts);
        if (opts.length < 4) {
            let filler = base.word.slice(0,-2)+"а";
            while (opts.length < 4 && !opts.includes(filler)) {
                opts.push(filler);
                filler = filler + "?";
            }
        }
        return { text: `Выберите правильное написание слова:`, options: shuffle(opts.slice(0,4)), correctHash: simpleHash(base.word), points:10 };
    }

    // ========== УПРАВЛЕНИЕ ПРОГРЕССОМ ==========
    const allSubjects = ["math","russian","geo","history","literature","english","obzh","society","biology","chemistry","physics"];
    const subjectNames = {
        math:"Математика", russian:"Русский язык", geo:"География", history:"История",
        literature:"Литература", english:"Английский", obzh:"ОБЖ", society:"Обществознание",
        biology:"Биология", chemistry:"Химия", physics:"Физика"
    };

    let progressBySubject = {};
    let currentSubject = "math";
    let currentQuestion = null;
    let selectedAnswer = null;
    let waitingForNext = false;
    let gameActive = true;
    let adLastShown = 0;
    let isAdWatching = false;
    const MAX_LIVES = 5;
    const Q_PER_LEVEL = 3;

    function initSubjectProgress(subject) {
        if (!progressBySubject[subject]) {
            progressBySubject[subject] = {
                totalScore: 0, level: 1, lives: 3, combo: 0, qInLevel: 0, levelPerfect: true, usedQuestions: new Set()
            };
        }
    }
    function loadAllProgress() {
        const saved = localStorage.getItem('quizProgressV2');
        if (!saved) return false;
        try {
            const data = JSON.parse(saved);
            for (let s of allSubjects) {
                if (data[s]) {
                    progressBySubject[s] = {
                        totalScore: data[s].totalScore || 0,
                        level: data[s].level || 1,
                        lives: data[s].lives || 3,
                        combo: data[s].combo || 0,
                        qInLevel: data[s].qInLevel || 0,
                        levelPerfect: data[s].levelPerfect !== undefined ? data[s].levelPerfect : true,
                        usedQuestions: new Set(data[s].usedQuestions || [])
                    };
                } else { initSubjectProgress(s); }
            }
            return true;
        } catch(e) { return false; }
    }
    function saveAllProgress() {
        const toSave = {};
        for (let s of allSubjects) {
            if (progressBySubject[s]) {
                toSave[s] = {
                    totalScore: progressBySubject[s].totalScore,
                    level: progressBySubject[s].level,
                    lives: progressBySubject[s].lives,
                    combo: progressBySubject[s].combo,
                    qInLevel: progressBySubject[s].qInLevel,
                    levelPerfect: progressBySubject[s].levelPerfect,
                    usedQuestions: Array.from(progressBySubject[s].usedQuestions)
                };
            }
        }
        localStorage.setItem('quizProgressV2', JSON.stringify(toSave));
    }
    function getCurrentProgress() { return progressBySubject[currentSubject]; }
    function updateUIFromProgress() {
        const p = getCurrentProgress();
        document.getElementById("scoreValue").innerText = p.totalScore;
        document.getElementById("levelValue").innerText = p.level;
        document.getElementById("comboValue").innerText = p.combo;
        document.getElementById("levelProgressFill").style.width = (p.qInLevel / Q_PER_LEVEL) * 100 + "%";
    }
    function updateUISave() { updateUIFromProgress(); saveAllProgress(); }
    function resetSubjectProgress(subject) {
        progressBySubject[subject] = { totalScore:0, level:1, lives:3, combo:0, qInLevel:0, levelPerfect:true, usedQuestions:new Set() };
        if (subject === currentSubject) { waitingForNext=false; selectedAnswer=null; gameActive=true; isAdWatching=false; loadNewQuestion(); }
        saveAllProgress();
    }
    function getUniqueQuestion(subject, lvl) {
        const p = progressBySubject[subject];
        if (!p) return null;
        let attempts=0, q;
        const maxAttempts=200;
        do {
            if(subject==='math') q=generateMathQuestion(lvl);
            else if(subject==='russian') q=generateRussianQuestion();
            else if(subject==='geo') q=generateGeoQuestion();
            else if(subject==='history') q=generateHistoryQuestion();
            else if(subject==='literature') q=generateLiteratureQuestion();
            else if(subject==='english') q=generateEnglishQuestion();
            else if(subject==='obzh') q=generateOBZHQuestion();
            else if(subject==='society') q=generateSocietyQuestion();
            else if(subject==='biology') q=generateBiologyQuestion();
            else if(subject==='chemistry') q=generateChemistryQuestion();
            else if(subject==='physics') q=generatePhysicsQuestion();
            attempts++;
            if(attempts>maxAttempts) return null;
        } while(p.usedQuestions.has(q.text+q.correctHash));
        p.usedQuestions.add(q.text+q.correctHash);
        return q;
    }
    function loadNewQuestion() {
        if(!gameActive) return;
        const p = getCurrentProgress();
        if(p.lives<=0) { offerAdForRevival(); return; }
        let q = getUniqueQuestion(currentSubject, p.level);
        if(!q) { finishGame(true); return; }
        currentQuestion = q;
        selectedAnswer = null;
        renderUI();
    }
    function advance(isCorrect) {
        const p = getCurrentProgress();
        if(!isCorrect) p.levelPerfect = false;
        p.qInLevel++;
        updateUISave();
        if(p.qInLevel >= Q_PER_LEVEL) {
            let bonus=50;
            p.totalScore += bonus;
            if(p.levelPerfect) { showConfettiAdaptive(); showTemporaryMessage(`🎉 ИДЕАЛЬНЫЙ УРОВЕНЬ ${p.level}! +${bonus} бонусов!`); }
            p.level++; p.qInLevel=0; p.levelPerfect=true;
            updateUISave();
            setTimeout(()=>loadNewQuestion(),400);
            return;
        }
        loadNewQuestion();
    }
    function handleAnswerSubmit() {
        if(waitingForNext || !gameActive || !selectedAnswer) return;
        const isCorrect = (simpleHash(selectedAnswer) === currentQuestion.correctHash);
        const p = getCurrentProgress();
        const fbDiv = document.getElementById("feedbackMsg");
        if(isCorrect) {
            let earned = currentQuestion.points;
            p.totalScore += earned;
            p.combo++;
            let comboBonus = p.combo>=3?15:0;
            if(comboBonus>0){ p.totalScore+=comboBonus; fbDiv.innerHTML=`✅ ВЕРНО! +${earned} + комбо x${p.combo} +${comboBonus}! 🔥`;}
            else fbDiv.innerHTML=`✅ ВЕРНО! +${earned} очков. Отлично!`;
            updateUISave();
        } else {
            p.lives--; p.combo=0; updateUISave();
            let correctAnswer = currentQuestion.options.find(opt => simpleHash(opt) === currentQuestion.correctHash);
            fbDiv.innerHTML = `❌ ОШИБКА! Правильно: ${correctAnswer}. Жизней: ${p.lives}`;
            if(p.lives<=0){ waitingForNext=true; offerAdForRevival(); return; }
        }
        waitingForNext=true;
        document.querySelectorAll(".answer-btn").forEach(btn=>btn.disabled=true);
        const nextBtn = document.getElementById("nextBtn");
        if(nextBtn) {
            const newBtn = nextBtn.cloneNode(true);
            nextBtn.parentNode.replaceChild(newBtn, nextBtn);
            newBtn.classList.remove("hidden");
            newBtn.onclick = ()=>{ waitingForNext=false; advance(isCorrect); };
        }
        saveAllProgress();
    }
    function showTemporaryMessage(msg, duration=3000) {
        const fb = document.getElementById("feedbackMsg");
        if(fb){ fb.style.display="block"; fb.innerHTML=msg; setTimeout(()=>{ if(fb.innerHTML===msg){ fb.style.display="none"; fb.innerHTML=""; } }, duration); }
    }
    async function showRewardedAd(adType) {
        if(!window.vkBridge) return false;
        const now=Date.now();
        if(now-adLastShown<30000){ showTemporaryMessage("⚠️ Рекламу можно смотреть не чаще 1 раза в 30 секунд"); return false; }
        if(isAdWatching) return false;
        isAdWatching=true; adLastShown=now;
        try{
            const result=await vkBridge.send("VKWebAppShowNativeAds",{ ad_format:"reward" });
            if(result && result.result===true){
                const p=getCurrentProgress();
                if(adType==='revive') p.lives=Math.min(p.lives+1, MAX_LIVES);
                else if(adType==='bonus'){ if(p.lives<MAX_LIVES) p.lives++; else{ showTemporaryMessage("У вас уже максимум жизней"); isAdWatching=false; return false; } }
                updateUISave();
                if(currentQuestion) renderUI();
                showTemporaryMessage("❤️ +1 жизнь за просмотр рекламы!");
                saveAllProgress(); return true;
            } else{ showTemporaryMessage("Реклама не досмотрена"); return false; }
        } catch(e){ console.error(e); return false; } finally{ isAdWatching=false; }
    }
    function offerAdForRevival() {
        if(!gameActive) return;
        gameActive=false;
        showConfirmModal("У вас закончились жизни! Хотите посмотреть рекламу и получить +1 жизнь?", async ()=>{
            let success=await showRewardedAd('revive');
            if(success){ gameActive=true; waitingForNext=false; if(currentQuestion) renderUI(); else loadNewQuestion(); }
            else finishGame(false);
        },()=>finishGame(false));
    }
    function finishGame(success) {
        gameActive=false;
        const p=getCurrentProgress();
        document.getElementById("gameArea").innerHTML=`<div class="result-area"><div class="result-score">${success?"🏆 ПОБЕДА!":"💀 ПОРАЖЕНИЕ"}</div><p style="margin:12px 0">Очки: ${p.totalScore} | Уровень: ${p.level}</p>
        <button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button><button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button>
        <p style="margin-top:16px;font-size:12px;">Выберите другой предмет вверху</p></div>`;
        document.getElementById("shareBtn")?.addEventListener("click",()=>{ let txt=`Я прошёл «${subjectNames[currentSubject]}» с ${p.totalScore} очков, уровень ${p.level}!`; if(window.vkBridge) vkBridge.send("VKWebAppShare",{link:"https://vk.com",attachment:txt}); });
        document.getElementById("resetBtn")?.addEventListener("click",()=>{ resetSubjectProgress(currentSubject); loadNewQuestion(); });
    }
    function renderUI() {
        if(!currentQuestion) return;
        const p=getCurrentProgress();
        const q=currentQuestion;
        const hearts="❤️".repeat(p.lives)+"🖤".repeat(MAX_LIVES-p.lives);
        const bonusDisabled=(p.lives>=MAX_LIVES)?"disabled":"";
        const html=`<div class="quest-header"><div class="level-badge">⚡ Уровень ${p.level} · ${subjectNames[currentSubject]}</div><div class="lives">${hearts}</div></div>
        <div class="question-card"><div class="question-text">${escapeHtml(q.text)}</div><div class="answers" id="answersContainer">${q.options.map(opt=>`<button class="answer-btn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}</div>
        <div class="feedback" id="feedbackMsg" style="display:none;"></div>
        <button class="next-btn" id="nextBtn">➡️ ДАЛЕЕ</button>
        <button class="bonus-btn" id="bonusLifeBtn" ${bonusDisabled}>❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button></div>`;
        document.getElementById("gameArea").innerHTML=html;
        const btns=document.querySelectorAll(".answer-btn");
        const nextBtn=document.getElementById("nextBtn");
        const bonusBtn=document.getElementById("bonusLifeBtn");
        if(bonusBtn) bonusBtn.addEventListener("click",async()=>{ if(p.lives>=MAX_LIVES){ showTemporaryMessage("У вас максимум жизней"); return; } await showRewardedAd('bonus'); renderUI(); });
        btns.forEach(btn=>{
            btn.addEventListener("click",()=>{
                if(waitingForNext||!gameActive) return;
                selectedAnswer=btn.getAttribute("data-answer");
                btns.forEach(b=>b.classList.remove("selected"));
                btn.classList.add("selected");
            });
        });
        if(nextBtn) {
            const newNextBtn = nextBtn.cloneNode(true);
            nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
            newNextBtn.onclick = () => {
                if(selectedAnswer && !waitingForNext) handleAnswerSubmit();
                else if(!selectedAnswer) showTemporaryMessage("Выберите вариант ответа");
            };
        }
    }
    function showConfettiAdaptive() {
        let count=window.innerWidth<600?30:60;
        for(let i=0;i<count;i++){
            let c=document.createElement('div'); c.classList.add('confetti-piece');
            c.style.left=Math.random()*window.innerWidth+'px';
            c.style.backgroundColor=`hsl(${Math.random()*360},70%,60%)`;
            c.style.width=Math.random()*8+4+'px'; c.style.height=Math.random()*12+6+'px';
            c.style.animationDuration=Math.random()*1.5+1+'s';
            document.body.appendChild(c); setTimeout(()=>c.remove(),2500);
        }
    }
    function showConfirmModal(message, onConfirm, onCancel) {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><p>${message}</p><div class="modal-buttons"><button class="modal-btn confirm">Да, смотреть</button><button class="modal-btn cancel">Нет, закончить</button></div></div>`;
        document.body.appendChild(modal); document.body.classList.add('modal-open');
        const confirmBtn=modal.querySelector('.confirm'), cancelBtn=modal.querySelector('.cancel');
        const closeModal=()=>{ modal.remove(); document.body.classList.remove('modal-open'); };
        confirmBtn.onclick=()=>{ closeModal(); onConfirm(); };
        cancelBtn.onclick=()=>{ closeModal(); onCancel(); };
        modal.onclick=(e)=>{ if(e.target===modal){ closeModal(); onCancel(); } };
    }
    function buildSubjectsUI() {
        const grid=document.getElementById("subjectsGrid");
        grid.innerHTML='';
        allSubjects.forEach(s=>{
            const btn=document.createElement('button'); btn.className='subject-btn';
            if(s===currentSubject) btn.classList.add('active');
            btn.innerText=subjectNames[s];
            btn.onclick=()=>{
                if(s===currentSubject && gameActive) return;
                saveAllProgress();
                document.querySelectorAll('.subject-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentSubject=s;
                initSubjectProgress(s);
                waitingForNext=false; selectedAnswer=null; gameActive=true; isAdWatching=false;
                updateUIFromProgress();
                loadNewQuestion();
            };
            grid.appendChild(btn);
        });
    }
    function showTermsModal() {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h4>📄 Пользовательское соглашение</h4><p>Использование приложения означает принятие условий.</p><p>Контакты: vova_polyakov_94@mail.ru</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.classList.add('modal-open');
        modal.querySelector('.close-modal').onclick=()=>{ modal.remove(); document.body.classList.remove('modal-open'); };
        modal.onclick=(e)=>{ if(e.target===modal){ modal.remove(); document.body.classList.remove('modal-open'); } };
    }
    function showPrivacyModal() {
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h4>🔒 Политика конфиденциальности</h4><p>Данные хранятся локально, не передаются третьим лицам. Контакты: vova_polyakov_94@mail.ru</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.classList.add('modal-open');
        modal.querySelector('.close-modal').onclick=()=>{ modal.remove(); document.body.classList.remove('modal-open'); };
        modal.onclick=(e)=>{ if(e.target===modal){ modal.remove(); document.body.classList.remove('modal-open'); } };
    }
    function hardDeleteAllData() {
        if(confirm("Удалить весь прогресс? Это действие необратимо.")){
            localStorage.removeItem('quizProgressV2');
            localStorage.removeItem('consentGiven');
            progressBySubject={};
            for(let s of allSubjects) initSubjectProgress(s);
            currentSubject="math";
            waitingForNext=false; selectedAnswer=null; gameActive=true; isAdWatching=false;
            updateUIFromProgress();
            loadNewQuestion();
            saveAllProgress();
            showTemporaryMessage("Все данные удалены. Игра начата заново.");
        }
    }
    function showConsentModal() {
        const modalDiv=document.createElement('div'); modalDiv.className='modal';
        modalDiv.innerHTML=`<div class="modal-content" style="max-width:340px;"><h4>📋 Добро пожаловать!</h4><p>Продолжая, вы принимаете <strong><a id="termsLinkModal" style="cursor:pointer;color:#2688eb">Пользовательское соглашение</a></strong> и <strong><a id="privacyLinkModal" style="cursor:pointer;color:#2688eb">Политику конфиденциальности</a></strong>.</p><p style="font-size:12px;">📧 Контакты: vova_polyakov_94@mail.ru</p><button class="modal-btn confirm" id="acceptBtn" style="width:100%; margin-top:12px;">Принимаю и начинаю</button></div>`;
        document.body.appendChild(modalDiv); document.body.classList.add('modal-open');
        document.getElementById("termsLinkModal").onclick=(e)=>{ e.preventDefault(); showTermsModal(); };
        document.getElementById("privacyLinkModal").onclick=(e)=>{ e.preventDefault(); showPrivacyModal(); };
        document.getElementById("acceptBtn").onclick=()=>{ modalDiv.remove(); document.body.classList.remove('modal-open'); localStorage.setItem('consentGiven','true'); startGameAfterConsent(); };
    }
    function startGameAfterConsent() {
        buildSubjectsUI();
        if(!loadAllProgress()){ for(let s of allSubjects) initSubjectProgress(s); saveAllProgress(); }
        updateUIFromProgress();
        loadNewQuestion();
    }
    function init() {
        document.getElementById("termsLink").onclick=showTermsModal;
        document.getElementById("privacyLink").onclick=showPrivacyModal;
        document.getElementById("deleteDataLink").onclick=hardDeleteAllData;
        if(window.vkBridge){
            vkBridge.send("VKWebAppInit").then(()=>{
                if(!localStorage.getItem('consentGiven')) showConsentModal();
                else startGameAfterConsent();
            }).catch(()=>{ if(!localStorage.getItem('consentGiven')) showConsentModal(); else startGameAfterConsent(); });
        } else { if(!localStorage.getItem('consentGiven')) showConsentModal(); else startGameAfterConsent(); }
    }
    init();
</script>
