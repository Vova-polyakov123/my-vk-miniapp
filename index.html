<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Битва знаний — с помощником</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .app {
            max-width: 650px;
            width: 100%;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header {
            background: linear-gradient(135deg, #6e2cf5, #a742f5, #f56b2c);
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
            padding: 24px 20px;
            text-align: center;
            color: white;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header h1 span {
            font-size: 1rem;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 10px 20px;
            margin-top: 16px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .level-progress {
            margin: 16px 20px 0;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 8px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd966, #ffb347);
            border-radius: 20px;
            transition: width 0.3s;
        }
        .subjects-wrapper {
            padding: 16px 12px;
            background: rgba(0,0,0,0.2);
            overflow-x: auto;
            white-space: nowrap;
        }
        .subjects-grid {
            display: inline-flex;
            gap: 12px;
        }
        .subject-btn {
            background: linear-gradient(135deg, #2a3a60, #1a2a4a);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .subject-btn i {
            font-size: 1rem;
        }
        .subject-btn.active {
            background: linear-gradient(135deg, #f56b2c, #ff9040);
            box-shadow: 0 4px 12px rgba(245,107,44,0.4);
        }
        .game-area {
            padding: 24px 20px;
            min-height: 480px;
        }
        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .level-badge {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            color: #ffd966;
        }
        .lives {
            display: flex;
            gap: 8px;
        }
        .heart {
            font-size: 28px;
        }
        .heart-full {
            color: #ff3366;
            filter: drop-shadow(0 0 4px #ff6699);
        }
        .heart-lost {
            color: #888;
            opacity: 0.4;
            filter: grayscale(0.6);
        }
        .question-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            color: white;
            margin-bottom: 28px;
            word-break: break-word;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .answer-btn {
            background: linear-gradient(95deg, #2a3a60, #1a2a4a);
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f0f0;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .answer-btn:before {
            content: "🔘";
            margin-right: 12px;
            font-size: 1.2rem;
        }
        .answer-btn.selected {
            background: linear-gradient(95deg, #6e2cf5, #9b4dff);
            box-shadow: 0 4px 12px rgba(110,44,245,0.4);
        }
        .answer-btn.selected:before {
            content: "✅";
        }
        .answer-btn.disabled-hint {
            opacity: 0.35;
            filter: blur(1px);
            pointer-events: none;
        }
        .feedback {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            margin-top: 20px;
            font-weight: bold;
            color: #ffecb3;
            display: none;
            border-left: 4px solid #f56b2c;
            font-size: 0.9rem;
        }
        .next-btn, .bonus-btn, .hint-btn {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .next-btn {
            background: linear-gradient(90deg, #6e2cf5, #a742f5);
            color: white;
        }
        .bonus-btn {
            background: linear-gradient(90deg, #ff9800, #ffbc3c);
            color: #1a1a2e;
        }
        .bonus-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .hint-btn {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            color: #ffd966;
            border: 1px solid #ffd966;
        }
        .hidden {
            display: none;
        }
        .leaderboard-btn {
            background: linear-gradient(135deg, #f5b042, #ff8c2c);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        /* Помощник */
        .assistant {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .assistant.centered {
            bottom: 50%;
            right: 50%;
            transform: translate(50%, 50%);
            pointer-events: auto;
        }
        .assistant-bubble {
            background: white;
            border-radius: 28px;
            padding: 10px 16px;
            max-width: 250px;
            margin-bottom: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid #ffd966;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #1e293b;
            font-weight: 500;
            pointer-events: none;
            transition: all 0.2s;
        }
        .assistant-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #f5b042, #ff8c2c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            border: 2px solid #ffd966;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.2s;
            font-size: 32px;
            color: white;
        }
        .assistant-avatar:hover {
            transform: scale(1.05);
        }
        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            z-index: 1500;
        }
        .tutorial-highlight {
            position: relative;
            z-index: 1600;
            box-shadow: 0 0 0 4px #ffd966, 0 0 0 8px rgba(255,217,102,0.3);
            border-radius: 60px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            padding: 24px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .leaderboard-list {
            list-style: none;
            margin: 20px 0;
        }
        .leaderboard-list li {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .leaderboard-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a3a5a;
        }
        .close-modal {
            background: #6e2cf5;
            border: none;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        footer {
            padding: 16px;
            text-align: center;
            font-size: 0.7rem;
            color: #ccc;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        .footer-links a {
            color: #ffaa66;
            text-decoration: none;
            cursor: pointer;
        }
        .result-area {
            text-align: center;
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            padding: 30px 20px;
        }
        .result-score {
            font-size: 2rem;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 16px;
        }
        .share-btn, .reset-btn {
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            margin: 6px;
            cursor: pointer;
        }
        .share-btn { background: linear-gradient(95deg, #2688eb, #40a0ff); color: white; }
        .reset-btn { background: linear-gradient(95deg, #f56b2c, #ff9040); color: white; }
        @media (max-width: 500px) {
            .question-text { font-size: 1.1rem; }
            .answer-btn { padding: 12px 16px; font-size: 0.8rem; }
            .subject-btn { padding: 8px 14px; font-size: 0.75rem; }
            .assistant-avatar { width: 50px; height: 50px; font-size: 26px; }
        }
    </style>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
            <h1>⚡БИТВА ЗНАНИЙ <span>2026</span></h1>
            <button class="leaderboard-btn" id="leaderboardBtn"><i class="fas fa-trophy"></i> Топ-10</button>
        </div>
        <div class="score-board">
            <div class="score-item"><i class="fas fa-coins"></i> <span id="scoreValue">0</span></div>
            <div class="score-item"><i class="fas fa-chart-line"></i> УР. <span id="levelValue">1</span></div>
            <div class="score-item"><i class="fas fa-fire"></i> КОМБО <span id="comboValue">0</span></div>
        </div>
        <div class="level-progress"><div class="progress-fill" id="levelProgressFill"></div></div>
    </div>
    <div class="subjects-wrapper"><div class="subjects-grid" id="subjectsGrid"></div></div>
    <div class="game-area" id="gameArea"></div>
    <footer>
        <div class="footer-links">
            <a id="termsLink">📜 Соглашение</a>
            <a id="privacyLink">🔒 Политика</a>
            <a id="deleteDataLink" style="color:#ff6b6b">🗑 Удалить данные</a>
        </div>
        <div>📧 vova_polyakov_94@mail.ru</div>
    </footer>
</div>

<!-- Помощник (мальчик) -->
<div class="assistant" id="assistant">
    <div class="assistant-bubble" id="assistantBubble">✨ Привет! Я твой помощник</div>
    <div class="assistant-avatar" id="assistantAvatar">
        <i class="fas fa-user-graduate"></i>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // 1. ОКРУЖЕНИЕ
    // ------------------------------------------------------------
    let isVK = false, vkBridge = null;
    if (typeof window.vkBridge !== 'undefined') { vkBridge = window.vkBridge; isVK = true; }
    let currentUser = { id: 'guest', name: 'Игрок', photo: '' };
    let appShareUrl = 'https://vk.com/app';
    async function initVK() {
        if (!isVK || !vkBridge) return;
        try {
            await vkBridge.send('VKWebAppInit');
            const user = await vkBridge.send('VKWebAppGetUserInfo');
            if (user && user.id) currentUser = { id: user.id.toString(), name: user.first_name || 'Игрок', photo: user.photo_100 || '' };
            const lp = await vkBridge.send('VKWebAppGetLaunchParams').catch(() => null);
            if (lp && lp.vk_app_id) appShareUrl = `https://vk.com/app${lp.vk_app_id}`;
            else { const saved = localStorage.getItem('vk_app_share_url'); if (saved) appShareUrl = saved; }
        } catch(e) { console.warn(e); isVK = false; }
    }

    // ------------------------------------------------------------
    // 2. ПОМОЩНИК + ОБУЧЕНИЕ
    // ------------------------------------------------------------
    let assistantTimeout = null;
    function assistantSay(msg, duration = 4000) {
        const bubble = document.getElementById('assistantBubble');
        if (!bubble) return;
        bubble.innerText = msg;
        bubble.style.opacity = '1';
        if (assistantTimeout) clearTimeout(assistantTimeout);
        assistantTimeout = setTimeout(() => {
            bubble.style.opacity = '0';
            setTimeout(() => { if (bubble.innerText === msg) bubble.innerText = '✨ Нажми на меня'; }, 300);
        }, duration);
    }
    function moveToCorner() {
        const a = document.getElementById('assistant');
        a.classList.remove('centered');
        a.style.bottom = '20px'; a.style.right = '20px'; a.style.transform = '';
    }
    function moveToCenter() {
        const a = document.getElementById('assistant');
        a.classList.add('centered');
        a.style.bottom = '50%'; a.style.right = '50%'; a.style.transform = 'translate(50%, 50%)';
    }
    let tutorialSubjects = ['math', 'russian', 'geo'];
    let tutorialIndex = 0;
    let overlay = null;
    function startTutorial() {
        if (localStorage.getItem('tutor_v2') === 'true') {
            moveToCorner();
            assistantSay(`✨ С возвращением, ${currentUser.name !== 'Гость' ? currentUser.name : 'друг'}!`);
            return;
        }
        overlay = document.createElement('div'); overlay.className = 'tutorial-overlay';
        document.body.appendChild(overlay);
        moveToCenter();
        assistantSay('👋 Привет! Я Макс, твой репетитор. Давай научу выбирать предметы.', 5000);
        setTimeout(() => nextTutorStep(), 5000);
    }
    function nextTutorStep() {
        if (tutorialIndex >= tutorialSubjects.length) {
            if (overlay) overlay.remove();
            moveToCorner();
            assistantSay('🎉 Отлично! Теперь ты готов. Я буду в уголке, помогать советом!', 5000);
            localStorage.setItem('tutor_v2', 'true');
            return;
        }
        const subj = tutorialSubjects[tutorialIndex];
        const subjName = subjectNames[subj];
        const btn = document.querySelector(`.subject-btn[data-subj="${subj}"]`);
        if (btn) {
            btn.classList.add('tutorial-highlight');
            setTimeout(() => btn.classList.remove('tutorial-highlight'), 2000);
        }
        assistantSay(`👉 Нажми на предмет «${subjName}», чтобы выбрать его.`, 4000);
        const handler = (e) => {
            if (e.currentTarget.dataset.subj === subj) {
                btn.removeEventListener('click', handler);
                tutorialIndex++;
                nextTutorStep();
            }
        };
        btn.addEventListener('click', handler);
    }

    // ------------------------------------------------------------
    // 3. БАЗА ВОПРОСОВ
    // ------------------------------------------------------------
    const questionDB = {
        math: [
            { text: "5 + 7 = ?", options: ["10","11","12","13"], correct: "12" },
            { text: "12 - 4 = ?", options: ["6","7","8","9"], correct: "8" },
            { text: "3 × 6 = ?", options: ["15","16","17","18"], correct: "18" },
            { text: "20 ÷ 4 = ?", options: ["4","5","6","7"], correct: "5" },
            { text: "Корень из 64", options: ["6","7","8","9"], correct: "8" },
            { text: "Сколько градусов в прямом угле?", options: ["45°","60°","90°","120°"], correct: "90°" }
        ],
        russian: [
            { text: "Как правильно пишется?", options: ["прекрасный","прекрастный","прикрасный","прекрасны"], correct: "прекрасный" },
            { text: "Укажите слово без ошибки", options: ["компромисс","компромиc","компромис","кампромисс"], correct: "компромисс" },
            { text: "В каком слове ударение падает на второй слог?", options: ["звонит","каталог","красивее","торты"], correct: "каталог" },
            { text: "Найди фразеологизм", options: ["бить баклуши","идти в школу","петь песню","любить маму"], correct: "бить баклуши" }
        ],
        geo: [
            { text: "Столица Франции?", options: ["Берлин","Лондон","Париж","Мадрид"], correct: "Париж" },
            { text: "Самая длинная река в мире?", options: ["Нил","Амазонка","Волга","Янцзы"], correct: "Нил" },
            { text: "Самая высокая гора?", options: ["Эверест","Килиманджаро","Эльбрус","Монблан"], correct: "Эверест" },
            { text: "Сколько материков на Земле?", options: ["5","6","7","4"], correct: "6" }
        ],
        history: [
            { text: "Кто был первым императором России?", options: ["Иван Грозный","Пётр I","Николай II","Александр I"], correct: "Пётр I" },
            { text: "В каком году началась ВОВ?", options: ["1939","1940","1941","1942"], correct: "1941" },
            { text: "Кто открыл Америку?", options: ["Магеллан","Колумб","Васко да Гама","Кук"], correct: "Колумб" },
            { text: "Кто был первым космонавтом?", options: ["Титов","Гагарин","Леонов","Армстронг"], correct: "Гагарин" }
        ],
        literature: [
            { text: "Кто написал 'Война и мир'?", options: ["Достоевский","Толстой","Чехов","Пушкин"], correct: "Толстой" },
            { text: "Автор 'Мастер и Маргарита'", options: ["Булгаков","Набоков","Солженицын","Пастернак"], correct: "Булгаков" },
            { text: "Кто написал 'Преступление и наказание'?", options: ["Тургенев","Достоевский","Гончаров","Лесков"], correct: "Достоевский" }
        ],
        english: [
            { text: "Как будет 'собака'?", options: ["dog","cat","bird","fish"], correct: "dog" },
            { text: "Перевод 'красный'", options: ["green","blue","red","yellow"], correct: "red" },
            { text: "Английское 'apple' – это...", options: ["груша","апельсин","яблоко","слива"], correct: "яблоко" }
        ],
        obzh: [
            { text: "Номер пожарной службы?", options: ["101","102","103","112"], correct: "101" },
            { text: "Как тушить горящий бензин?", options: ["Водой","Песком","Огнетушителем","Накрыть тканью"], correct: "Огнетушителем" },
            { text: "Что делать при землетрясении?", options: ["Выбежать на улицу","Встать в дверной проем","Спрятаться под кровать","Включить газ"], correct: "Встать в дверной проем" }
        ],
        society: [
            { text: "Высший орган власти в РФ?", options: ["Правительство","Президент","Госдума","Совет Федерации"], correct: "Президент" },
            { text: "Нижняя палата парламента РФ?", options: ["Совет Федерации","Госдума","Правительство","Конституционный суд"], correct: "Госдума" },
            { text: "Срок президентства в РФ?", options: ["4 года","5 лет","6 лет","7 лет"], correct: "6 лет" }
        ],
        biology: [
            { text: "Самый большой орган человека?", options: ["Печень","Кожа","Сердце","Легкие"], correct: "Кожа" },
            { text: "Сколько костей у взрослого человека?", options: ["200","206","210","215"], correct: "206" },
            { text: "Фотосинтез происходит в ...", options: ["Ядре","Хлоропластах","Вакуолях","Цитоплазме"], correct: "Хлоропластах" }
        ],
        chemistry: [
            { text: "Химический символ кислорода", options: ["O","O2","K","C"], correct: "O" },
            { text: "Формула воды", options: ["H2O","CO2","O2","H2"], correct: "H2O" },
            { text: "Химический символ золота", options: ["Go","Au","Ag","Fe"], correct: "Au" }
        ],
        physics: [
            { text: "Единица измерения силы?", options: ["Ватт","Ньютон","Джоуль","Паскаль"], correct: "Ньютон" },
            { text: "Скорость света в вакууме (км/с)?", options: ["300 000","150 000","400 000","250 000"], correct: "300 000" },
            { text: "Что измеряет вольтметр?", options: ["Силу тока","Напряжение","Сопротивление","Мощность"], correct: "Напряжение" }
        ]
    };
    const subjects = Object.keys(questionDB);
    const subjectNames = {
        math:"Математика", russian:"Русский язык", geo:"География", history:"История",
        literature:"Литература", english:"Английский", obzh:"ОБЖ", society:"Обществознание",
        biology:"Биология", chemistry:"Химия", physics:"Физика"
    };
    const subjectIcons = {
        math:"fa-calculator", russian:"fa-book", geo:"fa-globe", history:"fa-landmark",
        literature:"fa-feather-alt", english:"fa-language", obzh:"fa-shield-alt", society:"fa-gavel",
        biology:"fa-dna", chemistry:"fa-flask", physics:"fa-atom"
    };

    // ------------------------------------------------------------
    // 4. СОСТОЯНИЕ ИГРЫ
    // ------------------------------------------------------------
    let currentSubject = 'math';
    let currentQuestions = [];
    let currentIndex = 0, score = 0, level = 1, combo = 0, lives = 3;
    let selectedAnswer = null, waitingNext = false, hintUsed = false;
    let leaderboard = {}; subjects.forEach(s => leaderboard[s] = []);
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function loadQuestions(subject) { return shuffle([...questionDB[subject]]); }
    function updateUI() {
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('levelValue').innerText = level;
        document.getElementById('comboValue').innerText = combo;
        let percent = currentQuestions.length ? (currentIndex/currentQuestions.length)*100 : 0;
        document.getElementById('levelProgressFill').style.width = percent+'%';
    }
    function showFeedback(msg, isErr=false) {
        let fb = document.getElementById('feedbackMsg');
        if(fb) { fb.style.display='block'; fb.innerHTML=msg; fb.style.color=isErr?'#ffaaaa':'#aaffaa';
            setTimeout(()=>{ if(fb) fb.style.display='none'; },2000); }
    }
    function showAdOffer(cb) {
        let modal = document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h3>❤️ Жизни кончились!</h3><p>Посмотреть рекламу и получить +1 жизнь?</p><div style="display:flex; gap:16px; margin-top:20px;"><button id="adYes" style="background:#f56b2c; flex:1; padding:12px; border-radius:60px; color:white; font-weight:bold;">Да, смотреть</button><button id="adNo" style="background:#555; flex:1; padding:12px; border-radius:60px; color:white; font-weight:bold;">Нет, закончить</button></div></div>`;
        document.body.appendChild(modal); document.body.style.overflow='hidden';
        let close=()=>{ modal.remove(); document.body.style.overflow=''; };
        modal.querySelector('#adYes').onclick=()=>{ close(); cb(true); };
        modal.querySelector('#adNo').onclick=()=>{ close(); cb(false); };
        modal.onclick=(e)=> { if(e.target===modal) { close(); cb(false); } };
    }
    function saveProgress() {
        let toSave = { currentSubject, currentIndex, score, level, combo, lives, leaderboard };
        localStorage.setItem('quiz_saved', JSON.stringify(toSave));
        if(isVK && vkBridge) vkBridge.send('VKWebAppStorageSet', { key:'quiz_saved', value:JSON.stringify(toSave) }).catch(e=>{});
    }
    function loadProgress() {
        let saved = localStorage.getItem('quiz_saved');
        if(saved) {
            try { let d=JSON.parse(saved); currentSubject=d.currentSubject||'math'; currentIndex=d.currentIndex||0; score=d.score||0; level=d.level||1; combo=d.combo||0; lives=d.lives||3; if(d.leaderboard) leaderboard=d.leaderboard; } catch(e){}
        }
        currentQuestions = loadQuestions(currentSubject);
    }
    function updateLeaderboard() {
        if(!leaderboard[currentSubject]) leaderboard[currentSubject]=[];
        let idx = leaderboard[currentSubject].findIndex(e=>e.id===currentUser.id);
        let entry = { id:currentUser.id, name:currentUser.name, photo:currentUser.photo, score, level, ts:Date.now() };
        if(idx!==-1) { if(score>leaderboard[currentSubject][idx].score) leaderboard[currentSubject][idx]=entry; }
        else leaderboard[currentSubject].push(entry);
        leaderboard[currentSubject].sort((a,b)=>b.score-a.score);
        leaderboard[currentSubject]=leaderboard[currentSubject].slice(0,10);
        saveProgress();
    }
    function renderGame() {
        if(lives<=0) {
            document.getElementById('gameArea').innerHTML = `<div class="result-area"><div class="result-score">💀 ПОРАЖЕНИЕ</div><p>Очки: ${score} | Уровень: ${level}</p><button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button><button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button><button class="reset-btn" id="selectSubjectBtn" style="background:#6e2cf5;">📚 ВЫБРАТЬ ДРУГОЙ ПРЕДМЕТ</button></div>`;
            document.getElementById('shareBtn')?.addEventListener('click', shareGame);
            document.getElementById('resetBtn')?.addEventListener('click', ()=>{ resetGame(); });
            document.getElementById('selectSubjectBtn')?.addEventListener('click', ()=>{ document.querySelector('.subjects-wrapper').scrollIntoView({behavior:'smooth'}); });
            return;
        }
        if(!currentQuestions.length) { currentQuestions = loadQuestions(currentSubject); currentIndex=0; }
        if(currentIndex >= currentQuestions.length) { levelUp(); return; }
        let q = currentQuestions[currentIndex];
        let hearts = ''; for(let i=0;i<3;i++) hearts += `<span class="heart ${i<lives?'heart-full':'heart-lost'}">❤️</span>`;
        let answersHtml = '';
        q.options.forEach(opt => { answersHtml += `<button class="answer-btn ${selectedAnswer===opt?'selected':''}" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`; });
        let html = `<div class="quest-header"><div class="level-badge">⚡ Уровень ${level} · ${subjectNames[currentSubject]}</div><div class="lives">${hearts}</div></div>
            <div class="question-card"><div class="question-text">${escapeHtml(q.text)}</div><div class="answers" id="answersContainer">${answersHtml}</div>
            <div class="feedback" id="feedbackMsg" style="display:none;"></div>
            <button class="next-btn hidden" id="nextBtn">➡️ ДАЛЕЕ</button>
            <button class="bonus-btn" id="bonusLifeBtn">❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button>
            <button class="hint-btn" id="hintBtn"><i class="fas fa-robot"></i> Подсказка</button></div>`;
        document.getElementById('gameArea').innerHTML = html;
        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if(waitingNext) return;
                selectedAnswer = btn.getAttribute('data-answer');
                document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('selected'));
                btn.classList.add('selected');
                document.getElementById('nextBtn')?.classList.remove('hidden');
            });
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if(waitingNext) return;
            if(!selectedAnswer) { showFeedback('⚠️ Выберите ответ!', true); assistantSay('👆 Сначала выбери ответ!', 2000); return; }
            checkAnswer();
        });
        document.getElementById('bonusLifeBtn')?.addEventListener('click', () => {
            if(lives>=3) { showFeedback('Максимум жизней'); assistantSay('❤️ У тебя уже полные жизни!', 2000); return; }
            showAdOffer((ok)=>{ if(ok) { lives=Math.min(3,lives+1); updateUI(); renderGame(); showFeedback('❤️ +1 жизнь!'); assistantSay('❤️ +1 жизнь! Продолжай!',2000); saveProgress(); } });
        });
        document.getElementById('hintBtn')?.addEventListener('click', () => {
            if(hintUsed) { showFeedback('Подсказка уже использована', true); return; }
            let correct = q.correct;
            let wrongs = Array.from(document.querySelectorAll('.answer-btn')).filter(b=>b.getAttribute('data-answer')!==correct);
            if(wrongs.length>=2) {
                wrongs.slice(0,2).forEach(b=>{ b.classList.add('disabled-hint'); b.disabled=true; });
                hintUsed=true; showFeedback('🔍 Два неверных ответа убраны!'); assistantSay('🔍 Подсказка активирована!',2500);
                document.getElementById('hintBtn').disabled=true;
            } else { showFeedback('Недостаточно вариантов для подсказки', true); }
        });
    }
    function checkAnswer() {
        let q = currentQuestions[currentIndex];
        let isCorrect = (selectedAnswer === q.correct);
        waitingNext = true;
        if(isCorrect) {
            let add = 10 + (combo>=2?5:0);
            score += add; combo++;
            showFeedback(`✅ Верно! +${add} очков (комбо x${combo})`);
            assistantSay(`🎉 Отлично! +${add} очков!`, 2500);
            updateUI();
            setTimeout(()=>{ currentIndex++; selectedAnswer=null; waitingNext=false; hintUsed=false; saveProgress(); renderGame(); },700);
        } else {
            lives--; combo=0; updateUI();
            showFeedback(`❌ Ошибка! Правильно: ${q.correct}. Жизней: ${lives}`, true);
            assistantSay(`❌ Неправильно. Правильный ответ: ${q.correct}. Осталось жизней: ${lives}`, 3000);
            if(lives<=0) setTimeout(()=>renderGame(),1500);
            else setTimeout(()=>{ waitingNext=false; selectedAnswer=null; hintUsed=false; saveProgress(); renderGame(); },1200);
        }
    }
    function levelUp() {
        level++; score+=50; combo=0; updateUI();
        showFeedback(`🎉 УРОВЕНЬ ${level}! +50 бонусов!`);
        assistantSay(`🎉 Поздравляю! Уровень ${level}!`, 3500);
        currentQuestions = loadQuestions(currentSubject);
        currentIndex = 0; waitingNext=false; selectedAnswer=null; hintUsed=false;
        saveProgress(); setTimeout(()=>renderGame(),500);
    }
    function resetGame() { score=0; level=1; combo=0; lives=3; currentIndex=0; selectedAnswer=null; waitingNext=false; hintUsed=false; currentQuestions=loadQuestions(currentSubject); saveProgress(); renderGame(); assistantSay('🔄 Прогресс сброшен. Начнём заново!',2500); }
    function switchSubject(subj) {
        if(subj===currentSubject) return;
        currentSubject=subj; score=0; level=1; combo=0; lives=3; currentIndex=0; selectedAnswer=null; waitingNext=false; hintUsed=false;
        currentQuestions = loadQuestions(currentSubject);
        saveProgress(); updateUI(); renderGame();
        document.querySelectorAll('.subject-btn').forEach(btn=>{ if(btn.dataset.subj===subj) btn.classList.add('active'); else btn.classList.remove('active'); });
        assistantSay(`📚 Теперь предмет: ${subjectNames[subj]}. Удачи!`, 2500);
    }
    function shareGame() {
        let text = `🔥 Я набрал ${score} очков в «${subjectNames[currentSubject]}» на уровне ${level} в Битве знаний! Сможешь побить рекорд?`;
        if(isVK && vkBridge) vkBridge.send('VKWebAppShare',{ link:appShareUrl, attachment:text }).catch(()=>alert('Ссылка: '+appShareUrl));
        else alert(text+'\n\nСсылка: '+appShareUrl);
    }
    function showLeaderboard() {
        let modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><h3><i class="fas fa-trophy"></i> Топ-10</h3><div id="lbContent"></div><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.style.overflow='hidden';
        let lb = leaderboard[currentSubject]||[];
        let content = modal.querySelector('#lbContent');
        if(lb.length===0) content.innerHTML='<p style="text-align:center;">Пока нет рекордов. Стань первым!</p>';
        else {
            let ul=document.createElement('ul'); ul.className='leaderboard-list';
            ul.innerHTML=lb.map((u,i)=>`<li>${u.photo?`<img class="leaderboard-avatar" src="${u.photo}">`:'<div class="leaderboard-avatar" style="background:#6e2cf5; display:flex; align-items:center; justify-content:center;"><i class="fas fa-user"></i></div>'}<div><strong>${i+1}. ${escapeHtml(u.name)}</strong><br>🎯 ${u.score} очков | Уровень ${u.level}</div></li>`).join('');
            content.appendChild(ul);
        }
        modal.querySelector('.close-modal').onclick=()=>{ modal.remove(); document.body.style.overflow=''; };
        modal.onclick=(e)=>{ if(e.target===modal){ modal.remove(); document.body.style.overflow=''; } };
    }
    function buildSubjects() {
        let grid = document.getElementById('subjectsGrid'); grid.innerHTML='';
        subjects.forEach(s=>{
            let btn=document.createElement('button'); btn.className='subject-btn'+(s===currentSubject?' active':'');
            btn.innerHTML=`<i class="fas ${subjectIcons[s]}"></i> ${subjectNames[s]}`;
            btn.dataset.subj=s; btn.addEventListener('click',()=>switchSubject(s));
            grid.appendChild(btn);
        });
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function showModal(title,text) {
        let m=document.createElement('div'); m.className='modal';
        m.innerHTML=`<div class="modal-content"><h3>${title}</h3><p>${text}</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(m); document.body.style.overflow='hidden';
        m.querySelector('.close-modal').onclick=()=>{ m.remove(); document.body.style.overflow=''; };
        m.onclick=(e)=>{ if(e.target===m){ m.remove(); document.body.style.overflow=''; } };
    }
    // ------------------------------------------------------------
    // ЗАПУСК
    // ------------------------------------------------------------
    window.addEventListener('load', async () => {
        if(isVK && vkBridge) { await initVK(); await loadProgress(); }
        else loadProgress();
        if(!currentQuestions.length) currentQuestions = loadQuestions(currentSubject);
        buildSubjects(); renderGame(); updateUI();
        document.getElementById('assistantAvatar')?.addEventListener('click',()=>{
            let tips=['💡 Используй подсказку!','🏆 Комбо даёт бонус!','❤️ Реклама даёт жизнь','👑 Топ-10 ждёт тебя'];
            assistantSay(tips[Math.floor(Math.random()*tips.length)],3000);
        });
        startTutorial();
        document.getElementById('leaderboardBtn').onclick=showLeaderboard;
        document.getElementById('termsLink').onclick=()=>showModal('Пользовательское соглашение','Используя приложение, вы соглашаетесь с условиями VK. Данные ID, имя, фото для рейтинга. Контакты: vova_polyakov_94@mail.ru.<br><a href="https://vk.com/terms" target="_blank">vk.com/terms</a>');
        document.getElementById('privacyLink').onclick=()=>showModal('Политика конфиденциальности','Мы храним только VK ID, имя, фото для статистики. Вы можете удалить прогресс кнопкой ниже.');
        document.getElementById('deleteDataLink').onclick=()=>{ if(confirm('Удалить весь прогресс?')){ localStorage.clear(); if(isVK && vkBridge) vkBridge.send('VKWebAppStorageSet',{key:'quiz_saved',value:''}); location.reload(); } };
    });
</script>
</body>
</html>
