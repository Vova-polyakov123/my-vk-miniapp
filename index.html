<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва знаний — ТОП VK Mini App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            max-width: 650px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .header {
            background: linear-gradient(135deg, #6e2cf5, #a742f5, #f56b2c);
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
            padding: 24px 20px 20px;
            text-align: center;
            color: white;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 10px 20px;
            margin-top: 16px;
            font-weight: 700;
        }
        .level-progress {
            margin: 16px 20px 0;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 8px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ffd966;
            border-radius: 20px;
            transition: width 0.3s;
        }
        .subjects-wrapper {
            padding: 16px 12px;
            background: rgba(0,0,0,0.3);
            overflow-x: auto;
            white-space: nowrap;
        }
        .subjects-grid {
            display: inline-flex;
            gap: 12px;
        }
        .subject-btn {
            background: rgba(20,28,45,0.9);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }
        .subject-btn.active {
            background: #f56b2c;
            border-color: #ffaa66;
            box-shadow: 0 0 12px rgba(245,107,44,0.5);
        }
        .game-area {
            padding: 24px 20px;
            min-height: 520px;
        }
        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .level-badge {
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            color: #ffd966;
        }
        .lives {
            font-size: 1.8rem;
            letter-spacing: 3px;
        }
        .question-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 28px 20px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: white;
            margin-bottom: 28px;
            line-height: 1.3;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .answer-btn {
            background: rgba(10,15,28,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 80px;
            padding: 16px 24px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .answer-btn:before { content: "🔘"; opacity: 0.7; font-size: 1.3rem; }
        .answer-btn.selected { background: #6e2cf5; border-color: #b77eff; }
        .answer-btn.selected:before { content: "✅"; }
        .feedback {
            text-align: center;
            padding: 14px;
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            margin-top: 20px;
            font-weight: 500;
            color: white;
            display: none;
            border-left: 4px solid #f56b2c;
        }
        .next-btn, .bonus-btn, .hint-btn {
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 80px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 14px;
        }
        .next-btn { background: linear-gradient(90deg, #6e2cf5, #a742f5); color: white; }
        .bonus-btn { background: #ff9800; color: #1a1a2e; }
        .bonus-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hint-btn { background: rgba(255,255,255,0.1); color: #ffd966; border: 1px solid #ffd966; }
        .hidden { display: none; }
        .leaderboard-btn {
            background: rgba(245,107,44,0.9);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: #12192c;
            border-radius: 40px;
            max-width: 450px;
            width: 90%;
            padding: 28px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        .leaderboard-list { list-style: none; margin: 16px 0; }
        .leaderboard-list li { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; }
        .close-modal {
            background: #6e2cf5;
            border: none;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        footer {
            padding: 16px;
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .footer-links a, .footer-contact {
            color: #ffaa66;
            text-decoration: none;
            cursor: pointer;
        }
        .audio-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
        }
        .audio-controls button {
            background: none;
            border: none;
            color: #ffaa66;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .volume-slider {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] { width: 100px; cursor: pointer; }
        @keyframes confettiFall {
            0% { transform: translateY(-20vh) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: fixed;
            width: 12px;
            height: 24px;
            top: -20px;
            z-index: 1500;
            pointer-events: none;
            animation: confettiFall 2s ease-out forwards;
        }
        .result-area {
            text-align: center;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 32px 20px;
        }
        .share-btn, .reset-btn {
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            margin: 8px;
            cursor: pointer;
        }
        .share-btn { background: #2688eb; color: white; }
        .reset-btn { background: #f56b2c; color: white; }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>⚡БИТВА ЗНАНИЙ <span>2026</span></h1>
            <button class="leaderboard-btn" id="leaderboardBtn"><i class="fas fa-trophy"></i> Топ-10</button>
        </div>
        <div class="score-board">
            <div class="score-item"><i class="fas fa-coins"></i> <strong id="scoreValue">0</strong></div>
            <div class="score-item"><i class="fas fa-chart-line"></i> УР. <strong id="levelValue">1</strong></div>
            <div class="score-item"><i class="fas fa-fire"></i> КОМБО <strong id="comboValue">0</strong></div>
        </div>
        <div class="level-progress"><div class="progress-fill" id="levelProgressFill"></div></div>
    </div>
    <div class="subjects-wrapper"><div class="subjects-grid" id="subjectsGrid"></div></div>
    <div class="game-area" id="gameArea"></div>
    <footer>
        <div class="footer-links">
            <a id="termsLink">📜 Соглашение</a>
            <a id="privacyLink">🔒 Политика</a>
            <a id="deleteDataLink" style="color:#ff6b6b">🗑 Удалить данные</a>
        </div>
        <div class="audio-controls">
            <button id="musicToggleBtn"><i class="fas fa-music"></i></button>
            <div class="volume-slider">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="globalVolume" min="0" max="100" value="25">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>
        <div class="footer-contact">📧 vova_polyakov_94@mail.ru</div>
    </footer>
</div>

<script>
    // ======================= ФОНОВАЯ МУЗЫКА (2 встроенных трека для надежности) =======================
    // Трек 1 - основная мелодия (короткая и приятная)
    // Трек 2 - резервная (на случай проблем с первым)
    const musicUrl1 = 'https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=good-beginning-111718.mp3';
    const musicUrl2 = 'https://cdn.pixabay.com/download/audio/2021/08/04/audio_b3a2e6b234.mp3?filename=lofi-study-112191.mp3';
    
    const bgMusic = new Audio();
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    let currentTrack = 0;
    
    function setMusicTrack(trackIndex) {
        if (trackIndex === 0) {
            bgMusic.src = musicUrl1;
        } else {
            bgMusic.src = musicUrl2;
        }
        if (musicEnabled && !bgMusic.paused) {
            bgMusic.play().catch(e => console.log('play error:', e));
        }
    }
    setMusicTrack(0);
    
    let musicEnabled = true;
    function playMusic() { 
        if(musicEnabled && bgMusic.paused) {
            bgMusic.play().catch(e => {
                console.log("Автовоспроизведение заблокировано, пробуем резервный трек");
                if (currentTrack === 0) {
                    currentTrack = 1;
                    setMusicTrack(1);
                }
            });
        }
    }
    function stopMusic() { bgMusic.pause(); }
    document.getElementById("musicToggleBtn").onclick = () => {
        musicEnabled = !musicEnabled;
        if(musicEnabled) playMusic(); else stopMusic();
        document.getElementById("musicToggleBtn").innerHTML = musicEnabled ? '<i class="fas fa-music"></i>' : '<i class="fas fa-volume-mute"></i>';
    };
    document.body.addEventListener('click', () => { if(musicEnabled && bgMusic.paused) playMusic(); }, { once: true });
    document.body.addEventListener('touchstart', () => { if(musicEnabled && bgMusic.paused) playMusic(); }, { once: true });
    const volumeSlider = document.getElementById("globalVolume");
    volumeSlider.addEventListener("input", (e) => { let vol = e.target.value / 100; bgMusic.volume = vol * 0.8; });
    volumeSlider.dispatchEvent(new Event('input'));

    // ======================= ЗАЩИТА ОТ ПРОСМОТРА КОДА =======================
    (function() {
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        let devToolsCount = 0;
        setInterval(() => {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100) {
                devToolsCount++;
                if (devToolsCount >= 2) {
                    localStorage.clear();
                    alert('Инструменты разработчика обнаружены. Прогресс сброшен.');
                    location.reload();
                }
            } else devToolsCount = 0;
        }, 5000);
    })();

    // ======================= БАЗЫ ДАННЫХ ВОПРОСОВ =======================
    const countryCapital = [["Россия","Москва"],["США","Вашингтон"],["Франция","Париж"],["Германия","Берлин"],["Китай","Пекин"],["Япония","Токио"],["Италия","Рим"],["Великобритания","Лондон"],["Испания","Мадрид"],["Канада","Оттава"],["Бразилия","Бразилиа"],["Австралия","Канберра"],["Индия","Нью-Дели"],["Египет","Каир"],["Турция","Анкара"]];
    const historyQA = [{ q: "В каком году Колумб открыл Америку?", a: "1492" },{ q: "Начало ВОВ?", a: "1941" },{ q: "Первый император России?", a: "Пётр I" },{ q: "Битва при Калке?", a: "1223" },{ q: "Распад СССР?", a: "1991" }];
    const authorWork = [{ author: "Толстой", work: "Война и мир" },{ author: "Пушкин", work: "Евгений Онегин" },{ author: "Достоевский", work: "Преступление и наказание" }];
    const engWords = [["собака","dog"],["кошка","cat"],["красный","red"],["яблоко","apple"]];
    const obzhFacts = [{ q: "Номер пожарной службы?", correct: "101", wrong: ["102","103"] }];
    const societyFacts = [["Высший орган власти РФ?", "Президент"],["Конституция РФ принята?", "1993"]];
    const biologyFacts = [["Сколько костей у взрослого человека?", "206"],["Сколько камер в сердце?", "4"]];
    const elements = [["Au","Золото"],["Ag","Серебро"],["Fe","Железо"]];
    const physicsFacts = [["Единица измерения силы?", "Ньютон"],["Скорость света (км/с)?", "300000"]];
    const spellingWords = [{ word: "прекрасный", wrong: ["прекрастный","прекрасны"] }];

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function unique(arr) { return [...new Set(arr)]; }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function simpleHash(str) { let h=0; for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i),h|=0; return h; }
    function declineCountry(c) { const e = {"Россия":"России","США":"США","Франция":"Франции","Германия":"Германии"}; return e[c] || c+'ы'; }
    function declineElement(n) { const e = {"Золото":"золота"}; return e[n] || n; }

    function generateMathQuestion(level) {
        let a = Math.floor(Math.random()*10)+2, b = Math.floor(Math.random()*10)+2;
        let correct = a+b;
        return { text: `${a} + ${b} = ?`, options: shuffle([correct.toString(), (correct+1).toString(), (correct-1).toString(), (correct+2).toString()]), correctHash: simpleHash(correct.toString()), points: 10 };
    }
    function generateHistoryQuestion() { let ev=randomItem(historyQA); let wrongs=["1500","1700","1900"]; let opts=unique([ev.a,...wrongs]); return { text: ev.q, options: shuffle(opts.slice(0,4)), correctHash: simpleHash(ev.a), points:10 }; }
    function generateGeoQuestion() { let p=randomItem(countryCapital); let text=`Столица ${declineCountry(p[0])}?`; let correct=p[1]; let wrongs=["Лондон","Париж","Берлин"]; let opts=unique([correct,...wrongs]); return { text, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateLiteratureQuestion() { let item=randomItem(authorWork); let text=`Кто написал "${item.work}"?`; let correct=item.author; let wrongs=["Чехов","Гоголь","Булгаков"]; let opts=unique([correct,...wrongs]); return { text, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateEnglishQuestion() { let w=randomItem(engWords); let correct=w[1]; let wrongs=["cat","dog","car"]; let opts=unique([correct,...wrongs]); return { text:`Перевод слова "${w[0]}":`, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generateOBZHQuestion() { let f=randomItem(obzhFacts); let opts=unique([f.correct,...f.wrong]); return { text: f.q, options: shuffle(opts), correctHash: simpleHash(f.correct), points:10 }; }
    function generateSocietyQuestion() { let f=randomItem(societyFacts); let wrongs=["2000","1995","1991"]; let opts=unique([f[1],...wrongs]); return { text: f[0], options: shuffle(opts), correctHash: simpleHash(f[1]), points:10 }; }
    function generateBiologyQuestion() { let f=randomItem(biologyFacts); let wrongs=["200","210","150"]; let opts=unique([f[1],...wrongs]); return { text: f[0], options: shuffle(opts), correctHash: simpleHash(f[1]), points:10 }; }
    function generateChemistryQuestion() { let e=randomItem(elements); let text=`Символ ${declineElement(e[1])}?`; let correct=e[0]; let wrongs=["Fe","Ag","Pb"]; let opts=unique([correct,...wrongs]); return { text, options: shuffle(opts), correctHash: simpleHash(correct), points:10 }; }
    function generatePhysicsQuestion() { let f=randomItem(physicsFacts); let wrongs=["Джоуль","Ватт","Паскаль"]; let opts=unique([f[1],...wrongs]); return { text: f[0], options: shuffle(opts), correctHash: simpleHash(f[1]), points:10 }; }
    function generateRussianQuestion() { let base=randomItem(spellingWords); let opts=unique([base.word,...base.wrong]); return { text: "Выберите правильное написание:", options: shuffle(opts.slice(0,4)), correctHash: simpleHash(base.word), points:10 }; }

    // ======================= ОСНОВНАЯ ЛОГИКА ПРИЛОЖЕНИЯ =======================
    const allSubjects = ["math","russian","geo","history","literature","english","obzh","society","biology","chemistry","physics"];
    const subjectNames = { math:"🧮 Математика", russian:"📖 Русский", geo:"🌍 География", history:"🏛️ История", literature:"📚 Литература", english:"🇬🇧 Английский", obzh:"🛡️ ОБЖ", society:"⚖️ Общество", biology:"🧬 Биология", chemistry:"⚗️ Химия", physics:"⚛️ Физика" };
    const subjectIcons = { math:"fa-calculator", russian:"fa-book", geo:"fa-globe", history:"fa-landmark", literature:"fa-feather-alt", english:"fa-language", obzh:"fa-shield-alt", society:"fa-gavel", biology:"fa-dna", chemistry:"fa-flask", physics:"fa-atom" };

    let progressBySubject = {};
    let currentSubject = "math";
    let currentQuestion = null;
    let selectedAnswer = null;
    let waitingForNext = false;
    let gameActive = true;
    let adLastShown = 0;
    let isAdWatching = false;
    let adTimerInterval = null;
    const MAX_LIVES = 5;
    const Q_PER_LEVEL = 3;
    let currentUser = { id: 'guest', name: 'Гость' };

    allSubjects.forEach(s => { progressBySubject[s] = { totalScore:0, level:1, lives:3, combo:0, qInLevel:0, levelPerfect:true, usedQuestions:new Set() }; });

    function saveAllProgress() {
        const toSave = {};
        for(let s of allSubjects) {
            toSave[s] = {
                totalScore: progressBySubject[s].totalScore,
                level: progressBySubject[s].level,
                lives: progressBySubject[s].lives,
                combo: progressBySubject[s].combo,
                qInLevel: progressBySubject[s].qInLevel,
                levelPerfect: progressBySubject[s].levelPerfect,
                usedQuestions: Array.from(progressBySubject[s].usedQuestions)
            };
        }
        localStorage.setItem('quizProgressV6', JSON.stringify(toSave));
        if(window.vkBridge) vkBridge.send("VKWebAppStorageSet", { key: "quizProgress", value: JSON.stringify(toSave) }).catch(e=>console.warn);
    }
    function loadAllProgress() {
        const saved = localStorage.getItem('quizProgressV6');
        if(saved) {
            try {
                const data = JSON.parse(saved);
                for(let s of allSubjects) if(data[s]) {
                    progressBySubject[s] = { ...progressBySubject[s], ...data[s], usedQuestions: new Set(data[s].usedQuestions || []) };
                }
            } catch(e) {}
        }
    }
    loadAllProgress();

    async function showLeaderboard() {
        const leaderboard = JSON.parse(localStorage.getItem('globalLeaderboard') || '[]');
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-trophy"></i> Топ-10 (${subjectNames[currentSubject]})</h3><ul class="leaderboard-list">${leaderboard.map((u,i) => `<li><strong>${i+1}.</strong> ${u.name} 🎯 ${u.score} очков | Уровень ${u.level}</li>`).join('')}</ul><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(modal); document.body.style.overflow = 'hidden';
        modal.querySelector('.close-modal').onclick = () => { modal.remove(); document.body.style.overflow = ''; };
        modal.onclick = (e) => { if(e.target === modal) { modal.remove(); document.body.style.overflow = ''; } };
    }
    document.getElementById("leaderboardBtn").onclick = showLeaderboard;

    function getCurrentProgress() { return progressBySubject[currentSubject]; }
    function updateUIFromProgress() {
        const p = getCurrentProgress();
        document.getElementById("scoreValue").innerText = p.totalScore;
        document.getElementById("levelValue").innerText = p.level;
        document.getElementById("comboValue").innerText = p.combo;
        document.getElementById("levelProgressFill").style.width = (p.qInLevel / Q_PER_LEVEL) * 100 + "%";
    }
    function getUniqueQuestion(subject, lvl) {
        const p = progressBySubject[subject];
        let attempts=0, q;
        do {
            if(subject==='math') q=generateMathQuestion(lvl);
            else if(subject==='russian') q=generateRussianQuestion();
            else if(subject==='geo') q=generateGeoQuestion();
            else if(subject==='history') q=generateHistoryQuestion();
            else if(subject==='literature') q=generateLiteratureQuestion();
            else if(subject==='english') q=generateEnglishQuestion();
            else if(subject==='obzh') q=generateOBZHQuestion();
            else if(subject==='society') q=generateSocietyQuestion();
            else if(subject==='biology') q=generateBiologyQuestion();
            else if(subject==='chemistry') q=generateChemistryQuestion();
            else if(subject==='physics') q=generatePhysicsQuestion();
            attempts++;
            if(attempts>200) return null;
        } while(p.usedQuestions.has(q.text+q.correctHash));
        p.usedQuestions.add(q.text+q.correctHash);
        return q;
    }
    function loadNewQuestion() {
        if(!gameActive) return;
        waitingForNext = false;
        const p = getCurrentProgress();
        if(p.lives <= 0) { offerAdForRevival(); return; }
        let q = getUniqueQuestion(currentSubject, p.level);
        if(!q) { finishGame(true); return; }
        currentQuestion = q;
        selectedAnswer = null;
        renderUI();
    }
    function advance(isCorrect) {
        const p = getCurrentProgress();
        if(!isCorrect) p.levelPerfect = false;
        p.qInLevel++;
        saveAllProgress(); updateUIFromProgress();
        if(p.qInLevel >= Q_PER_LEVEL) {
            let bonus = 50;
            p.totalScore += bonus;
            if(p.levelPerfect) { showConfettiAdaptive(); showTemporaryMessage(`🎉 ИДЕАЛЬНЫЙ УРОВЕНЬ ${p.level}! +${bonus} бонусов!`); }
            p.level++; p.qInLevel=0; p.levelPerfect=true;
            saveAllProgress(); updateUIFromProgress(); updateLeaderboardStorage();
            setTimeout(()=>loadNewQuestion(), 400);
            return;
        }
        loadNewQuestion();
    }
    function updateLeaderboardStorage() {
        let leaderboard = JSON.parse(localStorage.getItem('globalLeaderboard') || '[]');
        const totalScore = progressBySubject[currentSubject].totalScore;
        const existing = leaderboard.find(entry => entry.id === currentUser.id);
        if(existing) {
            if(totalScore > existing.score) {
                existing.score = totalScore;
                existing.name = currentUser.name;
                existing.level = progressBySubject[currentSubject].level;
            }
        } else {
            leaderboard.push({
                id: currentUser.id,
                name: currentUser.name,
                score: totalScore,
                level: progressBySubject[currentSubject].level,
                timestamp: Date.now()
            });
        }
        leaderboard.sort((a,b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 10);
        localStorage.setItem('globalLeaderboard', JSON.stringify(leaderboard));
    }
    function handleAnswerSubmit() {
        if(waitingForNext || !gameActive || !selectedAnswer) return;
        const isCorrect = (simpleHash(selectedAnswer) === currentQuestion.correctHash);
        const p = getCurrentProgress();
        const fbDiv = document.getElementById("feedbackMsg");
        if(isCorrect) {
            let earned = currentQuestion.points;
            p.totalScore += earned;
            p.combo++;
            let comboBonus = p.combo>=3?15:0;
            if(comboBonus>0){ p.totalScore+=comboBonus; fbDiv.innerHTML=`✅ ВЕРНО! +${earned} + комбо x${p.combo} +${comboBonus}! 🔥`; }
            else fbDiv.innerHTML=`✅ ВЕРНО! +${earned} очков. Отлично!`;
            saveAllProgress(); updateUIFromProgress(); updateLeaderboardStorage();
        } else {
            p.lives--; p.combo=0; saveAllProgress(); updateUIFromProgress();
            let correctAnswer = currentQuestion.options.find(opt => simpleHash(opt) === currentQuestion.correctHash);
            fbDiv.innerHTML = `❌ ОШИБКА! Правильно: ${correctAnswer}. Жизней: ${p.lives}`;
            if(p.lives<=0){ waitingForNext=true; offerAdForRevival(); return; }
        }
        waitingForNext = true;
        document.querySelectorAll(".answer-btn").forEach(btn=>btn.disabled=true);
        advance(isCorrect);
    }
    function showTemporaryMessage(msg, duration=3000) {
        const fb = document.getElementById("feedbackMsg");
        if(fb){ fb.style.display="block"; fb.innerHTML=msg; setTimeout(()=>{ if(fb.innerHTML===msg){ fb.style.display="none"; fb.innerHTML=""; } }, duration); }
    }
    async function showRewardedAd(adType) {
        if(!window.vkBridge) return false;
        const now=Date.now();
        if(now-adLastShown<30000){ showTemporaryMessage(`⚠️ Реклама раз в 30 секунд. Подождите ${Math.ceil((30000-(now-adLastShown))/1000)}с`); return false; }
        if(isAdWatching) return false;
        isAdWatching=true; adLastShown=now;
        if(adTimerInterval) clearInterval(adTimerInterval);
        adTimerInterval = setInterval(() => updateAdButtonTimer(), 1000);
        try{
            const result=await vkBridge.send("VKWebAppShowNativeAds",{ ad_format:"reward" });
            if(result && result.result===true){
                const p=getCurrentProgress();
                if(adType==='revive' || adType==='bonus') { if(p.lives < MAX_LIVES) p.lives++; else { showTemporaryMessage("Максимум жизней"); isAdWatching=false; updateAdButtonTimer(); return false; } }
                saveAllProgress(); updateUIFromProgress();
                if(currentQuestion) renderUI();
                showTemporaryMessage("❤️ +1 жизнь!");
                return true;
            } else{ showTemporaryMessage("Реклама не досмотрена"); return false; }
        } catch(e){ return false; } finally{ isAdWatching=false; updateAdButtonTimer(); }
    }
    function offerAdForRevival() {
        if(!gameActive) return;
        gameActive=false;
        showConfirmModal("Жизни кончились! Смотреть рекламу?", async ()=>{
            let success=await showRewardedAd('revive');
            if(success){ gameActive=true; waitingForNext=false; if(currentQuestion) renderUI(); else loadNewQuestion(); }
            else finishGame(false);
        },()=>finishGame(false));
    }
    function finishGame(success) {
        gameActive=false;
        const p=getCurrentProgress();
        document.getElementById("gameArea").innerHTML=`<div class="result-area"><div class="result-score">${success?"🏆 ПОБЕДА!":"💀 ПОРАЖЕНИЕ"}</div><p>Очки: ${p.totalScore} | Уровень: ${p.level}</p>
        <button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button>
        <button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button></div>`;
        document.getElementById("shareBtn")?.addEventListener("click",()=>{ if(window.vkBridge) vkBridge.send("VKWebAppShare",{link:"https://vk.com",attachment:`Я прошёл ${subjectNames[currentSubject]} с ${p.totalScore} очков!`}); });
        document.getElementById("resetBtn")?.addEventListener("click",()=>{ resetSubjectProgress(currentSubject); loadNewQuestion(); });
    }
    function resetSubjectProgress(subject) {
        progressBySubject[subject] = { totalScore:0, level:1, lives:3, combo:0, qInLevel:0, levelPerfect:true, usedQuestions:new Set() };
        if(subject === currentSubject) { waitingForNext=false; selectedAnswer=null; gameActive=true; currentQuestion=null; loadNewQuestion(); }
        saveAllProgress(); updateUIFromProgress(); updateLeaderboardStorage();
    }
    function renderUI() {
        if(!currentQuestion) return;
        const p = getCurrentProgress();
        const hearts = "❤️".repeat(p.lives) + "🖤".repeat(MAX_LIVES-p.lives);
        const html = `<div class="quest-header"><div class="level-badge">⚡ Уровень ${p.level} · ${subjectNames[currentSubject]}</div><div class="lives">${hearts}</div></div>
        <div class="question-card"><div class="question-text">${escapeHtml(currentQuestion.text)}</div><div class="answers" id="answersContainer">${currentQuestion.options.map(opt=>`<button class="answer-btn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}</div>
        <div class="feedback" id="feedbackMsg" style="display:none;"></div>
        <button class="next-btn hidden" id="nextBtn">➡️ ДАЛЕЕ</button>
        <button class="bonus-btn" id="bonusLifeBtn">❤️ +1 ЖИЗНЬ</button>
        <button class="hint-btn" id="hintBtn"><i class="fas fa-robot"></i> Подсказка</button></div>`;
        document.getElementById("gameArea").innerHTML = html;
        document.querySelectorAll(".answer-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                if(waitingForNext||!gameActive) return;
                selectedAnswer = btn.getAttribute("data-answer");
                document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected"));
                btn.classList.add("selected");
                document.getElementById("nextBtn")?.classList.remove("hidden");
            });
        });
        document.getElementById("nextBtn")?.addEventListener("click", () => { if(selectedAnswer && !waitingForNext) handleAnswerSubmit(); else if(!selectedAnswer) showTemporaryMessage("Выберите ответ"); });
        document.getElementById("bonusLifeBtn")?.addEventListener("click", async () => { if(p.lives>=MAX_LIVES) showTemporaryMessage("Максимум жизней"); else await showRewardedAd('bonus'); });
        document.getElementById("hintBtn")?.addEventListener("click", () => showTemporaryMessage("🤖 Подсказка: отбросьте заведомо неверные варианты, останется 2-3 возможных.", 4000));
        updateAdButtonTimer();
    }
    function updateAdButtonTimer() {
        const btn = document.getElementById("bonusLifeBtn");
        if(!btn) return;
        const rem = Math.max(0, 30000 - (Date.now() - adLastShown));
        if(rem>0 && adLastShown>0){ btn.disabled=true; btn.innerHTML=`⏳ +1 ЖИЗНЬ (${Math.ceil(rem/1000)}с)`; }
        else { btn.disabled=false; btn.innerHTML=`❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ`; if(adTimerInterval) clearInterval(adTimerInterval); adTimerInterval=null; }
    }
    function showConfirmModal(msg, onYes, onNo) {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><p>${msg}</p><div style="display:flex; gap:12px; margin-top:20px;"><button class="modal-btn confirm" style="background:#f56b2c; padding:12px 24px; border-radius:60px;">Да, смотреть</button><button class="modal-btn cancel" style="background:#555; padding:12px 24px; border-radius:60px;">Нет, закончить</button></div></div>`;
        document.body.appendChild(modal); document.body.style.overflow = 'hidden';
        const close = () => { modal.remove(); document.body.style.overflow = ''; };
        modal.querySelector('.confirm').onclick = () => { close(); onYes(); };
        modal.querySelector('.cancel').onclick = () => { close(); onNo(); };
        modal.onclick = (e) => { if(e.target === modal) { close(); onNo(); } };
    }
    function showConfettiAdaptive() {
        for(let i=0;i<60;i++){ let c=document.createElement('div'); c.classList.add('confetti-piece'); c.style.left=Math.random()*window.innerWidth+'px'; c.style.backgroundColor=`hsl(${Math.random()*360},80%,60%)`; document.body.appendChild(c); setTimeout(()=>c.remove(),2500); }
    }
    function buildSubjectsUI() {
        const grid = document.getElementById("subjectsGrid");
        grid.innerHTML = '';
        allSubjects.forEach(s => {
            const btn = document.createElement('button'); btn.className = 'subject-btn';
            if(s === currentSubject) btn.classList.add('active');
            btn.innerHTML = `<i class="fas ${subjectIcons[s]}"></i> ${subjectNames[s]}`;
            btn.onclick = () => {
                if(s === currentSubject && gameActive) return;
                saveAllProgress();
                document.querySelectorAll('.subject-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentSubject = s;
                waitingForNext = false; selectedAnswer = null; gameActive = true; currentQuestion = null;
                updateUIFromProgress();
                loadNewQuestion();
            };
            grid.appendChild(btn);
        });
    }
    function startTutorial() {
        if(localStorage.getItem('tutorialShown')) return;
        const overlay = document.createElement('div'); overlay.className = 'modal';
        overlay.innerHTML = `<div class="modal-content"><h3>🎓 Добро пожаловать!</h3><p>• Выбирайте предмет вверху<br>• Отвечайте на вопросы<br>• За ошибку теряете жизнь<br>• Реклама даёт +1 жизнь (раз в 30 сек)<br>• Комбо увеличивает очки<br>• Топ-10 глобальный</p><button class="close-modal">Начать</button></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.close-modal').onclick = () => { overlay.remove(); localStorage.setItem('tutorialShown','true'); };
    }

        const m = document.createElement('div'); m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><h3>${title}</h3><p>${text}</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(m); m.querySelector('.close-modal').onclick = () => m.remove();

    async function initUser() {
        if(window.vkBridge) {
            try {
                await vkBridge.send("VKWebAppInit");
                const user = await vkBridge.send("VKWebAppGetUserInfo");
