    (function() {
        const musicURL = 'https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=good-beginning-111718.mp3';
        const audio = new Audio(musicURL);
        audio.loop = true;
        audio.volume = 0.3;
        let musicEnabled = true;
        let started = false;

        function playMusic() {
            if (musicEnabled && audio.paused) {
                audio.play().then(() => {
                    started = true;
                }).catch(e => console.log("Требуется взаимодействие с приложением"));
            }
        }

        const firstInteraction = () => {
            if (!started && musicEnabled) {
                audio.play().then(() => started = true).catch(e => console.log);
            }
            document.removeEventListener('click', firstInteraction);
            document.removeEventListener('touchstart', firstInteraction);
        };
        document.addEventListener('click', firstInteraction);
        document.addEventListener('touchstart', firstInteraction);

        const musicBtn = document.getElementById('musicToggleBtn');
        if (musicBtn) {
            musicBtn.onclick = (e) => {
                e.stopPropagation();
                musicEnabled = !musicEnabled;
                if (musicEnabled) {
                    if (!started) {
                        audio.play().then(() => started = true).catch(e=>console.log);
                    } else {
                        audio.play().catch(e=>console.log);
                    }
                    musicBtn.innerHTML = '<i class="fas fa-music"></i> Вкл/Выкл';
                } else {
                    audio.pause();
                    musicBtn.innerHTML = '<i class="fas fa-volume-mute"></i> Вкл/Выкл';
                }
            };
        }

        const volSlider = document.getElementById('globalVolume');
        if (volSlider) {
            volSlider.addEventListener('input', (e) => {
                audio.volume = e.target.value / 100;
            });
        }
    })();

    function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr) { for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function unique(arr) { return [...new Set(arr)]; }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function simpleHash(str) { let h=0; for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i),h|=0; return h; }

    function declineCountry(c) {
        const exc = {
            "Россия":"России","США":"США","Франция":"Франции","Германия":"Германии","Китай":"Китая",
            "Япония":"Японии","Италия":"Италии","Великобритания":"Великобритании","Испания":"Испании",
            "Канада":"Канады","Бразилия":"Бразилии","Австралия":"Австралии","Индия":"Индии",
            "Египет":"Египта","Турция":"Турции","ОАЭ":"ОАЭ","Израиль":"Израиля",
            "Беларусь":"Беларуси","ЮАР":"ЮАР","Саудовская Аравия":"Саудовской Аравии",
            "Нидерланды":"Нидерландов","Мексика":"Мексики","Марокко":"Марокко"
        };
        return exc[c] || (c.endsWith('я') ? c.slice(0,-1)+'и' : (c.endsWith('а') ? c.slice(0,-1)+'ы' : c+'а'));
    }
    function declineElement(n) { 
        const e = {"Золото":"золота","Серебро":"серебра","Железо":"железа","Ртуть":"ртути","Натрий":"натрия"}; 
        return e[n] || n; 
    }

    function generateMathQuestion(level) {
        let complexity = Math.min(3 + Math.floor(level / 3), 12);
        let a = Math.floor(Math.random() * (5 + complexity)) + 2;
        let b = Math.floor(Math.random() * (5 + complexity)) + 2;
        let ops = ['+', '-', '×'];
        if (level >= 3) ops.push('÷');
        let op = randomItem(ops);
        let correct, text, opts;

        if (op === '+') { correct = a + b; text = `${a} + ${b} = ?`; opts = [correct, correct+1, correct-1, correct+2].filter(v => v > 0); }
        else if (op === '-') { if (a < b) [a,b] = [b,a]; correct = a - b; text = `${a} - ${b} = ?`; opts = [correct, correct+1, correct-1, correct+2].filter(v => v >= 0); if (correct===0) opts=[0,1,2,3]; }
        else if (op === '×') { correct = a * b; text = `${a} × ${b} = ?`; opts = [correct, correct+2, correct-2, correct+1].filter(v => v > 0); }
        else { let divisor = Math.floor(Math.random() * (5+complexity)) + 2; let quotient = Math.floor(Math.random() * (5+complexity)) + 2; let dividend = divisor * quotient; correct = quotient; text = `${dividend} ÷ ${divisor} = ?`; opts = [correct, correct+1, correct-1, correct+2].filter(v => v > 0); }
        if (opts.length < 4) opts.push(Math.abs(correct) + 3);
        opts = unique(opts);
        while(opts.length < 4) opts.push((Number(correct)+1).toString());
        return { text, options: shuffle(opts.map(String)), correctHash: simpleHash(correct.toString()), points: 10 + Math.floor(level/2) };
    }
    function generateHistoryQuestion() {
        let ev = randomItem(historyQA);
        let wrongs;
        if (ev.type === "person") {
            wrongs = ["Иван Грозный", "Пётр I", "Екатерина II", "Николай II", "Александр I", "Владимир Ленин", "Иосиф Сталин", "Михаил Горбачёв"];
        } else {
            wrongs = ["1500", "1700", "1900", "2000", "988", "1242", "1812", "1917", "1945", "1991"];
        }
        wrongs = wrongs.filter(w => w !== ev.a).slice(0, 3);
        let opts = unique([ev.a, ...wrongs]);
        while(opts.length < 4) opts.push(ev.type === "person" ? "Неизвестно" : "0");
        return { text: ev.q, options: shuffle(opts.slice(0,4)), correctHash: simpleHash(ev.a), points: 10 };
    }

    async function loadProgressFromCloud() {
        if (!window.vkBridge || currentUser.id === 'guest') return false;
        try {
            const res = await vkBridge.send("VKWebAppStorageGet", { keys: ["quizProgress", "quizProgressTimestamp"] });
            let cloudProgress = null, cloudTimestamp = 0;
            for (let item of res.keys) {
                if (item.key === "quizProgress") cloudProgress = item.value;
                if (item.key === "quizProgressTimestamp") cloudTimestamp = parseInt(item.value) || 0;
            }
            if (cloudProgress) {
                const localTimestamp = parseInt(localStorage.getItem('quizProgressTimestamp') || '0');
                if (cloudTimestamp > localTimestamp || localTimestamp === 0) {
                    const parsed = JSON.parse(cloudProgress);
                    for (let s of allSubjects) {
                        if (parsed[s]) {
                            progressBySubject[s] = {
                                ...progressBySubject[s],
                                ...parsed[s],
                                usedQuestions: new Set(parsed[s].usedQuestions || [])
                            };
                        }
                    }
                    localStorage.setItem('quizProgressV7', JSON.stringify(parsed));
                    localStorage.setItem('quizProgressTimestamp', cloudTimestamp.toString());
                    return true;
                }
            }
            return false;
        } catch(e) { console.warn("Ошибка загрузки из облака VK:", e); return false; }
    }

    function getUniqueQuestion(subject, lvl) {
        const p = progressBySubject[subject];
        let attempts=0, q;
        do {
            if(subject==='math') q=generateMathQuestion(lvl);
            else if(subject==='russian') q=generateRussianQuestion();
            else if(subject==='geo') q=generateGeoQuestion();
            else if(subject==='history') q=generateHistoryQuestion();
            else if(subject==='literature') q=generateLiteratureQuestion();
            else if(subject==='english') q=generateEnglishQuestion();
            else if(subject==='obzh') q=generateOBZHQuestion();
            else if(subject==='society') q=generateSocietyQuestion();
            else if(subject==='biology') q=generateBiologyQuestion();
            else if(subject==='chemistry') q=generateChemistryQuestion();
            else if(subject==='physics') q=generatePhysicsQuestion();
            attempts++;
            if(attempts>200) return null;
        } while(p.usedQuestions.has(q.text+q.correctHash));
        p.usedQuestions.add(q.text+q.correctHash);
        return q;
    }

    function loadNewQuestion() {
        if(!gameActive) return;
        waitingForNext = false;
        const p = getCurrentProgress();
        if(p.lives <= 0) { offerAdForRevival(); return; }
        let q = getUniqueQuestion(currentSubject, p.level);
        if(!q) { finishGame(true); return; }
        currentQuestion = q;
        selectedAnswer = null;
        renderUI();
    }

    function advance(isCorrect) {
        const p = getCurrentProgress();
        if(!isCorrect) p.levelPerfect = false;
        p.qInLevel++;
        saveAllProgress(); updateUI();
        if(p.qInLevel >= Q_PER_LEVEL) {
            let bonus = 50;
            p.totalScore += bonus;
            if(p.levelPerfect) { showConfetti(); showTemporaryMessage(`🎉 ИДЕАЛЬНЫЙ УРОВЕНЬ ${p.level}! +${bonus} бонусов!`); }
            p.level++; p.qInLevel=0; p.levelPerfect=true;
            saveAllProgress(); updateUI();
            setTimeout(()=>loadNewQuestion(), 400);
            return;
        }
        loadNewQuestion();
    }

    function handleAnswerSubmit() {
        if(waitingForNext || !gameActive || !selectedAnswer) return;
        const isCorrect = (simpleHash(selectedAnswer) === currentQuestion.correctHash);
        const p = getCurrentProgress();
        const fbDiv = document.getElementById("feedbackMsg");
        if(isCorrect) {
            let earned = currentQuestion.points;
            p.totalScore += earned;
            p.combo++;
            let comboBonus = p.combo>=3?15:0;
            if(comboBonus>0){ p.totalScore+=comboBonus; fbDiv.innerHTML=`✅ ВЕРНО! +${earned} + комбо x${p.combo} +${comboBonus}! 🔥`; }
            else fbDiv.innerHTML=`✅ ВЕРНО! +${earned} очков. Отлично!`;
            saveAllProgress(); updateUI();
        } else {
            p.lives--; p.combo=0; saveAllProgress(); updateUI();
            let correctAnswer = currentQuestion.options.find(opt => simpleHash(opt) === currentQuestion.correctHash);
            fbDiv.innerHTML = `❌ ОШИБКА! Правильно: ${correctAnswer}. Жизней: ${p.lives}`;
            if(p.lives<=0){ waitingForNext=true; offerAdForRevival(); return; }
        }
        waitingForNext = true;
        document.querySelectorAll(".answer-btn").forEach(btn=>btn.disabled=true);
        advance(isCorrect);
    }

                showTemporaryMessage("❤️ +1 жизнь!");
                return true;
            } else{ showTemporaryMessage("Реклама не досмотрена"); return false; }
        } catch(e){ return false; } finally{ isAdWatching=false; updateAdButtonTimer(); }
    }

    function offerAdForRevival() {
        if(!gameActive) return;
        gameActive=false;
        showConfirmModal("Жизни кончились! Смотреть рекламу?", async ()=>{
            let success=await showRewardedAd('revive');
            if(success){ gameActive=true; waitingForNext=false; if(currentQuestion) renderUI(); else loadNewQuestion(); }
            else finishGame(false);
        },()=>finishGame(false));
    }

    function finishGame(success) {
        gameActive=false;
        const p=getCurrentProgress();
        const resultText = success ? "🏆 ПОБЕДА!" : "💀 ПОРАЖЕНИЕ";
        document.getElementById("gameArea").innerHTML=`<div class="result-area"><div class="result-score">${resultText}</div><p style="margin:12px 0; color:white; font-size:1.2rem;">Очки: ${p.totalScore} | Уровень: ${p.level}</p>
        <button class="share-btn" id="shareBtn">📢 ПОДЕЛИТЬСЯ</button>
        <button class="reset-btn" id="resetBtn">🔄 НАЧАТЬ ЗАНОВО</button>
        <button class="select-subject-hint" id="selectSubjectHint">📚 ВЫБРАТЬ ДРУГОЙ ПРЕДМЕТ</button>
        </div>`;
        document.getElementById("shareBtn")?.addEventListener("click",()=>{
            if(window.vkBridge) {
                vkBridge.send("VKWebAppShowWallPostBox", {
                    message: `Я прошёл(а) ${subjectNames[currentSubject]} с результатом ${p.totalScore} очков!`,
                    attachments: [window.location.href]
                });
            } else {
                alert("Поделиться можно только в приложении VK");
            }
        });
        document.getElementById("resetBtn")?.addEventListener("click",()=>{
            resetSubjectProgress(currentSubject);
        });
        document.getElementById("selectSubjectHint")?.addEventListener("click",()=>{
            document.querySelector('.subjects-wrapper').scrollIntoView({behavior:"smooth", block:"center"});
            document.querySelector('.subjects-wrapper').style.animation = "none";
            setTimeout(()=>{ document.querySelector('.subjects-wrapper').style.animation = ""; }, 10);
        });
    }

    function resetSubjectProgress(subject) {
        progressBySubject[subject] = { totalScore:0, level:1, lives:3, combo:0, qInLevel:0, levelPerfect:true, usedQuestions:new Set() };
        if(subject === currentSubject) {
            waitingForNext = false; selectedAnswer = null; gameActive = true; currentQuestion = null;
            saveAllProgress(); updateUI(); loadNewQuestion();
        } else { saveAllProgress(); }
    }

    function renderUI() {
        if(!currentQuestion) return;
        const p = getCurrentProgress();
        let livesHtml = '';
        for (let i = 0; i < MAX_LIVES; i++) {
            if (i < p.lives) livesHtml += '<i class="fas fa-heart"></i>';
            else livesHtml += '<i class="fas fa-heart-broken"></i>';
        }
        const html = `<div class="quest-header"><div class="level-badge">⚡ Уровень ${p.level} · ${subjectNames[currentSubject]}</div><div class="lives">${livesHtml}</div></div>
        <div class="question-card"><div class="question-text">${escapeHtml(currentQuestion.text)}</div><div class="answers" id="answersContainer">${currentQuestion.options.map(opt=>`<button class="answer-btn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('')}</div>
        <div class="feedback" id="feedbackMsg" style="display:none;"></div>
        <button class="next-btn hidden" id="nextBtn">➡️ ДАЛЕЕ</button>
        <button class="bonus-btn" id="bonusLifeBtn">❤️ +1 ЖИЗНЬ</button>
        <button class="hint-btn" id="hintBtn"><i class="fas fa-robot"></i> Подсказка</button></div>`;
        document.getElementById("gameArea").innerHTML = html;
        document.querySelectorAll(".answer-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                if(waitingForNext||!gameActive) return;
                selectedAnswer = btn.getAttribute("data-answer");
                document.querySelectorAll(".answer-btn").forEach(b=>b.classList.remove("selected"));
                btn.classList.add("selected");
                document.getElementById("nextBtn")?.classList.remove("hidden");
            });
        });
        document.getElementById("nextBtn")?.addEventListener("click", () => { if(selectedAnswer && !waitingForNext) handleAnswerSubmit(); else if(!selectedAnswer) showTemporaryMessage("Выберите ответ"); });
        document.getElementById("bonusLifeBtn")?.addEventListener("click", async () => { if(p.lives>=MAX_LIVES) showTemporaryMessage("Максимум жизней"); else await showRewardedAd('bonus'); });
        document.getElementById("hintBtn")?.addEventListener("click", () => {
            let hint = "🤖 ";
            if(currentSubject === "math") hint += "Попробуй выполнить действие в уме, проверь знаки.";
            else if(currentSubject === "russian") hint += "Вспомни правила орфографии, отбрось явно неверные варианты.";
            else if(currentSubject === "geo") hint += "Вспомни столицу из школьного атласа.";
            else if(currentSubject === "history") hint += "Обрати внимание на хронологию событий.";
            else hint += "Отбрось заведомо неверные варианты, обычно остаётся 2 вероятных.";
            showTemporaryMessage(hint, 4000);
        });
        updateAdButtonTimer();
    }

    function updateAdButtonTimer() {
        const btn = document.getElementById("bonusLifeBtn");
        if(!btn) return;
        const rem = Math.max(0, 30000 - (Date.now() - adLastShown));
        if(rem>0 && adLastShown>0){ btn.disabled=true; btn.innerHTML=`⏳ +1 ЖИЗНЬ (${Math.ceil(rem/1000)}с)`; }
        else { btn.disabled=false; btn.innerHTML=`❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ`; if(adTimerInterval) clearInterval(adTimerInterval); adTimerInterval=null; }
    }

    function showConfirmModal(msg, onYes, onNo) {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><p>${msg}</p><div style="display:flex; gap:12px; margin-top:20px;"><button class="modal-btn confirm" style="background:#f56b2c; padding:12px 24px; border-radius:60px;">🗑️ Да, удалить</button><button class="modal-btn cancel" style="background:#555; padding:12px 24px; border-radius:60px;">🔙 Отмена</button></div></div>`;
        document.body.appendChild(modal); document.body.style.overflow = 'hidden';
        const close = () => { modal.remove(); document.body.style.overflow = ''; };
        modal.querySelector('.confirm').onclick = () => { close(); onYes(); };
        modal.querySelector('.cancel').onclick = () => { close(); onNo(); };
        modal.onclick = (e) => { if(e.target === modal) { close(); onNo(); } };
    }

    function showConfetti() {
        for(let i=0;i<60;i++){ let c=document.createElement('div'); c.classList.add('confetti-piece'); c.style.left=Math.random()*window.innerWidth+'px'; c.style.backgroundColor=`hsl(${Math.random()*360},80%,60%)`; document.body.appendChild(c); setTimeout(()=>c.remove(),2500); }
    }

    function buildSubjectsUI() {
        const grid = document.getElementById("subjectsGrid");
        if(!grid) return;
        grid.innerHTML = '';
        allSubjects.forEach(s => {
            const btn = document.createElement('button'); btn.className = 'subject-btn';
            if(s === currentSubject) btn.classList.add('active');
            btn.innerHTML = `<i class="fas ${subjectIcons[s]}"></i> ${subjectNames[s]}`;
            btn.onclick = () => {
                if(s === currentSubject && gameActive) return;
                saveAllProgress();
                document.querySelectorAll('.subject-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentSubject = s;
                waitingForNext = false; selectedAnswer = null; gameActive = true; currentQuestion = null;
                updateUI(); loadNewQuestion();
            };
            grid.appendChild(btn);
        });
    }

    function showInfoModal(title, text) {
        const m = document.createElement('div'); m.className = 'modal';
        m.innerHTML = `<div class="modal-content"><h3>${title}</h3><p>${text}</p><button class="close-modal">Закрыть</button></div>`;
        document.body.appendChild(m); document.body.style.overflow = 'hidden';
        m.querySelector('.close-modal').onclick = () => { m.remove(); document.body.style.overflow = ''; };
    }

    function startTutorial() {
        if(localStorage.getItem('tutorialShown')) return;
        const overlay = document.createElement('div'); overlay.className = 'modal';
        overlay.innerHTML = `<div class="modal-content"><h3>🎓 Добро пожаловать!</h3><p>• Выбирайте предмет вверху<br>• Отвечайте на вопросы<br>• За ошибку теряете жизнь<br>• Реклама даёт +1 жизнь (раз в 30 сек)<br>• Комбо увеличивает очки<br>• Топ-10 — общий рейтинг игроков<br>• Музыка включается/выключается кнопкой</p><button class="close-modal">Начать</button></div>`;
        document.body.appendChild(overlay); document.body.style.overflow = 'hidden';
        overlay.querySelector('.close-modal').onclick = () => { overlay.remove(); document.body.style.overflow = ''; localStorage.setItem('tutorialShown','true'); };
    }

    const userAgreement = `<strong>Пользовательское соглашение</strong><br><br>1. Настоящее соглашение регулирует отношения между разработчиком и пользователем мини-приложения "Битва знаний".<br>2. Использование приложения означает полное согласие с условиями.<br>3. Разработчик не несёт ответственности за возможные убытки.<br>4. Пользователь обязуется не нарушать работу приложения.<br>5. Контактная информация: vova_polyakov_94@mail.ru`;
    const privacyPolicy = `<strong>Политика конфиденциальности</strong><br><br>1. Приложение собирает только идентификатор VK, имя и аватар пользователя для отображения в таблице лидеров и сохранения прогресса.<br>2. Данные хранятся в защищённом облаке VK Storage.<br>3. Пользователь может удалить все свои данные кнопкой "Удалить данные".<br>4. Данные не передаются третьим лицам.<br>5. По всем вопросам: vova_polyakov_94@mail.ru`;

    document.getElementById("termsLink").onclick = () => showInfoModal("Пользовательское соглашение", userAgreement);
    document.getElementById("privacyLink").onclick = () => showInfoModal("Политика конфиденциальности", privacyPolicy);
    document.getElementById("deleteDataLink").onclick = () => showConfirmModal("🗑️ Удалить весь прогресс безвозвратно?", () => { localStorage.clear(); if(window.vkBridge) vkBridge.send("VKWebAppStorageSet", { key: "quizProgress", value: "" }); location.reload(); }, () => {});

    async function startApp() {
        try {
            if (window.vkBridge) {
                await vkBridge.send("VKWebAppInit");
                const user = await vkBridge.send("VKWebAppGetUserInfo");
                if (user && user.id) {
                    currentUser = { id: user.id.toString(), name: user.first_name || 'Игрок', photo: user.photo_100 || '' };
                }
                await loadProgressFromCloud();
                const local = localStorage.getItem('quizProgressV7');
                if (local) {
                    try {
                        const data = JSON.parse(local);
                        for (let s of allSubjects) {
                            if (data[s]) {
                                progressBySubject[s] = { ...progressBySubject[s], ...data[s], usedQuestions: new Set(data[s].usedQuestions || []) };
                            }
                        }
                    } catch(e) {}
                }
            } else {
                const local = localStorage.getItem('quizProgressV7');
                if (local) {
                    try {
                        const data = JSON.parse(local);
                        for (let s of allSubjects) {
                            if (data[s]) {
                                progressBySubject[s] = { ...progressBySubject[s], ...data[s], usedQuestions: new Set(data[s].usedQuestions || []) };
                            }
                        }
                    } catch(e) {}
                }
            }
        } catch(e) { console.warn("Ошибка при инициализации:", e); }
        
        buildSubjectsUI();
        updateUI();
        loadNewQuestion();
        startTutorial();
    }

    startApp();
</script>
</body>
</html>
