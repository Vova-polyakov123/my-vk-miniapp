<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Битва знаний — VK Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0f1c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: #0a0f1c;
            min-height: 100vh;
            position: relative;
            color: #fff;
        }

        /* Хедер */
        .header {
            background: linear-gradient(135deg, #4F7CFF 0%, #6A5CFF 50%, #8A4FFF 100%);
            padding: 20px 20px 30px;
            border-radius: 0 0 30px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
        }
        .stat-card {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 12px 16px;
            min-width: 90px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .stat-label {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* Предметы (горизонтальная прокрутка) */
        .subjects-levels {
            background: #111827;
            padding: 16px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #1f2a3e;
            margin-top: -20px;
            border-radius: 30px 30px 0 0;
            position: relative;
            z-index: 1;
        }
        .subject-level-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 20px;
            font-size: 0.8rem;
        }
        .subject-level-item .subject-name { font-weight: 600; margin-bottom: 4px; }
        .subject-level-item .level { font-size: 0.7rem; opacity: 0.7; }

        /* Игровая зона */
        .game-area {
            padding: 20px;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            color: #9ca3af;
        }
        .series-badge {
            background: #1f2a3e;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .bonus-badge {
            background: #f59e0b;
            padding: 4px 12px;
            border-radius: 20px;
            color: #000;
            font-weight: bold;
        }
        .question-card {
            background: #1e293b;
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 24px;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .answer-btn {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 60px;
            padding: 14px 18px;
            font-weight: 500;
            font-size: 1rem;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
        }
        .answer-btn.selected {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .feedback {
            text-align: center;
            padding: 12px;
            background: #0f172a;
            border-radius: 20px;
            margin-top: 16px;
            display: none;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .action-btn {
            flex: 1;
            background: #1f2a3e;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
        }
        .action-btn.primary { background: #3b82f6; }
        .action-btn.warning { background: #f59e0b; color: #000; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .next-btn {
            width: 100%;
            background: #3b82f6;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 16px;
            cursor: pointer;
            color: white;
        }
        .hidden { display: none; }

        /* Блоки */
        .daily-reward, .achievements, .invite-friends {
            background: #111827;
            margin: 20px;
            padding: 16px;
            border-radius: 24px;
        }
        .daily-title { font-weight: bold; margin-bottom: 12px; }
        .calendar { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
        .day-box {
            background: #1f2a3e;
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .day-box.active { background: #f59e0b; color: #000; }
        .claim-btn {
            background: #3b82f6;
            width: 100%;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .achievement-item { margin-bottom: 16px; }
        .achievement-title { font-size: 0.9rem; font-weight: 600; }
        .achievement-progress {
            background: #1f2a3e;
            height: 8px;
            border-radius: 4px;
            margin-top: 4px;
            overflow: hidden;
        }
        .achievement-fill { background: #3b82f6; height: 100%; width: 0%; }
        .invite-btn {
            background: #3b82f6;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 8px;
            width: 100%;
            cursor: pointer;
            color: white;
        }
        .bottom-nav {
            background: #111827;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px;
            border-top: 1px solid #1f2a3e;
            position: sticky;
            bottom: 0;
        }
        .nav-item {
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
            color: #6b7280;
        }
        .nav-item.active { color: #3b82f6; }

        /* Модалки */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            max-width: 300px;
            width: 80%;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 16px; justify-content: center; }
        .modal-btn { padding: 8px 20px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .modal-btn.confirm { background: #f59e0b; color: black; }
        .modal-btn.cancel { background: #334155; color: white; }
        .close-modal { background: #3b82f6; border: none; padding: 8px 16px; border-radius: 20px; margin-top: 12px; cursor: pointer; width: 100%; }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 20px;
            top: -20px;
            z-index: 1000;
            pointer-events: none;
            animation: confetti 2s ease-out forwards;
            background: gold;
        }
    </style>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="header">
        <h1>БИТВА ЗНАНИЙ</h1>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value" id="totalScore">0</div><div class="stat-label">Очки</div></div>
            <div class="stat-card"><div class="stat-value" id="totalCombo">0</div><div class="stat-label">Комбо</div></div>
            <div class="stat-card"><div class="stat-value" id="globalRating">#--</div><div class="stat-label">Рейтинг</div></div>
        </div>
    </div>

    <div class="subjects-levels" id="subjectsLevels"></div>

    <div id="gameTab">
        <div class="game-area">
            <div class="question-header">
                <span class="series-badge" id="seriesBadge">СЕРИЯ 1</span>
                <span class="bonus-badge" id="bonusBadge">+15 бонус</span>
            </div>
            <div class="question-card">
                <div class="question-text" id="questionText">Загрузка...</div>
                <div class="answers" id="answersContainer"></div>
                <div class="feedback" id="feedbackMsg"></div>
                <div class="action-buttons">
                    <button class="action-btn" id="fiftyFiftyBtn">50/50 Подсказка</button>
                    <button class="action-btn warning" id="bonusPointsBtn">Бонус +25 очков</button>
                </div>
                <button class="next-btn hidden" id="nextBtn">Далее</button>
                <button class="next-btn" id="bonusLifeBtn" style="background:#f59e0b;">❤️ +1 ЖИЗНЬ ЗА РЕКЛАМУ</button>
            </div>
        </div>

        <div class="daily-reward" id="dailyRewardBlock">
            <div class="daily-title">Ежедневная награда</div>
            <div class="calendar" id="calendarContainer"></div>
            <button class="claim-btn" id="claimDailyBtn">Забрать награду</button>
        </div>

        <div class="achievements" id="achievementsBlock">
            <div class="section-header"><span>Достижения</span><span style="font-size:0.7rem;">Смотреть все &gt;</span></div>
            <div id="achievementsList"></div>
        </div>

        <div class="invite-friends">
            <div>Пригласить друзей</div>
            <button class="invite-btn" id="inviteFriendsBtn">📢 Пригласить</button>
        </div>
    </div>

    <div id="achievementsFullTab" style="display:none;">
        <div class="achievements" style="margin-top:20px;">
            <div class="section-header"><span>Все достижения</span></div>
            <div id="achievementsFullList"></div>
        </div>
    </div>

    <div id="profileTab" style="display:none;">
        <div class="achievements" style="margin-top:20px;">
            <div class="section-header"><span>Мой профиль</span></div>
            <p>ID: <span id="userId"></span></p>
            <p>Всего очков: <span id="totalScoreProfile">0</span></p>
            <p>Всего вопросов: <span id="totalQuestions">0</span></p>
            <button class="invite-btn" id="deleteDataLink" style="background:#e64646;">🗑 Удалить данные</button>
            <button class="invite-btn" id="termsLink" style="margin-top:8px;">Пользовательское соглашение</button>
            <button class="invite-btn" id="privacyLink">Политика конфиденциальности</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-tab="game">Главная</div>
        <div class="nav-item" data-tab="achievements">Достижения</div>
        <div class="nav-item" data-tab="profile">Профиль</div>
    </div>
</div>

</html>
